<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mklab-stock Market</title>
<base href="/mklab-stock/">
<style>
  :root { --bg:#f7f8fa; --surface:#fff; --ink:#1a1d21; --muted:#6b7280; --border:#e5e7eb; --accent:#2563eb; --up:#dc2626; --down:#16a34a; --row-hover:#eff6ff; --radius:12px; --shadow:0 1px 3px rgba(0,0,0,.08); }
  [data-theme="dark"] { --bg:#0f1115; --surface:#171a21; --ink:#e8eaed; --muted:#9aa0a6; --border:#2a2f3a; --accent:#3b82f6; --up:#f87171; --down:#4ade80; --row-hover:#1e2a3a; --shadow:0 1px 3px rgba(0,0,0,.4); }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif; background:var(--bg); color:var(--ink); line-height:1.5; padding-bottom:20px; }
  .nav { position:sticky; top:0; z-index:26; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:4px; padding:10px 12px; }
  .nav a { color:var(--ink); text-decoration:none; font-size:14px; padding:6px 10px; border-radius:8px; white-space:nowrap; }
  .nav a.active { background:var(--accent); color:#fff; }
  .utilbar { position:sticky; top:49px; z-index:25; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; padding:8px 12px; }
  .utilbar .spacer { flex:1; }
  .brand { font-weight:700; font-size:15px; margin-right:4px; white-space:nowrap; }
  .search { display:flex; align-items:center; gap:4px; background:var(--bg); border:1px solid var(--border); border-radius:20px; padding:4px 10px; }
  .search.collapsed input { display:none; }
  .search.expanded input { display:block; width:160px; background:var(--surface); color:var(--ink); border:1px solid var(--border); border-radius:16px; padding:4px 10px; outline:none; }
  .fab-btn { width:40px; height:40px; border-radius:50%; border:1px solid var(--border); background:var(--surface); color:var(--ink); cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow); }
  .fab-btn svg { width:20px; height:20px; display:block; }
  .freshness { background:#fff7ed; color:#9a3412; font-size:12px; padding:6px 12px; border-bottom:1px solid var(--border); text-align:center; }
  [data-theme="dark"] .freshness { background:#2a1d12; color:#fdba74; }
  .wrap { max-width:720px; margin:0 auto; padding:12px; }
  @media (min-width:1024px){ .wrap{ max-width:1400px; padding:16px 24px; } }
  .section-title { font-size:14px; font-weight:600; margin:18px 4px 10px; color:var(--muted); }
  .up { color:var(--up); } .down { color:var(--down); }
  .tip { position:absolute; left:0; right:0; bottom:-22px; background:var(--surface); color:var(--ink); border:1px solid var(--border); border-radius:6px; padding:2px 6px; font-size:11px; text-align:center; box-shadow:var(--shadow); display:none; z-index:5; }
  /* shared small card grids */
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; }
  .card-sm { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px; box-shadow:var(--shadow); position:relative; }
  .card-sm .name { font-size:12px; color:var(--muted); }
  .card-sm .name small { font-size:11px; color:var(--muted); font-weight:400; margin-left:4px; }
  .card-sm .val { font-size:18px; font-weight:700; margin:2px 0; }
  .card-sm .chg { font-size:13px; font-weight:600; }
  .card-sm .box { position:relative; margin-top:6px; height:34px; }
  .card-sm svg { width:100%; height:34px; display:block; }
  /* section 2 layout */
  .mh-layout { display:grid; grid-template-columns:1fr; gap:12px; }
  @media (min-width:1024px){ .mh-layout{ grid-template-columns:1fr 280px; align-items:start; } }
  .tv-box { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:8px; box-shadow:var(--shadow); min-height:480px; overflow:hidden; }
  .tv-box .fallback { padding:12px; text-align:center; color:var(--muted); }
  /* section 3 layout */
  .perf-table-wrap { overflow-x:auto; }
  .perf-table { width:100%; border-collapse:collapse; font-size:13px; }
  .perf-table th, .perf-table td { padding:6px 10px; text-align:right; border-bottom:1px solid var(--border); }
  .perf-table th:first-child, .perf-table td:first-child { text-align:left; }
  /* watchlist cards */
  .watch5-wrap { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:10px; }
  /* ind table */
  .ind-table-wrap { overflow-x:auto; }
  .ind-table { width:100%; border-collapse:collapse; font-size:13px; }
  .ind-table th, .ind-table td { padding:6px 10px; text-align:right; border-bottom:1px solid var(--border); }
  .ind-table th:first-child, .ind-table td:first-child { text-align:left; }
  /* TOP 10 table */
  .top10-table { width:100%; border-collapse:collapse; font-size:13px; }
  .top10-table th, .top10-table td { padding:6px 10px; text-align:right; border-bottom:1px solid var(--border); }
  .top10-table th:first-child, .top10-table td:first-child { text-align:left; }
  /* trend sparkline container */
  .spark-wrap { position:relative; height:24px; width:60px; display:inline-block; }
  .spark-tip { position:absolute; left:0; right:0; bottom:-20px; background:var(--surface); color:var(--ink); border:1px solid var(--border); border-radius:4px; padding:2px 4px; font-size:10px; text-align:center; box-shadow:var(--shadow); display:none; z-index:5; }
  .spark-wrap:hover .spark-tip { display:block; }
  /* pager */
  .pager { display:flex; gap:6px; justify-content:center; margin:12px 0; flex-wrap:wrap; }
  .pager button { background:var(--surface); border:1px solid var(--border); color:var(--ink); border-radius:8px; padding:6px 11px; }
  .pager button.on { background:var(--accent); color:#fff; }
  /* drawer */
  #drawer { position:fixed; top:0; right:-320px; width:320px; max-width:100%; height:100vh; background:var(--surface); border-left:1px solid var(--border); box-shadow:var(--shadow); z-index:100; transition:right .3s ease; overflow-y:auto; padding:16px; }
  #drawer.open { right:0; }
  .drawer-mask { position:fixed; inset:0; background:rgba(0,0,0,.5); opacity:0; visibility:hidden; transition:.3s; z-index:99; }
  .drawer-mask.open { opacity:1; visibility:visible; }
  #drawer .close-x { position:absolute; top:8px; right:8px; width:32px; height:32px; border-radius:50%; border:1px solid var(--border); background:var(--bg); cursor:pointer; font-size:18px; }
  #drawer h3 { margin:0 0 12px; font-size:16px; }
  #drawer h4 { margin:16px 0 8px; font-size:13px; color:var(--muted); }
  #drawer .row { display:flex; align-items:center; justify-content:space-between; margin:8px 0; }
  #drawer .seg { display:flex; flex-direction:column; gap:4px; }
  #drawer .seg a { color:var(--ink); text-decoration:none; font-size:13px; padding:6px 10px; border-radius:6px; background:var(--bg); }
  #drawer .seg a:hover { background:var(--accent); color:#fff; }
  #drawer .switch { width:44px; height:24px; border-radius:12px; background:var(--border); border:none; cursor:pointer; position:relative; }
  #drawer .switch.on { background:var(--accent); }
  #drawer .switch::after { content:''; position:absolute; top:2px; left:2px; width:20px; height:20px; border-radius:50%; background:#fff; transition:.2s; box-shadow:0 1px 3px rgba(0,0,0,.2); }
  #drawer .switch.on::after { left:22px; }
  #drawer .sys-note { font-size:12px; color:var(--muted); line-height:1.6; }
  #drawer .sys-note .up { color:var(--down); }
  #drawer .seg { display:flex; flex-direction:column; gap:4px; }
</style>
</head>
<body>
<nav id="mainNav" class="nav"></nav>
<div id="utilbar" class="utilbar"><span class="brand" id="brand"></span><span class="spacer"></span></div>
<div class="freshness">資料以 2026-07-13 收盤為準（Build-Time 自動更新）</div>
<div class="wrap">
  <!-- 版塊 1：五國股市走勢卡 -->
  <div class="section-title">五國股市走勢卡</div>
  <div class="cards" id="market5"></div>

  <!-- 版塊 2：大盤 K 線 + 績效表 -->
  <div class="section-title">大盤 K 線（Market Health）</div>
  <div class="mh-layout">
    <div class="tv-box">
      <mklab-kline id="marketKline" data-symbol="TWII" height="460"></mklab-kline>
    </div>
    <div class="perf-table-wrap">
      <table class="perf-table" id="perfTable">
        <thead><tr><th>指數</th><th>收盤</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- 版塊 3：我的自選股 -->
  <div class="section-title">我的自選股</div>
  <div class="watch5-wrap" id="watch5"></div>

  <!-- 版塊 4：產業 TOP10 -->
  <div class="section-title">全產業列表（區間績效 %）</div>
  <div class="ind-table-wrap">
    <table class="ind-table" id="indTable">
      <thead><tr><th>代號/名稱</th><th>價格</th><th>漲跌%</th><th>綜合評分</th><th>PE</th><th>PB</th><th>EPS</th><th>ROE</th><th>ROA</th><th>趨勢</th><th>產業</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
  <div class="pager" id="indPager"></div>

  <!-- 版塊 5：綜合評分 TOP 10 -->
  <div class="section-title">綜合評分 TOP 10 (點擊標題,切換升/降排序)</div>
  <div class="ind-table-wrap">
    <table class="top10-table" id="top10Table">
      <thead><tr><th>代號/名稱</th><th>價格</th><th>漲跌%</th><th>綜合評分</th><th>PE</th><th>PB</th><th>EPS</th><th>ROE</th><th>ROA</th><th>趨勢</th><th>產業</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
  <div class="pager" id="top10Pager"></div>
</div>

<!-- 抽屜 -->
<div class="drawer-mask" onclick="MKLAB.Drawer.close()"></div>
<div id="drawer"><button class="close-x" onclick="MKLAB.Drawer.close()">×</button></div>

<!-- WC 元件載入順序：vendor → data → core → data-client → wc -->
<script src="vendor/lightweight-charts.min.js"></script>
<script src="data/twii_kdata.js"></script>
<script src="assets/mklab-core.js"></script>
<script src="assets/data-client.js"></script>
<script src="assets/mklab-wc.js"></script>

<script>
// ---------- 本地靜態 fallback（file:// 可跑） ----------
const FALLBACK_MARKET5 = [
  {m:'TW', n:'加權股價指數 (TAIEX)', s:'^TWII', d:'台灣大盤'},
  {m:'US', n:'S&P 500', s:'^GSPC', d:'美股大盤'},
  {m:'JP', n:'日經 225', s:'^N225', d:'日股大盤'},
  {m:'CN', n:'上證指數', s:'000001.SS', d:'陸股大盤'},
  {m:'HK', n:'恒生指數', s:'^HSI', d:'港股大盤'},
];
let priceMap = {};
let industry = [];
let indTable = null;
let top10Table = null;
let top5ByCapCache = [];

// ---------- 小工具 ----------
function spark(seed, n, w=150, h=34) {
  const d=[]; let v=seed>0?seed:50;
  for(let i=0;i<n;i++){ v+=Math.random()*20-10; v=Math.max(1,Math.min(100,v)); d.push(v); }
  const mn=Math.min(...d), mx=Math.max(...d), rng=mx-mn||1;
  const pts=d.map((v,i)=>`${(i/(n-1))*w},${h-(v-mn)/rng*h}`).join(' ');
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><polyline fill="none" stroke="currentColor" stroke-width="1.5" points="${pts}"/></svg>`;
}
function gen(seed,n){ const a=[]; let v=seed>0?seed:50; for(let i=0;i<n;i++){v+=Math.random()*20-10; v=Math.max(1,Math.min(100,v)); a.push(v);} return a; }
function tipIn(el, sym){
  const tip = el.querySelector('.tip');
  if(tip) tip.textContent = `${sym} 走勢圖 (近 20 日模擬)`;
}
function untipIn(el){
  const tip = el.querySelector('.tip');
  if(tip) tip.textContent = '';
}

// ---------- 版塊 1：五國股市走勢卡 ----------
function renderMarket5(){
  const box = document.getElementById('market5');
  if(!box) return;
  box.innerHTML = FALLBACK_MARKET5.map(m=>{
    const p = priceMap[m.s];
    const price = p && p.price != null ? p.price : '—';
    const chg = p && p.chg != null ? p.chg : 0;
    const col = chg>=0 ? 'var(--up)' : 'var(--down)';
    const seed = (typeof price==='number' && price>0) ? price : 50;
    return `<div class="card-sm" onmouseenter="tipIn(this,'${m.s}')" onmouseleave="untipIn(this)">
      <div class="name">${m.m} <small>${m.n}</small></div>
      <div class="val">${typeof price==='number' ? price.toLocaleString() : price}</div>
      <div class="chg" style="color:${col}">${chg>0?'+':''}${chg}%</div>
      <div class="box" onmouseenter="tipIn(this,'${m.s}')" onmouseleave="untipIn(this)">${spark(gen(seed,20),20,150,34)}<div class="tip"></div></div>
    </div>`;
  }).join('');
}

// ---------- 版塊 3：我的自選股 ----------
let watchItems = [];
const DEFAULT_WATCH = ['2330','2454','2308','2317','3711'];

function renderWatch(){
  const box = document.getElementById('watch5');
  if(!box) return;
  watchItems = (()=>{
    try { const v = JSON.parse(localStorage.getItem('mk_watch')); if(Array.isArray(v) && v.length) return v; } catch(e){}
    return DEFAULT_WATCH.map(s=>({sym:s, name:''}));
  })();
  // 用 priceMap 補真實值
  watchItems = watchItems.map(x=>{
    const p = priceMap && priceMap[x.sym];
    return Object.assign({}, x, {
      price: p&&p.price!=null?p.price:null,
      chg:   p&&p.chg!=null?p.chg:null,
      pe:    p&&p.pe!=null?p.pe:null,
      roe:   p&&p.roe!=null?p.roe:null,
      alert: p&&p.alert?p.alert:'',
    });
  });
  // 確保 5 檔有資料，不足用市值前 5 補
  const valid = watchItems.filter(d=>d.price!=null || d.chg!=null);
  if(priceMap && Object.keys(priceMap).length && valid.length < 5){
    const need = 5 - valid.length;
    const fill = top5ByCap().filter(s=>!watchItems.some(x=>x.sym===s)).slice(0,need);
    watchItems = valid.concat(fill.map(sym=>({
      sym, name:'', price:priceMap[sym]?priceMap[sym].price:null, chg:priceMap[sym]?priceMap[sym].chg:null,
      pe:priceMap[sym]?priceMap[sym].pe:null, roe:priceMap[sym]?priceMap[sym].roe:null, alert:''
    })));
  }
  box.innerHTML = watchItems.slice(0,5).map(d=>{
    const price = d.price, chg = d.chg;
    if(price==null && chg==null) return `<div class="card-sm"><div class="name">${d.sym}</div><div class="val">-</div><div class="chg">-</div></div>`;
    const col = chg>=0 ? "var(--up)" : "var(--down)";
    const seed = (typeof price==='number' && price>0) ? price : 50;
    const symHtml = d.name ? `${d.sym}<small>${d.name}</small>` : d.sym;
    return `<div class="card-sm"><div class="name">${symHtml}</div><div class="val">${(typeof price==='number')?price.toLocaleString():'-'}</div><div class="chg" style="color:${col}">${chg>0?'+':''}${chg}%</div><div class="box" onmouseenter="tipIn(this,'${d.sym}')" onmouseleave="untipIn(this)">${spark(gen(seed,20),col,150,34)}<div class="tip"></div></div></div>`;
  }).join('') || `<div class="card-sm" style="grid-column:1/-1;text-align:center;color:var(--muted)">尚未設定自選股（於 Watchlist 頁新增）</div>`;
}

// ---------- 版塊 4：產業 TOP10（業別聚合） ----------
function renderInd(){
  if(!indTable) return;
  const scored = industry.map(s=>({...s, score: calcRank(s)}))
    .filter(s=>s.score>0 && (s.pe!=null||s.pb!=null||s.roe!=null||s.eps!=null));
  indTable.setRows(scored);
  const cnt=document.getElementById("indCount"); if(cnt) cnt.textContent=scored.length;
}

// ---------- 版塊 5：綜合評分 TOP 10 ----------
function renderTop10(){
  if(!top10Table) return;
  const scored = industry.map(s=>({...s, score: calcRank(s)}))
    .filter(s=>s.score>0 && (s.pe!=null||s.pb!=null||s.roe!=null||s.eps!=null))
    .sort((a,b)=>b.score - a.score)
    .slice(0,10);
  top10Table.setRows(scored);
}

// ---------- 綜合評分 ----------
function calcRank(s){
  let score=0, any=false;
  if(s.roe!=null && !isNaN(s.roe)){ score += Math.max(0, Math.min(40, s.roe*1.2)); any=true; }
  if(s.pe!=null && !isNaN(s.pe)){ score += Math.max(0, Math.min(20, (30-s.pe)*1.0)); any=true; }
  if(s.pb!=null && !isNaN(s.pb)){ score += Math.max(0, Math.min(15, (8-s.pb)*2.0)); any=true; }
  if(s.eps!=null && !isNaN(s.eps)){ score += Math.max(0, Math.min(10, s.eps*0.3)); any=true; }
  if(!any) return -1;
  return Math.round(Math.max(0, Math.min(100, score)));
}

// ---------- 台股市值前 5（做 watch 兜底） ----------
function top5ByCap(){
  if(top5ByCapCache.length) return top5ByCapCache;
  if(!priceMap) return ['2330','2454','2308','2317','3711'];
  const arr = Object.entries(priceMap)
    .filter(([s,p])=>p.market_cap!=null && p.price!=null && !s.match(/[A-Z]$/))
    .sort((a,b)=>b[1].market_cap - a[1].market_cap)
    .slice(0,5).map(([s])=>s);
  top5ByCapCache = arr.length ? arr : ['2330','2454','2308','2317','3711'];
  return top5ByCapCache;
}

// ---------- 載入真實資料 ----------
async function loadRealData(){
  try{
    // 1) 載入 stocks.json
    const r = await fetch('data/stocks.json');
    if(!r.ok) throw new Error('stocks.json failed');
    const d = await r.json();
    if(d && Array.isArray(d.stocks)){
      // 建立 priceMap
      priceMap = {};
      d.stocks.forEach(s=>{
        priceMap[s.sym] = {price:s.price, chg:s.chg, pe:s.pe, roe:s.roe, market_cap:s.market_cap, alert:null};
      });
      // 合併業別資料（fallback 手工財務）
      const fbMap = {};
      industry.forEach(x=>fbMap[x.sym]=x);
      industry = d.stocks.map(s=>{
        const fb = fbMap[s.sym] || {};
        return {
          ind: s.ind || fb.ind || '-',
          sym: s.sym,
          name: s.name || fb.name || s.sym,
          price: s.price, chg: s.chg,
          pe: s.pe!=null ? s.pe : (fb.pe!=null ? fb.pe : null),
          pb: s.pb!=null ? s.pb : (fb.pb!=null ? fb.pb : null),
          eps: s.eps!=null ? s.eps : (fb.eps!=null ? fb.eps : null),
          roe: s.roe!=null ? s.roe : (fb.roe!=null ? fb.roe : null),
          roa: s.roa!=null ? s.roa : (fb.roa!=null ? fb.roa : null),
          spct: s.spct!=null ? s.spct : (fb.spct!=null ? fb.spct : null),
          rank: s.rank || fb.rank || 0,
          trend: (s.spct!=null) ? (s.spct>0?'+':'')+s.spct+'%' : (fb.spct!=null ? (fb.spct>0?'+':'')+fb.spct+'%' : null),
        };
      });
      renderWatch();
      renderInd();
      renderTop10();
      renderMarket5();
      const asof = d.meta && d.meta.as_of;
      if(asof){
        const f = document.querySelector('.freshness');
        if(f) f.textContent = '資料以 ' + asof + ' 收盤為準（Build-Time 自動更新）';
      }
    }
    // 2) 載入 indices（績效表）
    const r2 = await fetch('data/indices.json');
    if(r2.ok){
      const d2 = await r2.json();
      if(d2 && d2.indices){
        const rows = Object.entries(d2.indices).map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
        const tbody = document.querySelector('#perfTable tbody');
        if(tbody) tbody.innerHTML = '<tr><th>指數</th><th>收盤</th></tr>' + rows;
      }
    }
  }catch(e){
    console.error('loadRealData failed:', e);
  }
}

// ---------- 初始化表格 ----------
if(typeof MKLAB !== 'undefined'){
  indTable = MKLAB.DataTable('indTable', {
    cols: ['sym','price','chg','score','pe','pb','eps','roe','roa','trend','ind'],
    rows: [],
    pageSize: 10,
    pagerId: 'indPager',
    defaultSort: 'score',
  });
  top10Table = MKLAB.DataTable('top10Table', {
    cols: ['sym','price','chg','score','pe','pb','eps','roe','roa','trend','ind'],
    rows: [],
    pageSize: 10,
    pagerId: 'top10Pager',
    defaultSort: 'score',
  });
}

// ---------- 初始化 ----------
loadRealData();
MKLAB.initDrawer();
MKLAB.Shell.mount({ active:'market' });
</script>
</body>
</html>
