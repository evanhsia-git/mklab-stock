<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mklab-stock Market 原型 v11</title>
<style>
  :root { --bg:#f7f8fa; --surface:#fff; --ink:#1a1d21; --muted:#6b7280; --border:#e5e7eb; --accent:#2563eb; --up:#dc2626; --down:#16a34a; --row-hover:#eff6ff; --radius:12px; --shadow:0 1px 3px rgba(0,0,0,.08); }
  [data-theme="dark"] { --bg:#0f1115; --surface:#171a21; --ink:#e8eaed; --muted:#9aa0a6; --border:#2a2f3a; --accent:#3b82f6; --up:#f87171; --down:#4ade80; --row-hover:#1e2a3a; --shadow:0 1px 3px rgba(0,0,0,.4); }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif; background:var(--bg); color:var(--ink); line-height:1.5; padding-bottom:20px; }
  .nav { position:sticky; top:0; z-index:26; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:4px; padding:10px 12px; }
  .nav a { color:var(--ink); text-decoration:none; font-size:14px; padding:6px 10px; border-radius:8px; white-space:nowrap; }
  .nav a.active { background:var(--accent); color:#fff; }
  .utilbar { position:sticky; top:49px; z-index:25; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; padding:8px 12px; }
  .utilbar .spacer { flex:1; }
  .brand { font-weight:700; font-size:15px; margin-right:4px; white-space:nowrap; }
  .search { display:flex; align-items:center; gap:4px; background:var(--bg); border:1px solid var(--border); border-radius:20px; padding:4px 10px; }
  .search.collapsed input { display:none; }
  .search.expanded input { display:block; width:160px; background:var(--surface); color:var(--ink); border:1px solid var(--border); border-radius:16px; padding:4px 10px; outline:none; }
  .fab-btn { width:40px; height:40px; border-radius:50%; border:1px solid var(--border); background:var(--surface); color:var(--ink); cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow); }
  .fab-btn svg { width:20px; height:20px; display:block; }
  .freshness { background:#fff7ed; color:#9a3412; font-size:12px; padding:6px 12px; border-bottom:1px solid var(--border); text-align:center; }
  [data-theme="dark"] .freshness { background:#2a1d12; color:#fdba74; }
  .wrap { max-width:720px; margin:0 auto; padding:12px; }
  @media (min-width:1024px){ .wrap{ max-width:1400px; padding:16px 24px; } }
  .section-title { font-size:14px; font-weight:600; margin:18px 4px 10px; color:var(--muted); }
  .up { color:var(--up); } .down { color:var(--down); }
  .tip { position:absolute; left:0; right:0; bottom:-22px; background:var(--surface); color:var(--ink); border:1px solid var(--border); border-radius:6px; padding:2px 6px; font-size:11px; text-align:center; box-shadow:var(--shadow); display:none; z-index:5; }
  /* shared small card grids */
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; }
  .card-sm { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px; box-shadow:var(--shadow); position:relative; }
  .card-sm .name { font-size:12px; color:var(--muted); }
  .card-sm .name small { font-size:11px; color:var(--muted); font-weight:400; margin-left:4px; }
  .card-sm .val { font-size:18px; font-weight:700; margin:2px 0; }
  .card-sm .chg { font-size:13px; font-weight:600; }
  .card-sm .box { position:relative; margin-top:6px; height:34px; }
  .card-sm svg { width:100%; height:34px; display:block; }
  /* section 2 layout */
  .mh-layout { display:grid; grid-template-columns:1fr; gap:12px; }
  @media (min-width:1024px){ .mh-layout{ grid-template-columns:1fr 280px; align-items:start; } }
  .tv-box { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:8px; box-shadow:var(--shadow); min-height:480px; overflow:hidden; }
  .tv-box .fallback { padding:40px; text-align:center; color:var(--muted); font-size:13px; }
  .perf { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px; box-shadow:var(--shadow); }
  .perf h3 { font-size:14px; margin-bottom:8px; }
  .perf table { width:100%; }
  .perf td { padding:8px 6px; font-size:13px; border-bottom:1px solid var(--border); }
  .perf td:last-child { text-align:right; font-weight:600; }
  .perf tr:last-child td { border-bottom:none; }
  .disclaimer { font-size:11px; color:var(--muted); text-align:center; padding:20px 12px; }
  /* table (zebra + hover) */
  .table-wrap { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); overflow-x:auto; }
  .pager { display:flex; gap:6px; justify-content:center; margin:12px 0; flex-wrap:wrap; }
  .pager button { padding:6px 11px; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--ink); cursor:pointer; font-size:13px; }
  .pager button:hover { background:var(--row-hover); }
  .pager button.on { background:var(--accent); color:#fff; border-color:var(--accent); }
  table { width:100%; border-collapse:collapse; }
  th,td { padding:10px 8px; text-align:right; font-size:13px; border-bottom:1px solid var(--border); white-space:nowrap; }
  th:first-child,td:first-child { text-align:left; }
  th { font-size:12px; color:var(--muted); font-weight:600; background:var(--surface); cursor:pointer; position:sticky; top:0; }
  tbody tr:nth-child(even){ background:rgba(255,255,255,.02); }
  [data-theme="light"] tbody tr:nth-child(even){ background:rgba(0,0,0,.025); }
  tbody tr:hover { background:var(--row-hover); }
  .sym { font-weight:600; } .sym small { color:var(--muted); font-weight:400; display:block; }
  .spark-cell { position:relative; width:90px; } .spark-cell svg { width:100%; height:34px; display:block; }
  /* drawer */
  .toolbar { display:flex; align-items:center; gap:8px; margin:4px 4px 10px; flex-wrap:wrap; }
  .toolbar label { font-size:13px; color:var(--muted); }
  .toolbar select { background:var(--surface); color:var(--ink); border:1px solid var(--border); border-radius:8px; padding:6px 8px; font-size:13px; }
  .drawer-mask { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:40; display:none; }
  .drawer-mask.open { display:block; }
  .drawer { position:fixed; top:0; right:0; height:100%; width:300px; max-width:85vw; background:var(--surface); border-left:1px solid var(--border); z-index:50; transform:translateX(100%); transition:transform .25s ease; padding:16px; overflow-y:auto; box-shadow:var(--shadow); }
  .drawer.open { transform:translateX(0); }
  .drawer h3 { font-size:15px; margin-bottom:12px; }
  .drawer h4 { font-size:13px; color:var(--muted); margin:16px 0 8px; }
  .row { display:flex; align-items:center; justify-content:space-between; padding:8px 0; font-size:14px; }
  .row input { width:90px; padding:4px 6px; border:1px solid var(--border); border-radius:6px; background:var(--bg); color:var(--ink); }
  .switch { width:44px; height:24px; border-radius:12px; background:var(--border); position:relative; cursor:pointer; border:none; }
  .switch.on { background:var(--accent); }
  .switch::after { content:""; position:absolute; top:2px; left:2px; width:20px; height:20px; border-radius:50%; background:#fff; transition:left .2s; }
  .switch.on::after { left:22px; }
  .seg { display:flex; border:1px solid var(--border); border-radius:8px; overflow:hidden; }
  .seg button { flex:1; padding:6px; background:var(--surface); color:var(--ink); border:none; font-size:13px; }
  .seg button.on { background:var(--accent); color:#fff; }
  .close-x { float:right; background:none; border:none; font-size:20px; color:var(--muted); cursor:pointer; }
  .drawer a { color:var(--accent); text-decoration:none; }
  .sys-note { font-size:12px; color:var(--muted); line-height:1.6; }
  /* KLineChart 自託管 */
  .kline-toolbar { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; }
  .kline-toolbar button { padding:5px 10px; font-size:12px; border:1px solid var(--border); border-radius:8px; background:var(--bg); color:var(--ink); cursor:pointer; }
  .kline-toolbar button.on { background:var(--accent); color:#fff; border-color:var(--accent); }
</style>
<script src="vendor/klinecharts.min.js"></script>
<script src="data/twii_kdata.js"></script>
</head>
<body>
  <nav id="mainNav" class="nav"></nav>
  <div id="utilbar" class="utilbar"><span class="brand" id="brand"></span><span class="spacer"></span></div>
  <div class="freshness">資料以 2026-07-13 收盤為準（前一日，非即時）</div>
  <div class="drawer-mask" onclick="MKLAB.Drawer.close()"></div>
  <aside class="drawer" id="drawer">
    <button class="close-x" onclick="MKLAB.Drawer.close()">×</button>
  </aside>
  <div class="wrap">
    <!-- 版塊 1：五國股市 -->
    <div class="section-title">全球主要股市</div>
    <div class="cards" id="indices5"></div>

    <!-- 版塊 2：台股加權 + 績效表 -->
    <div class="section-title">Market Health &amp; Exposure（^TWII · 近 1 年）</div>
    <div class="mh-layout">
      <div class="tv-box">
        <div id="tv_chart" style="height:46vh;min-height:320px"></div>
      </div>
      <div class="perf">
        <h3>績效表現</h3>
        <table id="perfTable"></table>
      </div>
    </div>

    <!-- 版塊 3：VIX / CNN / 匯率 / 黃金 / 石油 -->
    <div class="section-title">市場情緒與原物料</div>
    <div class="cards" id="macro5"></div>

    <!-- 版塊 4：台股市值前 10 -->
    <div class="section-title">台股市值前 10 大</div>
    <div class="cards" id="cap10"></div>

    <!-- 版塊 5：使用者自選 5 支 -->
    <div class="section-title">我的自選（設定中最多 5 支）</div>
    <div class="cards" id="watch5"></div>

    <!-- 版塊 6：綜合評分 TOP 10 -->
    <div class="section-title">綜合評分 TOP 10 (點標題排序切換升/降排序) 總共 <span id="indCount"></span> 檔</div>
    <div class="table-wrap">
      <table id="indTable">
        <thead></thead>
        <tbody id="indBody"></tbody>
      </table>
      <div class="pager" id="indPager"></div>
    </div>

    <div class="disclaimer">免責聲明：僅供參考，非投資建議。示意資料，生產環境由 Build-Time 計算。</div>
  </div>
<script src="assets/mklab-core.js"></script>
<script>
  function spark(data,color,w,h){ const min=Math.min(...data),max=Math.max(...data),r=(max-min)||1; const p=data.map((d,i)=>`${(i/(data.length-1)*w).toFixed(1)},${(h-((d-min)/r*h)).toFixed(1)}`).join(" "); return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><polyline points="${p}" fill="none" stroke="${color}" stroke-width="1.5"/></svg>`; }
  function gen(seed,n){ const o=[]; let p=seed; for(let i=0;i<n;i++){ p+=(Math.random()-0.5)*seed*0.01; o.push(+p.toFixed(2)); } return o; }
  function tipIn(el,t){ const x=el.querySelector('.tip'); if(x){x.textContent=t;x.style.display='block';} }
  function untipIn(el){ const x=el.querySelector('.tip'); if(x)x.style.display='none'; }

  // 版塊 1：五國股市
  const indices5=[
    {name:"台股加權",val:44738,chg:-1.42},
    {name:"美股 S&P500",val:7536,chg:+0.28},
    {name:"陸股 滬深300",val:4797,chg:+2.15},
    {name:"日股 日經225",val:68729,chg:+1.46},
    {name:"韓股 KOSPI",val:7288,chg:+6.37},
  ];
  document.getElementById("indices5").innerHTML=indices5.map(m=>{
    const col=m.chg>=0?"#dc2626":"#16a34a";
    return `<div class="card-sm"><div class="name">${m.name}</div><div class="val">${m.val.toLocaleString()}</div><div class="chg ${m.chg>=0?'up':'down'}">${(m.chg>0?'+':'')}${m.chg}%</div><div class="box" onmouseenter="tipIn(this,'30d')" onmouseleave="untipIn(this)">${spark(gen(m.val,30),col,150,34)}<div class="tip"></div></div></div>`;
  }).join("");

  // 版塊 2：績效表（上方加 TWII 列）
  const perf=[["台股加權 ^TWII","44,738 (-1.42%)",false],["1週","+1.2%",true],["1月","+3.4%",true],["3月","+5.1%",true],["6月","+8.7%",true],["今年以來","+12.3%",true],["1年","+18.2%",true]];
  document.getElementById("perfTable").innerHTML=perf.map(r=>`<tr><td>${r[0]}</td><td class="${r[2]?'up':'down'}">${r[1]}</td></tr>`).join("");

  // 版塊 3：情緒/原物料
  const macro5=[
    {k:"VIX 恐慌", v:"16.72", c:-2.56, d:gen(16.72,20)},
    {k:"CNN 恐慌貪婪", v:"43.14 恐慌", c:-1.33, d:gen(43.14,20)},
    {k:"USD/TWD", v:"32.148", c:+0.05, d:gen(32.148,20)},
    {k:"黃金", v:"4,060.6", c:+0.22, d:gen(4060.6,20)},
    {k:"石油 WTI", v:"73.85", c:+3.41, d:gen(73.85,20)},
  ];
  document.getElementById("macro5").innerHTML=macro5.map(m=>{
    const col=m.c>=0?"#dc2626":"#16a34a";
    return `<div class="card-sm"><div class="name">${m.k}</div><div class="val">${m.v}</div><div class="chg ${m.c>=0?'up':'down'}">${m.c>0?'+':''}${m.c}%</div><div class="box" onmouseenter="tipIn(this,'${m.k}')" onmouseleave="untipIn(this)">${spark(m.d,col,150,34)}<div class="tip"></div></div></div>`;
  }).join("");

  // 版塊 4：市值前 10（靜態真實近似值，依 Yahoo 2026-07-13）
  const capBase=[["2330","台積電",2420,-0.82],["2317","鴻海",235.5,-0.42],["2454","聯發科",1385,+1.10],["2308","台達電",1890,+1.50],["2303","聯電",52.5,-0.38],["2412","中華電",125.5,+0.20],["2882","國泰金",68.2,+0.44],["6505","台塑化",108.0,-0.55],["1303","南亞",38.4,+0.52],["2891","中信金",42.1,+0.24]];
  document.getElementById("cap10").innerHTML=capBase.map((b)=>{
    const price=b[2], chg=b[3], col=chg>=0?"#dc2626":"#16a34a";
    return `<div class="card-sm"><div class="name">${b[0]} ${b[1]}</div><div class="val">${price.toLocaleString()}</div><div class="chg ${chg>=0?'up':'down'}">${chg>0?'+':''}${chg}%</div><div class="box" onmouseenter="tipIn(this,'${b[0]}')" onmouseleave="untipIn(this)">${spark(gen(price,20),col,150,34)}<div class="tip"></div></div></div>`;
  }).join("");

  // 版塊 5：我的自選（與 watchlist 共用同一份 localStorage 清單，價格取自 stocks.json 真實值）
  let priceMap = {};
  // 台股市值最大前 5（資料載入後計算，作為自選 fallback 保底）
  function top5ByCap(){
    if(!priceMap || !Object.keys(priceMap).length) return ['2330','2454','2308','2317','3711'];
    const arr = Object.entries(priceMap)
      .map(([sym,p])=>({sym, cap:p.market_cap||0}))
      .filter(x=>x.cap>0)
      .sort((a,b)=>b.cap-a.cap)
      .slice(0,5)
      .map(x=>x.sym);
    return arr.length?arr:['2330','2454','2308','2317','3711'];
  }
  function renderWatch(){
    let items = MKLAB.Watch.decorate(priceMap);
    // 自動清理：跨市場標的若 stocks.json 無資料（price/chg 皆 null），以台股市值前5替換，確保 5 張圖表都有值
    if(priceMap && Object.keys(priceMap).length){
      const valid = items.filter(d=>d.price!=null || d.chg!=null);
      if(valid.length < 5){
        const need = 5 - valid.length;
        const fill = top5ByCap().filter(s=>!items.some(x=>x.sym===s)).slice(0,need);
        items = valid.concat(fill.map(sym=>({sym, name:'', price:priceMap[sym]?priceMap[sym].price:null, chg:priceMap[sym]?priceMap[sym].chg:null, pe:priceMap[sym]?priceMap[sym].pe:null, roe:priceMap[sym]?priceMap[sym].roe:null, alert:''})));
      }
    }
    document.getElementById("watch5").innerHTML = items.map((d)=>{
      const price = d.price, chg = d.chg;
      if(price==null && chg==null) return `<div class="card-sm"><div class="name">${d.sym}</div><div class="val">-</div><div class="chg">-</div></div>`;
      const col = chg>=0 ? "#dc2626" : "#16a34a";
      const seed = (typeof price==='number' && price>0) ? price : 50;
      const symHtml = d.name ? `${d.sym}<small>${d.name}</small>` : d.sym;
      return `<div class="card-sm"><div class="name">${symHtml}</div><div class="val">${(typeof price==='number')?price.toLocaleString():'-'}</div><div class="chg ${chg>=0?'up':'down'}">${chg>0?'+':''}${chg}%</div><div class="box" onmouseenter="tipIn(this,'${d.sym}')" onmouseleave="untipIn(this)">${spark(gen(seed,20),col,150,34)}<div class="tip"></div></div></div>`;
    }).join("") || `<div class="card-sm" style="grid-column:1/-1;text-align:center;color:var(--muted)">尚未設定自選股（於 watchlist 頁新增）</div>`;
  }

  // 版塊 6：產業 TOP10（預設為示意 fallback，載入 data/stocks.json 後以真實資料覆寫）
  let industry=[
    {ind:"半導體",sym:"2330",name:"台積電",price:1050,chg:+1.2,pe:24.1,pb:5.2,eps:43.6,roe:28.1,roa:15.3,rank:92,spct:+3.4},
    {ind:"電子代工",sym:"2317",name:"鴻海",price:215,chg:+0.9,pe:18.3,pb:2.1,eps:11.7,roe:14.2,roa:6.8,rank:84,spct:+2.0},
    {ind:"IC設計",sym:"2454",name:"聯發科",price:1280,chg:-0.5,pe:30.2,pb:4.8,roe:22.5,roa:14.0,rank:81,spct:-1.3},
    {ind:"電源管理",sym:"2308",name:"台達電",price:368,chg:+0.7,pe:26.5,pb:3.9,eps:13.9,roe:16.5,roa:9.2,rank:80,spct:+1.5},
    {ind:"通訊",sym:"2412",name:"中華電",price:122,chg:+0.1,pe:22.0,pb:2.3,eps:5.5,roe:10.5,roa:4.1,rank:72,spct:+0.3},
    {ind:"金融",sym:"2882",name:"國泰金",price:58,chg:+0.3,pe:11.5,pb:1.1,eps:5.0,roe:10.0,roa:1.0,rank:70,spct:+0.5},
    {ind:"塑化",sym:"6505",name:"台塑化",price:98,chg:-0.2,pe:14.0,pb:1.4,eps:7.0,roe:9.8,roa:5.0,rank:68,spct:-0.4},
    {ind:"金融",sym:"2891",name:"中信金",price:36,chg:+0.2,pe:12.0,pb:1.2,eps:3.0,roe:11.0,roa:1.2,rank:71,spct:+0.4},
    {ind:"半導體",sym:"2303",name:"聯電",price:52,chg:-0.3,pe:13.5,pb:1.6,eps:3.8,roe:12.1,roa:7.0,rank:74,spct:-0.5},
    {ind:"電子零組件",sym:"3008",name:"大立光",price:2280,chg:+0.6,pe:16.0,pb:2.0,eps:142,roe:13.0,roa:10.0,rank:78,spct:+1.0},
  ];
  // Build-Time 真實資料載入（GitHub Pages / 本地 server 可讀；file:// 會失敗則保留 fallback）
  function loadStocks(){
    fetch('data/stocks.json').then(r=>{ if(!r.ok) throw new Error('no data'); return r.json(); }).then(d=>{
      if(d && Array.isArray(d.stocks) && d.stocks.length){
        // fallback map：手工真實財務（大盤權值股，欄位齊全）
        const fbMap={}; industry.forEach(x=>fbMap[x.sym]=x);
        industry = d.stocks.map(s=>{
          const fb = fbMap[s.sym] || {};
          const pe  = s.pe  !=null ? s.pe  : (fb.pe  !=null ? fb.pe  : null);
          const pb  = s.pb  !=null ? s.pb  : (fb.pb  !=null ? fb.pb  : null);
          const eps = s.eps !=null ? s.eps : (fb.eps !=null ? fb.eps : null);
          const roe = s.roe !=null ? s.roe : (fb.roe !=null ? fb.roe : null);
          const roa = s.roa !=null ? s.roa : (fb.roa !=null ? fb.roa : null);
          const spct= s.spct!=null ? s.spct : (fb.spct!=null ? fb.spct : null);
          return {
            ind:  s.ind  || fb.ind  || '-',
            sym:  s.sym,
            name: s.name || fb.name || s.sym,
            price:s.price, chg:s.chg,
            pe, pb, eps, roe, roa,
            spct,
            rank: s.rank || fb.rank || 0,
            trend: (spct!=null) ? (spct>0?'+':'')+spct+'%' : (fb.spct!=null ? (fb.spct>0?'+':'')+fb.spct+'%' : null),
          };
        });
        priceMap = {};
        d.stocks.forEach(s=>{ priceMap[s.sym] = {price:s.price, chg:s.chg, pe:s.pe, roe:s.roe, market_cap:s.market_cap, alert:null}; });
        renderWatch();
        renderInd();
        const asof=d.meta&&d.meta.as_of;
        if(asof){ const f=document.querySelector('.freshness'); if(f) f.textContent='資料以 '+asof+' 收盤為準（Build-Time 自動更新）'; }
      }
    }).catch(()=>{ /* 保留 fallback 示意資料 */ });
  }
  // 前端即時綜合評分（依財務欄位加權；不含 chg 日波動，避免 ETF/權證因日漲跌排前面）
  function calcRank(s){
    let score=0, any=false;
    if(s.roe!=null && !isNaN(s.roe)){ score += Math.max(0, Math.min(40, s.roe*1.2)); any=true; }
    if(s.pe!=null && !isNaN(s.pe)){ score += Math.max(0, Math.min(20, (30-s.pe)*1.0)); any=true; }
    if(s.pb!=null && !isNaN(s.pb)){ score += Math.max(0, Math.min(15, (8-s.pb)*2.0)); any=true; }
    if(s.eps!=null && !isNaN(s.eps)){ score += Math.max(0, Math.min(10, s.eps*0.3)); any=true; }
    if(!any) return -1;
    return Math.round(Math.max(0, Math.min(100, score)));
  }
  let indTable=null;
  function renderInd(){
    const scored = industry.map(s=>({...s, score: calcRank(s)}))
      .filter(s=>s.score>0 && (s.pe!=null||s.pb!=null||s.roe!=null||s.eps!=null));
    if(!indTable){
      indTable = MKLAB.DataTable('indTable', {
        cols: ['sym','price','chg','score','pe','pb','eps','roe','trend','ind'],
        rows: scored,
        pageSize: 10,
        pagerId: 'indPager',
        defaultSort: 'score',
      });
      window.__ind = indTable;
    } else {
      indTable.setRows(scored);
    }
    const cnt=document.getElementById("indCount"); if(cnt) cnt.textContent=scored.length;
  }

  function openDrawer(){ MKLAB.Drawer.open(); }
  function closeDrawer(){ MKLAB.Drawer.close(); }
  function toggle(id){ document.getElementById(id).classList.toggle("on"); }
  renderWatch(); renderInd(); loadStocks();
  MKLAB.initDrawer();
  MKLAB.Shell.mount({ active:'market' });

  // ===== 版塊 2：KLineChart 自託管（K線，真實 TWII 2026-07-13 收盤）=====
  function genKData(n,seed){ // 生成示意日 K 線（lightweight-charts 格式：time=YYYY-MM-DD）
    const o=[]; let p=seed; const base=new Date(2025,6,14);
    for(let i=0;i<n;i++){ base.setDate(base.getDate()+1);
      const open=p; const close=+(p+(Math.random()-0.48)*seed*0.03).toFixed(1);
      const high=+(Math.max(open,close)+(Math.random()*seed*0.015)).toFixed(1);
      const low=+(Math.min(open,close)-(Math.random()*seed*0.015)).toFixed(1);
      const y=base.getFullYear(), m=String(base.getMonth()+1).padStart(2,'0'), d=String(base.getDate()).padStart(2,'0');
      o.push({ time:`${y}-${m}-${d}`, open, high, low, close });
      p=close;
    } return o;
  }
  function calcMACD(data){ const c=data.map(d=>d.close); const ema=(p,acc)=>{ const k=2/(p+1); let prev=acc[0]; const out=[prev]; for(let i=1;i<c.length;i++){ prev=c[i]*k+prev*(1-k); out.push(prev);} return out; };
    const e12=ema(12,c), e26=ema(26,c); const dif=e12.map((v,i)=>v-e26[i]); const dea=ema(9,dif);
    const hist=dif.map((v,i)=>(v-dea[i]).toFixed(2)); const difR=dif.map(v=>+v.toFixed(2)); const deaR=dea.map(v=>+v.toFixed(2));
    return data.map((d,i)=>({ time:d.time, dif:difR[i], dea:deaR[i], hist:+hist[i] }));
  }
  function calcKD(data){ const c=data.map(d=>d.close), h=data.map(d=>d.high), l=data.map(d=>d.low); const K=[],D=[]; let pk=50,pd=50;
    for(let i=0;i<c.length;i++){ const lo=Math.min(...l.slice(Math.max(0,i-8),i+1)), hi=Math.max(...h.slice(Math.max(0,i-8),i+1)); const rsv=hi===lo?50:((c[i]-lo)/(hi-lo)*100); pk=pk+2/3*(rsv-pk); pd=pd+2/3*(pk-pd); K.push(+pk.toFixed(2)); D.push(+pd.toFixed(2)); }
    return K.map((v,i)=>({ time:data[i].time, k:v, d:D[i] }));
  }
  let klChart=null, klSeries=null, klMacd=null, klKD=null, klInited=false;
  function klInit(){
    if(klInited||typeof LightweightCharts==='undefined') return;
    const el=document.getElementById('tv_chart');
    if(!el) return;
    const h=el.clientHeight||360;
    klChart=LightweightCharts.createChart(el, {
      layout:{ background:{type:'solid', color:'transparent'}, textColor:'#94a3b8' },
      grid:{ vertLines:{color:'rgba(148,163,184,0.1)'}, horzLines:{color:'rgba(148,163,184,0.1)'} },
      rightPriceScale:{ borderColor:'rgba(148,163,184,0.2)' },
      timeScale:{ borderColor:'rgba(148,163,184,0.2)', timeVisible:false },
      crosshair:{ mode: LightweightCharts.CrosshairMode.Normal },
      width: el.clientWidth, height: h
    });
    klSeries=klChart.addCandlestickSeries({ upColor:'#ef4444', downColor:'#22c55e', borderUpColor:'#ef4444', borderDownColor:'#22c55e', wickUpColor:'#ef4444', wickDownColor:'#22c55e' });
    try { klSeries.setData(TWII_KDATA); } catch(e){ console.warn('setData',e); }
    klInited=true;
    window.addEventListener('resize', ()=>{ if(klChart) klChart.resize(el.clientWidth, el.clientHeight||360); });
  }
  function klAddIndicator(name){
    if(!klChart||!klSeries) return;
    const d=klSeries.getData ? klSeries.getData() : [];
    if(!d.length) return;
    if(name==='MACD'){ if(klMacd) return; const m=calcMACD(d);
      const pane=klChart.addPane ? klChart.addPane({}) : null;
      const s1=klChart.addLineSeries({ color:'#3b82f6', lineWidth:1, priceScaleId:'macd' }); s1.setData(m.map(x=>({time:x.time,value:x.dif})));
      const s2=klChart.addLineSeries({ color:'#f59e0b', lineWidth:1, priceScaleId:'macd' }); s2.setData(m.map(x=>({time:x.time,value:x.dea})));
      klMacd=true;
    } else if(name==='KDJ'||name==='KD'){ if(klKD) return; const k=calcKD(d);
      const s3=klChart.addLineSeries({ color:'#a855f7', lineWidth:1 }); s3.setData(k.map(x=>({time:x.time,value:x.k})));
      const s4=klChart.addLineSeries({ color:'#14b8a', lineWidth:1 }); s4.setData(k.map(x=>({time:x.time,value:x.d})));
      klKD=true;
    }
  }
  function klDraw(type){ /* lightweight-charts v4 standalone 免費版無 overlay 繪圖工具，暫保留介面 */ }
  function klRemoveAll(){ if(klChart) klChart.remove(); klChart=null; klSeries=null; klMacd=null; klKD=null; klInited=false; }
  function _initWhenReady(){ if(document.readyState!=='loading'){ klInit(); } else { document.addEventListener('DOMContentLoaded', klInit); } }
  _initWhenReady();
</script>
