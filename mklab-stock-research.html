<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<base href="/mklab-stock/">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="mklab-stock — 台股/美股即時儀表板，大盤、產業、篩選、個股研究一站掌握">
<title>mklab-stock</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
<link rel="stylesheet" href="assets/css/mklab-theme.css">
<link rel="stylesheet" href="assets/css/layout.css">
<link rel="stylesheet" href="assets/css/component.css">
<link rel="stylesheet" href="assets/css/mobile.css">
</head>
<body>
<header class="sticky-header" role="banner">
  <nav id="mainNav" class="nav" aria-label="主導覽"></nav>
  <div id="utilbar" class="utilbar">
    <span class="brand" id="brand"></span>
    <span class="spacer"></span>
    <!-- 手機導航按鈕 - 由 CSS media query 控制顯示/隱藏 -->
    <button class="mobile-menu-btn" onclick="MKLAB.Drawer.toggle()" aria-label="開啟選單">
      <span class="hamburger">☰</span>
    </button>
  </div>
  <div class="freshness" aria-live="polite">資料載入中…</div>
</header>
<!-- Mobile navigation placeholder -->
<aside class="drawer" id="drawer" role="dialog" aria-modal="true" aria-labelledby="drawerTitle">
  <button class="close-x" onclick="MKLAB.Drawer.close()" aria-label="關閉抽屜">×</button>
  <div class="drawer-content" id="drawerContent">
    <!-- 由 MKLAB.Drawer.init() 動態注入 drawerHTML() -->
  </div>
</aside>
<div class="drawer-mask" onclick="MKLAB.Drawer.close()" aria-hidden="true"></div>
<main class="wrap">



<div class="layout">
  <div class="panel">
    <h3>個股選擇</h3>
    <div class="row-input">
      <input id="symQ" placeholder="搜尋代號，如 2330" onkeydown="if(event.key==='Enter')searchSym()">
      <button onclick="searchSym()">搜尋</button>
    </div>
    <div class="symlist" id="symList"></div>
  </div>

  <div>
    <div class="card" id="infoCard"><p class="text-muted text-center">請選擇個股</p></div>

    <div class="card">
      <h3 id="chartTitle">歷史價格圖（TWII 加權指數 · 近 1 年）</h3>
      <div class="kline-toolbar">
        <button onclick="klAddIndicator('MACD')" class="btn btn-secondary btn-sm">MACD</button>
        <button onclick="klAddIndicator('KDJ')" class="btn btn-secondary btn-sm">KD</button>
        <button onclick="klClear()" class="btn btn-ghost btn-sm">清除</button>
      </div>
      <mklab-kline id="tvChart" height="400"></mklab-kline>
    </div>

    <div class="card">
          <h3>財報摘要</h3>
          <div class="table-wrap" style="position:relative;">
            <table id="finTable"></table>
            <div id="finTablePlaceholder" class="text-muted text-center py-4" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;">
              請選擇個股以顯示財報摘要
            </div>
          </div>
        </div>
  </div>
</div>

<div class="disclaimer">僅供參考，非投資建議</div>

<script src="assets/js/data-client.js"></script>
<script src="assets/js/mklab-core.js"></script>
<script src="assets/js/mklab-wc.js"></script>
<script src="vendor/lightweight-charts.min.js"></script>
<script>
// Static fallback data
const STATIC = {
  "2330":{name:"台積電",price:1050,chg:+1.2,pe:24.1,pb:5.2,roe:28.1,roa:15.3,eps:43.6},
  "2317":{name:"鴻海",price:215,chg:+0.9,pe:18.3,pb:2.1,roe:14.2,roa:6.8,eps:11.7},
  "2454":{name:"聯發科",price:1280,chg:-0.5,pe:30.2,pb:4.8,roe:22.5,roa:14.0,eps:42.4},
  "2308":{name:"台達電",price:368,chg:+0.7,pe:26.5,pb:3.9,roe:16.5,roa:9.2,eps:13.9},
  "2412":{name:"中華電",price:122,chg:+0.1,pe:22.0,pb:2.3,roe:10.5,roa:4.1,eps:5.5},
};

let STOCKS = {};
let chart = null;
let series = null;
let finTable = null;
let extraLines = [];
let currentSym = '';

function loadAll() {
  return MKLAB.data.stocks().then(d => {
    if (d && Array.isArray(d) && d.length) {
      const o = {};
      d.forEach(s => { if (s.sym) o[s.sym] = { name: s.name, price: s.price, chg: s.chg, pe: s.pe, pb: s.pb, roe: s.roe, roa: s.roa, eps: s.eps }; });
      STOCKS = Object.assign({}, STATIC, o);
    } else {
      STOCKS = Object.assign({}, STATIC);
    }
    renderList();
    return MKLAB.data.json('stocks');
  }).then(meta => {
    const asof = meta && meta.meta && meta.meta.as_of;
    MKLAB.setFreshness(asof);
    const q = new URLSearchParams(location.search).get('sym');
    if (q && STOCKS[q]) selectSym(q);
    else loadKLine();
  }).catch(() => {
    STOCKS = Object.assign({}, STATIC);
    renderList();
    loadKLine();
  });
}

function searchSym() {
  const v = document.getElementById('symQ').value.trim().toUpperCase();
  if (!v) return renderList();
  const hits = Object.keys(STOCKS).filter(k => k.includes(v) || (STOCKS[k].name || '').includes(v)).slice(0, 12);
  document.getElementById('symList').innerHTML = hits.map(k => `<div data-s="${k}" onclick="selectSym('${k}')">${k} ${STOCKS[k].name || ''}</div>`).join('') || '<div class="text-muted text-sm text-center py-2">無符合代號</div>';
  if (hits.length === 1 && STOCKS[hits[0]]) selectSym(hits[0]);
}

function renderList() {
  const keys = Object.keys(STOCKS).slice(0, 20);
  document.getElementById('symList').innerHTML = keys.map(s => `<div data-s="${s}" onclick="selectSym('${s}')">${s} ${STOCKS[s].name || ''}</div>`).join('');
}

function selectSym(sym) {
  if (!STOCKS[sym]) return;
  currentSym = sym;
  document.querySelectorAll('#symList div').forEach(d => d.classList.toggle('on', d.dataset.s === sym));
  const m = STOCKS[sym];
  const chgCls = m.chg >= 0 ? 'up' : 'down', chgTxt = (m.chg > 0 ? '+' : '') + m.chg + '%';
  const kv = (k, v) => '<div><div class="k">' + k + '</div><div class="v">' + v + '</div></div>';
  document.getElementById('infoCard').innerHTML =
    '<h3>' + sym + ' ' + m.name + ' <span class="' + chgCls + '">' + chgTxt + '</span></h3>' +
    '<div class="kv">' +
      kv('價格', m.price != null ? m.price : '-') +
      kv('PE', m.pe != null ? m.pe : '-') +
      kv('PB', m.pb != null ? m.pb : '-') +
      kv('ROE', (m.roe != null ? m.roe.toFixed(1) : '-') + '%') +
      kv('EPS', m.eps != null ? m.eps : '-') +
      kv('ROA', (m.roa != null ? m.roa.toFixed(1) : '-') + '%') +
    '</div>';
  document.getElementById('chartTitle').textContent = '歷史價格圖（' + sym + ' ' + (m.name || '') + ' · TWII 加權指數參考）';
  loadKLine();
  const finRow = Object.assign({ sym: sym }, m);
  if (!finTable) {
    finTable = MKLAB.DataTable('finTable', {
      cols: ['sym', 'name', 'price', 'chg', 'pe', 'pb', 'roe', 'roa', 'eps'],
      rows: [finRow],
      pageSize: 0,
    });
  } else {
    finTable.setRows([finRow]);
  }
  // hide placeholder when table has data
  const placeholder = document.getElementById('finTablePlaceholder');
  if (placeholder) placeholder.style.display = 'none';
}

function loadKLine() {
  const raw = window.TWII_KDATA;
  if (!raw || !raw.length) {
    document.getElementById('tvChart').innerHTML = '<div class="text-muted text-sm text-center py-6">K線資料載入中…</div>';
    return;
  }
  if (chart) {
    try { chart.remove(); } catch (e) {}
    chart = null; series = null; extraLines = [];
  }
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  chart = LightweightCharts.createChart(document.getElementById('tvChart'), {
    width: document.getElementById('tvChart').clientWidth || 600,
    height: 400,
    layout: {
      background: { type: 'solid', color: 'transparent' },
      textColor: isDark ? '#9aa0a6' : '#6b7280',
    },
    rightPriceScale: { borderColor: isDark ? '#2a2f3a' : '#e5e7eb' },
    timeScale: {
      borderColor: isDark ? '#2a2f3a' : '#e5e7eb',
      timeVisible: true,
      secondsVisible: false,
    },
    grid: {
      vertLines: { color: isDark ? '#2a2f3a20' : '#e5e7eb40' },
      horzLines: { color: isDark ? '#2a2f3a20' : '#e5e7eb40' },
    },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
  });
  series = chart.addCandlestickSeries({
    upColor: '#f87171', downColor: '#4ade80',
    borderUpColor: '#f87171', borderDownColor: '#4ade80',
    wickUpColor: '#f87171', wickDownColor: '#4ade80',
  });
  series.setData(raw);
  chart.timeScale().fitContent();
  window.addEventListener('resize', () => {
    if (chart) {
      const w = document.getElementById('tvChart').clientWidth;
      if (w > 0) chart.resize(w, 400);
    }
  });
}

function klAddIndicator(name) {
  if (!series) return;
  const data = window.TWII_KDATA || [];
  if (!data.length) return;
  const closes = data.map(d => d.close);
  if (name === 'MACD') {
    const ema = (period, arr) => { const k = 2 / (period + 1); let prev = arr[0]; const out = [prev]; for (let i = 1; i < arr.length; i++) { prev = arr[i] * k + prev * (1 - k); out.push(prev); } return out; };
    const e12 = ema(12, closes), e26 = ema(26, closes);
    const dif = e12.map((v, i) => v - e26[i]);
    const dea = ema(9, dif);
    const hist = dif.map((v, i) => +(v - dea[i]).toFixed(2));
    const l1 = chart.addLineSeries({ color: '#3b82f6', lineWidth: 1 });
    const l2 = chart.addLineSeries({ color: '#f59e0b', lineWidth: 1 });
    const l3 = chart.addLineSeries({ color: '#64748b', lineWidth: 1 });
    l1.setData(data.map((d, i) => ({ time: d.time, value: +dif[i].toFixed(2) })));
    l2.setData(data.map((d, i) => ({ time: d.time, value: +dea[i].toFixed(2) })));
    l3.setData(data.map((d, i) => ({ time: d.time, value: hist[i], color: hist[i] >= 0 ? '#ef4444' : '#22c55e' })));
    extraLines.push(l1, l2, l3);
  } else if (name === 'KDJ' || name === 'KD') {
    const highs = data.map(d => d.high), lows = data.map(d => d.low);
    const K = [], D = []; let pk = 50, pd = 50;
    for (let i = 0; i < closes.length; i++) {
      const lo = Math.min(...lows.slice(Math.max(0, i - 8), i + 1));
      const hi = Math.max(...highs.slice(Math.max(0, i - 8), i + 1));
      const rsv = hi === lo ? 50 : ((closes[i] - lo) / (hi - lo) * 100);
      pk = pk + 2 / 3 * (rsv - pk); pd = pd + 2 / 3 * (pk - pd);
      K.push(+pk.toFixed(2)); D.push(+pd.toFixed(2));
    }
    const l1 = chart.addLineSeries({ color: '#a855f7', lineWidth: 1 });
    const l2 = chart.addLineSeries({ color: '#14b8a6', lineWidth: 1 });
    l1.setData(data.map((d, i) => ({ time: d.time, value: K[i] })));
    l2.setData(data.map((d, i) => ({ time: d.time, value: D[i] })));
    extraLines.push(l1, l2);
  }
}

function klClear() {
  extraLines.forEach(l => { try { chart.removeSeries(l); } catch (e) {} });
  extraLines = [];
}

window.addEventListener('DOMContentLoaded', function () {
  loadAll();
  MKLAB.initDrawer();
  MKLAB.Shell.mount({ active: 'research' });
});
</script>
</main>
