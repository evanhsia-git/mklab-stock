<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mklab-stock Research</title>
<base href="/mklab-stock/">
<style>
  :root { --bg:#f7f8fa; --surface:#fff; --ink:#1a1d21; --muted:#6b7280; --border:#e5e7eb; --accent:#2563eb; --up:#dc2626; --down:#16a34a; --row-hover:#eff6ff; --radius:12px; --shadow:0 1px 3px rgba(0,0,0,.08); }
  [data-theme="dark"] { --bg:#0f1115; --surface:#171a21; --ink:#e8eaed; --muted:#9aa0a6; --border:#2a2f3a; --accent:#3b82f6; --up:#f87171; --down:#4ade80; --row-hover:#1e2a3a; --shadow:0 1px 3px rgba(0,0,0,.4); }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif; background:var(--bg); color:var(--ink); line-height:1.5; padding-bottom:20px; }
  .nav { position:sticky; top:0; z-index:26; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:4px; padding:10px 12px; }
  .nav a { color:var(--ink); text-decoration:none; font-size:14px; padding:6px 10px; border-radius:8px; white-space:nowrap; }
  .nav a.active { background:var(--accent); color:#fff; }
  .utilbar { position:sticky; top:49px; z-index:25; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; padding:8px 12px; }
  .utilbar .spacer { flex:1; }
  .brand { font-weight:700; font-size:15px; margin-right:4px; white-space:nowrap; }
  .search { display:flex; align-items:center; gap:4px; background:var(--bg); border:1px solid var(--border); border-radius:20px; padding:4px 10px; }
  .search.collapsed input { display:none; }
  .search.expanded input { display:block; width:160px; background:var(--surface); color:var(--ink); border:1px solid var(--border); border-radius:16px; padding:4px 10px; outline:none; }
  .fab-btn { width:40px; height:40px; border-radius:50%; border:1px solid var(--border); background:var(--surface); color:var(--ink); cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow); }
  .freshness { background:#fff7ed; color:#9a3412; font-size:12px; padding:6px 12px; border-bottom:1px solid var(--border); text-align:center; }
  [data-theme="dark"] .freshness { background:#2a1d12; color:#fdba74; }
  .wrap { max-width:1200px; margin:0 auto; padding:12px; }
  .up { color:var(--up); } .down { color:var(--down); }
  .layout { display:block; }
  @media (min-width:1024px){ .layout{ display:grid; grid-template-columns:260px 1fr; gap:16px; } }
  .panel { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px; box-shadow:var(--shadow); margin-bottom:12px; }
  .panel h3 { font-size:14px; margin-bottom:10px; }
  .row-input { display:flex; gap:6px; margin-bottom:10px; }
  .row-input input { flex:1; padding:8px; border:1px solid var(--border); border-radius:8px; background:var(--bg); color:var(--ink); }
  .row-input button { padding:8px 12px; background:var(--accent); color:#fff; border:none; border-radius:8px; cursor:pointer; }
  .symlist div { padding:8px; border-radius:8px; cursor:pointer; font-size:13px; }
  .symlist div:hover { background:var(--row-hover); }
  .symlist .on { background:var(--accent); color:#fff; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px; box-shadow:var(--shadow); margin-bottom:12px; }
  .card h3 { font-size:15px; margin-bottom:8px; }
  .kv { display:grid; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:10px; }
  .kv .k { font-size:11px; color:var(--muted); } .kv .v { font-size:16px; font-weight:700; }
  .kv .small { font-size:13px; }
  .kline-toolbar { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; }
  .kline-toolbar button { padding:5px 10px; font-size:12px; border:1px solid var(--border); border-radius:8px; background:var(--bg); color:var(--ink); cursor:pointer; }
  .kline-toolbar button.on { background:var(--accent); color:#fff; border-color:var(--accent); }
  #tvChart { width:100%; height:460px; border:1px solid var(--border); border-radius:var(--radius); }
  .table-wrap { overflow-x:auto; margin-top:12px; }
  table { width:100%; border-collapse:collapse; }
  th,td { padding:8px 6px; text-align:right; font-size:13px; border-bottom:1px solid var(--border); white-space:nowrap; }
  th:first-child,td:first-child { text-align:left; }
  th { font-size:12px; color:var(--muted); font-weight:600; }
  .drawer-mask { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:40; display:none; }
  .drawer-mask.open { display:block; }
  .drawer { position:fixed; top:0; right:0; width:300px; max-width:85vw; background:var(--surface); border-left:1px solid var(--border); z-index:50; transform:translateX(100%); transition:.25s; padding:16px; overflow-y:auto; }
  .drawer.open { transform:translateX(0); }
  .close-x { float:right; background:none; border:none; font-size:20px; color:var(--muted); cursor:pointer; }
  .disclaimer { font-size:11px; color:var(--muted); text-align:center; padding:16px; }
</style>
</head>
<body>
  <nav id="mainNav" class="nav"></nav>
  <div id="utilbar" class="utilbar"><span class="brand" id="brand"></span><span class="spacer"></span></div>
  <div class="freshness">資料以 2026-07-13 收盤為準（Build-Time）</div>
  <div class="drawer-mask" onclick="MKLAB.Drawer.close()"></div>
  <aside class="drawer" id="drawer"><button class="close-x" onclick="MKLAB.Drawer.close()">×</button></aside>
  <div class="wrap">
    <div class="layout">
      <div class="panel">
        <h3>個股選擇</h3>
        <div class="row-input">
          <input id="symQ" placeholder="搜尋代號，如 2330" onkeydown="if(event.key==='Enter')searchSym()">
          <button onclick="searchSym()">搜尋</button>
        </div>
        <div class="symlist" id="symList"></div>
      </div>
      <div>
        <div class="card" id="infoCard"><p style="color:var(--muted);font-size:13px;text-align:center">請選擇個股</p></div>
        <div class="card">
          <h3>歷史價格圖</h3>
          <div class="kline-toolbar">
            <button onclick="klAddIndicator('MACD')">MACD</button>
            <button onclick="klAddIndicator('KDJ')">KD</button>
            <button onclick="klClear()">清除</button>
          </div>
          <div id="tvChart"></div>
        </div>
        <div class="card">
          <h3>財報摘要</h3>
          <div class="table-wrap">
            <table id="finTable"><thead></thead><tbody></tbody></table>
          </div>
        </div>
      </div>
    </div>
    <div class="disclaimer">僅供參考，非投資建議</div>
  </div>
<script src="vendor/lightweight-charts.min.js"></script>
<script src="data/twii_kdata.js"></script>
<script src="assets/mklab-core.js"></script>
<script>
let STOCKS = {};
let chart = null;
let series = null;
let finTable = null;
let extraLines = [];

const STATIC = {
  "2330":{name:"台積電",price:1050,chg:+1.2,pe:24.1,pb:5.2,roe:28.1,roa:15.3,eps:43.6},
  "2317":{name:"鴻海",price:215,chg:+0.9,pe:18.3,pb:2.1,roe:14.2,roa:6.8,eps:11.7},
  "2454":{name:"聯發科",price:1280,chg:-0.5,pe:30.2,pb:4.8,roe:22.5,roa:14.0,eps:42.4},
  "2308":{name:"台達電",price:368,chg:+0.7,pe:26.5,pb:3.9,roe:16.5,roa:9.2,eps:13.9},
  "2412":{name:"中華電",price:122,chg:+0.1,pe:22.0,pb:2.3,roe:10.5,roa:4.1,eps:5.5},
};

function loadAll(){
  return fetch('data/stocks.json').then(r=>r.json()).then(d=>{
    if(d && Array.isArray(d.stocks)){
      const o={};
      d.stocks.forEach(s=>{ if(s.sym) o[s.sym]={name:s.name,price:s.price,chg:s.chg,pe:s.pe,pb:s.pb,roe:s.roe,roa:s.roa,eps:s.eps}; });
      STOCKS = Object.assign({}, STATIC, o);
    } else { STOCKS = Object.assign({}, STATIC); }
    renderList();
    const q = new URLSearchParams(location.search).get('sym');
    if(q && STOCKS[q]) selectSym(q);
  }).catch(()=>{ STOCKS = Object.assign({}, STATIC); renderList(); });
}

function searchSym(){
  const v=document.getElementById('symQ').value.trim().toUpperCase();
  if(!v) return renderList();
  const hits=Object.keys(STOCKS).filter(k=>k.includes(v)||(STOCKS[k].name||'').includes(v)).slice(0,12);
  document.getElementById('symList').innerHTML=hits.map(k=>`<div data-s="${k}" onclick="selectSym('${k}')">${k} ${STOCKS[k].name||''}</div>`).join('')||'<div style="color:var(--muted);padding:8px">無符合代號</div>';
  if(hits.length===1 && STOCKS[hits[0]]) selectSym(hits[0]);
}

function renderList(){
  const keys = Object.keys(STOCKS).slice(0,20);
  document.getElementById('symList').innerHTML = keys.map(s=>`<div data-s="${s}" onclick="selectSym('${s}')">${s} ${STOCKS[s].name||''}</div>`).join('');
}

function selectSym(sym){
  if(!STOCKS[sym]) return;
  document.querySelectorAll('#symList div').forEach(d=>d.classList.toggle('on',d.dataset.s===sym));
  const m = STOCKS[sym];
  const chgCls = m.chg>=0?'up':'down', chgTxt = (m.chg>0?'+':'')+m.chg+'%';
  const kv = (k,v)=>'<div><div class="k">'+k+'</div><div class="v">'+v+'</div></div>';
  document.getElementById('infoCard').innerHTML =
    '<h3>'+sym+' '+m.name+' <span class="'+chgCls+'">'+chgTxt+'</span></h3>' +
    '<div class="kv">'+
      kv('價格', m.price!=null?m.price:'-')+kv('PE', m.pe!=null?m.pe:'-')+kv('PB', m.pb!=null?m.pb:'-')+
      kv('ROE', (m.roe!=null?m.roe.toFixed(1):'-')+'%')+kv('EPS', m.eps!=null?m.eps:'-')+kv('ROA', (m.roa!=null?m.roa.toFixed(1):'-')+'%')+
    '</div>';
  // 嘗試載入 TWII K 線資料（無該股即時API時用 TWII 示意）
  loadKLine(sym);
  // 財報表格
  if(!finTable){
    finTable = MKLAB.DataTable('finTable', {
      cols: ['sym','price','chg','pe','pb','roe','roa','eps'],
      rows: [m],
      pageSize: 0,
    });
  } else {
    finTable.setRows([m]);
  }
}

function loadKLine(sym){
  const data = window.TWII_KDATA;
  if(!data || !data.length){
    document.getElementById('tvChart').innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted)">K線資料載入中…</div>';
    return;
  }
  if(!chart){
    chart = LightweightCharts.createChart(document.getElementById('tvChart'), {
      width: document.getElementById('tvChart').clientWidth || 600,
      height: 400,
      layout: { backgroundColor: 'transparent', textColor: '#9aa0a6' },
      grid: { vertLines: {color:'#2a2f3a'}, horzLines: {color:'#2a2f3a'} },
      crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
      timeScale: { timeVisible: true, secondsVisible: false },
    });
    series = chart.addCandlestickSeries();
    chart.timeScale().fitContent();
  }
  series.setData(data);
}

function klAddIndicator(name){
  if(!series) return;
  const data = series._data || [];
  if(!data.length) return;
  const closes = data.map(d=>d.close);
  if(name==='MACD'){
    const ema = (period, arr)=>{ const k=2/(period+1); let prev=arr[0]; const out=[prev]; for(let i=1;i<arr.length;i++){ prev=arr[i]*k+prev*(1-k); out.push(prev);} return out; };
    const e12=ema(12,closes), e26=ema(26,closes);
    const dif=e12.map((v,i)=>v-e26[i]);
    const dea=ema(9,dif);
    const hist=dif.map((v,i)=>+(v-dea[i]).toFixed(2));
    const l1 = chart.addLineSeries({color:'#3b82f6',lineWidth:1});
    const l2 = chart.addLineSeries({color:'#f59e0b',lineWidth:1});
    const l3 = chart.addLineSeries({color:'#64748b',lineWidth:1});
    l1.setData(data.map((d,i)=>({time:d.time,value:+dif[i].toFixed(2)})));
    l2.setData(data.map((d,i)=>({time:d.time,value:+dea[i].toFixed(2)})));
    l3.setData(data.map((d,i)=>({time:d.time,value:hist[i],color:hist[i]>=0?'#ef4444':'#22c55e'})));
    extraLines.push(l1,l2,l3);
  } else if(name==='KDJ' || name==='KD'){
    const highs = data.map(d=>d.high), lows = data.map(d=>d.low);
    const K=[], D=[]; let pk=50, pd=50;
    for(let i=0;i<closes.length;i++){
      const lo=Math.min(...lows.slice(Math.max(0,i-8),i+1));
      const hi=Math.max(...highs.slice(Math.max(0,i-8),i+1));
      const rsv=hi===lo?50:((closes[i]-lo)/(hi-lo)*100);
      pk=pk+2/3*(rsv-pk); pd=pd+2/3*(pk-pd);
      K.push(+pk.toFixed(2)); D.push(+pd.toFixed(2));
    }
    const l1 = chart.addLineSeries({color:'#a855f7',lineWidth:1});
    const l2 = chart.addLineSeries({color:'#14b8a6',lineWidth:1});
    l1.setData(data.map((d,i)=>({time:d.time,value:K[i]})));
    l2.setData(data.map((d,i)=>({time:d.time,value:D[i]})));
    extraLines.push(l1,l2);
  }
}

function klClear(){
  extraLines.forEach(l=>{ try{ chart.removeSeries(l); }catch(e){} });
  extraLines = [];
}

window.addEventListener('resize', ()=>{
  if(chart){
    const w = document.getElementById('tvChart').clientWidth;
    if(w>0) chart.resize(w, 400);
  }
});

loadAll();
MKLAB.initDrawer();
MKLAB.Shell.mount({ active:'research' });
</script>
</body>
</html>
