<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mklab-stock Research 原型 v11（個股研究中心）</title>
<style>
  :root { --bg:#0f1115; --surface:#171a21; --ink:#e8eaed; --muted:#9aa0a6; --border:#2a2f3a; --accent:#3b82f6; --up:#f87171; --down:#4ade80; --radius:10px; --shadow:0 1px 3px rgba(0,0,0,.4); }
  [data-theme="light"] { --bg:#f7f8fa; --surface:#fff; --ink:#1a1d21; --muted:#6b7280; --border:#e5e7eb; --accent:#2563eb; --up:#dc2626; --down:#16a34a; --shadow:0 1px 3px rgba(0,0,0,.08); }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif; background:var(--bg); color:var(--ink); line-height:1.5; }
  .nav { position:sticky; top:0; z-index:25; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:4px; padding:10px 12px; }
  .nav a { color:var(--ink); text-decoration:none; font-size:14px; padding:6px 10px; border-radius:8px; white-space:nowrap; }
  .nav a.active { background:var(--accent); color:#fff; }
  .utilbar { position:sticky; top:49px; z-index:24; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; padding:8px 12px; }
  .utilbar .spacer { flex:1; }
  .brand { font-weight:700; font-size:15px; margin-right:4px; white-space:nowrap; }
  .search { display:flex; align-items:center; gap:4px; background:var(--bg); border:1px solid var(--border); border-radius:20px; padding:4px 10px; }
  .search.collapsed input { display:none; }
  .search.expanded input { display:block; width:160px; background:var(--surface); color:var(--ink); border:1px solid var(--border); border-radius:16px; padding:4px 10px; outline:none; }
  .fab-btn { width:40px; height:40px; border-radius:50%; border:1px solid var(--border); background:var(--surface); color:var(--ink); cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow); }
  .fab-btn svg { width:20px; height:20px; display:block; }
  .freshness { background:#fff7ed; color:#9a3412; font-size:12px; padding:6px 12px; border-bottom:1px solid var(--border); text-align:center; }
  [data-theme="dark"] .freshness { background:#2a1d12; color:#fdba74; }
  .wrap { max-width:1200px; margin:0 auto; padding:12px; }
  @media (min-width:1024px){ .wrap{ padding:16px 24px; } }
  .up { color:var(--up); } .down { color:var(--down); }
  .layout { display:block; }
  @media (min-width:1024px){ .layout{ display:grid; grid-template-columns:260px 1fr; gap:16px; } }
  .panel { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px; box-shadow:var(--shadow); margin-bottom:12px; }
  .panel h3 { font-size:14px; margin-bottom:10px; }
  .row-input { display:flex; gap:6px; margin-bottom:10px; }
  .row-input input { flex:1; padding:8px; border:1px solid var(--border); border-radius:8px; background:var(--bg); color:var(--ink); }
  .row-input button { padding:8px 12px; background:var(--accent); color:#fff; border:none; border-radius:8px; cursor:pointer; }
  .symlist div { padding:8px; border-radius:8px; cursor:pointer; font-size:13px; }
  .symlist div:hover { background:var(--row-hover); }
  .symlist .on { background:var(--accent); color:#fff; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px; box-shadow:var(--shadow); margin-bottom:12px; }
  .card h3 { font-size:15px; margin-bottom:8px; }
  .kv { display:grid; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:10px; }
  .kv .k { font-size:11px; color:var(--muted); } .kv .v { font-size:16px; font-weight:700; }
  .chartbox { position:relative; height:160px; }
  .chartbox svg { width:100%; height:160px; display:block; }
  .tip { position:absolute; left:0; right:0; bottom:-20px; background:var(--surface); color:var(--ink); border:1px solid var(--border); border-radius:6px; padding:2px 6px; font-size:11px; text-align:center; box-shadow:var(--shadow); display:none; z-index:5; }
  table { width:100%; border-collapse:collapse; }
  th,td { padding:8px 6px; text-align:right; font-size:13px; border-bottom:1px solid var(--border); white-space:nowrap; }
  th:first-child,td:first-child { text-align:left; }
  th { font-size:12px; color:var(--muted); font-weight:600; }
  .disclaimer { font-size:11px; color:var(--muted); text-align:center; padding:16px 12px; }
  /* KLineChart 自託管 */
  .kline-toolbar { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; }
  .kline-toolbar button { padding:5px 10px; font-size:12px; border:1px solid var(--border); border-radius:8px; background:var(--bg); color:var(--ink); cursor:pointer; }
  .kline-toolbar button.on { background:var(--accent); color:#fff; border-color:var(--accent); }
  /* drawer */
  .toolbar { display:flex; align-items:center; gap:8px; margin:4px 4px 10px; flex-wrap:wrap; }
  .toolbar label { font-size:13px; color:var(--muted); }
  .toolbar select { background:var(--surface); color:var(--ink); border:1px solid var(--border); border-radius:8px; padding:6px 8px; font-size:13px; }
  .drawer-mask { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:40; display:none; }
  .drawer-mask.open { display:block; }
  .drawer { position:fixed; top:0; right:0; height:100%; width:300px; max-width:85vw; background:var(--surface); border-left:1px solid var(--border); z-index:50; transform:translateX(100%); transition:transform .25s ease; padding:16px; overflow-y:auto; box-shadow:var(--shadow); }
  .drawer.open { transform:translateX(0); }
  .drawer h3 { font-size:15px; margin-bottom:12px; }
  .drawer h4 { font-size:13px; color:var(--muted); margin:16px 0 8px; }
  .row { display:flex; align-items:center; justify-content:space-between; padding:8px 0; font-size:14px; }
  .row input { width:90px; padding:4px 6px; border:1px solid var(--border); border-radius:6px; background:var(--bg); color:var(--ink); }
  .switch { width:44px; height:24px; border-radius:12px; background:var(--border); position:relative; cursor:pointer; border:none; }
  .switch.on { background:var(--accent); }
  .switch::after { content:""; position:absolute; top:2px; left:2px; width:20px; height:20px; border-radius:50%; background:#fff; transition:left .2s; }
  .switch.on::after { left:22px; }
  .seg { display:flex; border:1px solid var(--border); border-radius:8px; overflow:hidden; }
  .seg button { flex:1; padding:6px; background:var(--surface); color:var(--ink); border:none; font-size:13px; }
  .seg button.on { background:var(--accent); color:#fff; }
  .close-x { float:right; background:none; border:none; font-size:20px; color:var(--muted); cursor:pointer; }
  .drawer a { color:var(--accent); text-decoration:none; }
  .sys-note { font-size:12px; color:var(--muted); line-height:1.6; }
</style>
<script src="vendor/klinecharts.min.js"></script>
</head>
<body>
  <div id="utilbar" class="utilbar"><span class="brand" id="brand"></span><nav id="mainNav" class="nav"></nav><span class="spacer"></span></div>
  <div class="freshness">資料以 2026-07-13 收盤為準（前一日，非即時）</div>
  <div class="drawer-mask" onclick="MKLAB.Drawer.close()"></div>
  <aside class="drawer" id="drawer">
    <button class="close-x" onclick="MKLAB.Drawer.close()">×</button>
  </aside>
  <div class="wrap">
    <div class="layout">
      <div class="panel">
        <h3>個股選擇</h3>
        <div class="row-input">
          <input id="q2" placeholder="搜尋代號，如 2330">
          <button onclick="search()">搜</button>
        </div>
        <div class="symlist" id="symlist"></div>
      </div>
      <div>
        <div class="card" id="infoCard"></div>
        <div class="card">
          <h3>歷史價格圖（K線 + MACD + KD，自託管 KLineChart）</h3>
          <div class="kline-toolbar">
            <button onclick="klAddIndicator('MACD')">MACD</button>
            <button onclick="klAddIndicator('KDJ')">KD</button>
            <button onclick="klDraw('segment')">畫線</button>
            <button onclick="klDraw('horizontalStraightLine')">水平線</button>
            <button onclick="klDraw('fibonacciLine')">費波那契</button>
            <button onclick="klRemoveAll()">清除</button>
          </div>
          <div id="priceChart" style="height:42vh;min-height:300px"></div>
        </div>
        <div class="card">
          <h3>PE Band（本益比區間）</h3>
          <div class="chartbox" id="peChart" onmouseenter="tip('peChart','PE: 24.1x（中位 22x）')" onmouseleave="untip('peChart')"></div>
        </div>
        <div class="card">
          <h3>財報摘要（年度）</h3>
          <table id="finTable"></table>
        </div>
        <div class="disclaimer">個股研究中心原型（示意資料）。生產環境：公司資訊/財報/估值由 Build-Time 計算，歷史圖用 lightweight-charts。</div>
      </div>
    </div>
  </div>
<script src="assets/mklab-core.js"></script>
<script>
  let STOCKS={};
  // 圖表相關變數提前宣告，避免 klRender/klInit 在 TDZ 存取（原本 let 在腳本中段導致 ReferenceError）
  let rChart=null, rSeries=null, rMacd=false, rKD=false, rInited=false;
  const STATIC={
    "2330":{name:"台積電",price:1050,chg:+1.2,pe:24.1,pb:5.2,roe:28.1,roa:15.3,eps:43.6,div:2.1,mc:"27.2兆",sector:"半導體",fin:[["2023",43.6,28.1,2.1],["2024",48.2,30.5,2.3],["2025E",52.0,31.0,2.5]]},
    "2317":{name:"鴻海",price:215,chg:+0.9,pe:18.3,pb:2.1,roe:14.2,roa:6.8,eps:11.7,div:3.8,mc:"2.9兆",sector:"電子代工",fin:[["2023",11.7,14.2,3.8],["2024",12.5,15.0,4.0],["2025E",13.0,15.5,4.2]]},
    "2454":{name:"聯發科",price:1280,chg:-0.5,pe:30.2,pb:4.8,roe:22.5,roa:14.0,eps:42.4,div:2.5,mc:"2.0兆",sector:"IC設計",fin:[["2023",42.4,22.5,2.5],["2024",46.0,23.1,2.7],["2025E",50.0,24.0,2.9]]},
  };
  function loadAll(){ return fetch('data/stocks.json').then(r=>r.json()).then(d=>{ if(d&&Array.isArray(d.stocks)){ const o={}; d.stocks.forEach(s=>{ if(s.sym) o[s.sym]={name:s.name,price:s.price,chg:s.chg,pe:s.pe,pb:s.pb,roe:s.roe,roa:s.roa,eps:s.eps,div:s.div,mc:(s.market_cap!=null?(s.market_cap/1e8).toFixed(1)+'兆':null),sector:s.ind,fin:[]}; }); STOCKS=Object.assign({},STATIC,o); } else { STOCKS=Object.assign({},STATIC); } renderList(); }).catch(()=>{ STOCKS=Object.assign({},STATIC); renderList(); }); }
  function spark(data,color,w,h){ const min=Math.min(...data),max=Math.max(...data),r=(max-min)||1; const p=data.map((d,i)=>`${(i/(data.length-1)*w).toFixed(1)},${(h-((d-min)/r*h)).toFixed(1)}`).join(" "); return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><polyline points="${p}" fill="none" stroke="${color}" stroke-width="1.5"/></svg>`; }
  function gen(seed,n){ const o=[]; let p=seed; for(let i=0;i<n;i++){ p+=(Math.random()-0.45)*seed*0.02; o.push(+p.toFixed(2)); } return o; }
  function tip(id,t){ const el=document.getElementById(id); const x=el.querySelector('.tip'); if(x){x.textContent=t;x.style.display='block';} }
  function untip(id){ const el=document.getElementById(id); const x=el.querySelector('.tip'); if(x)x.style.display='none'; }
  function renderList(){
    document.getElementById('symlist').innerHTML=Object.entries(STOCKS).map(([s,m])=>`<div data-s="${s}" onclick="sel('${s}')">${s} ${m.name}</div>`).join("");
  }
  function sel(s){
    if(!STOCKS[s]) return;   // 資料未就緒時防護，避免 undefined 拋錯中斷腳本
    document.querySelectorAll('#symlist div').forEach(d=>d.classList.toggle('on',d.dataset.s===s));
    const m=STOCKS[s];
    const chgCls = m.chg>=0 ? 'up' : 'down';
    const chgTxt = (m.chg>0?'+':'') + m.chg + '%';
    const kv = (k,v)=>'<div><div class="k">'+k+'</div><div class="v">'+v+'</div></div>';
    document.getElementById('infoCard').innerHTML =
      '<h3>'+s+' '+m.name+' <span class="'+chgCls+'">'+chgTxt+'</span></h3>' +
      '<div class="kv">'+
        kv('價格', m.price!=null?m.price:'-')+kv('PE', m.pe!=null?m.pe:'-')+kv('PB', m.pb!=null?m.pb:'-')+
        kv('ROE', (m.roe!=null?m.roe.toFixed(1):'-')+'%')+kv('EPS', m.eps!=null?m.eps:'-')+kv('殖利率', (m.div!=null?m.div:'-')+'%')+
        kv('市值', m.mc)+kv('產業', '<span style="font-size:13px">'+m.sector+'</span>')+
      '</div>';
    document.getElementById('peChart').innerHTML=spark(gen(m.pe,60),"#3b82f6",600,160);
    klRender(s);
    document.getElementById('finTable').innerHTML=`<tr><th>年度</th><th>EPS</th><th>ROE%</th><th>殖利率%</th></tr>`+m.fin.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td></tr>`).join("");
  }
  function search(){ const v=document.getElementById('q2').value.trim().toLowerCase(); if(!v){ renderList(); return; } const hits=Object.keys(STOCKS).filter(k=>k.toLowerCase().includes(v)||(STOCKS[k].name||'').toLowerCase().includes(v)).slice(0,12); document.getElementById('symlist').innerHTML=hits.map(k=>`<div data-s="${k}" onclick="sel('${k}')">${k} ${STOCKS[k].name}</div>`).join('')||`<div style="color:var(--muted);padding:8px">無符合代號</div>`; if(hits.length===1 && STOCKS[hits[0]]) sel(hits[0]); }
  function openDrawer(){ MKLAB.Drawer.open(); }
  function closeDrawer(){ MKLAB.Drawer.close(); }
  // 工具列與抽屜先初始化（不依賴資料，避免後續資料邏輯報錯中斷）
  MKLAB.initDrawer();
  MKLAB.Shell.mount({ active:'research' });
  // 資料載入完成後再選預設個股；sel 本身有防護（STOCKS 未就緒時直接 return）
  loadAll().then(()=>sel("2330")).catch(()=>{});
  function genKData(n,seed){ const o=[]; let p=seed; const base=new Date(2025,6,14);
    for(let i=0;i<n;i++){ base.setDate(base.getDate()+1);
      const open=p; const close=+(p+(Math.random()-0.48)*seed*0.03).toFixed(1);
      const high=+(Math.max(open,close)+(Math.random()*seed*0.015)).toFixed(1);
      const low=+(Math.min(open,close)-(Math.random()*seed*0.015)).toFixed(1);
      const y=base.getFullYear(), m=String(base.getMonth()+1).padStart(2,'0'), d=String(base.getDate()).padStart(2,'0');
      o.push({ time:`${y}-${m}-${d}`, open, high, low, close }); p=close;
    } return o;
  }
  function calcMACD(data){ const c=data.map(d=>d.close); const ema=(p,arr)=>{ const k=2/(p+1); let prev=arr[0]; const out=[prev]; for(let i=1;i<arr.length;i++){ prev=arr[i]*k+prev*(1-k); out.push(prev);} return out; };
    const e12=ema(12,c), e26=ema(26,c); const dif=e12.map((v,i)=>v-e26[i]); const dea=ema(9,dif);
    const hist=dif.map((v,i)=>+(v-dea[i]).toFixed(2)); const difR=dif.map(v=>+v.toFixed(2)); const deaR=dea.map(v=>+v.toFixed(2));
    return data.map((d,i)=>({ time:d.time, dif:difR[i], dea:deaR[i], hist:+hist[i] }));
  }
  function calcKD(data){ const c=data.map(d=>d.close), h=data.map(d=>d.high), l=data.map(d=>d.low); const K=[],D=[]; let pk=50,pd=50;
    for(let i=0;i<c.length;i++){ const lo=Math.min(...l.slice(Math.max(0,i-8),i+1)), hi=Math.max(...h.slice(Math.max(0,i-8),i+1)); const rsv=hi===lo?50:((c[i]-lo)/(hi-lo)*100); pk=pk+2/3*(rsv-pk); pd=pd+2/3*(pk-pd); K.push(+pk.toFixed(2)); D.push(+pd.toFixed(2)); }
    return data.map((d,i)=>({ time:d.time, k:K[i], d:D[i] }));
  }
  function klInit(s){ if(rInited||typeof LightweightCharts==='undefined') return; const el=document.getElementById('priceChart'); const h=el.clientHeight||360; rChart=LightweightCharts.createChart(el, { layout:{background:{type:'solid',color:'transparent'},textColor:'#94a3b8'}, grid:{vertLines:{color:'rgba(148,163,184,0.1)'},horzLines:{color:'rgba(148,163,184,0.1)'}}, rightPriceScale:{borderColor:'rgba(148,163,184,0.2)'}, timeScale:{borderColor:'rgba(148,163,184,0.2)',timeVisible:false}, width:el.clientWidth, height:h }); rSeries=rChart.addCandlestickSeries({ upColor:'#ef4444', downColor:'#22c55e', borderUpColor:'#ef4444', borderDownColor:'#22c55e', wickUpColor:'#ef4444', wickDownColor:'#22c55e' }); try{ rSeries.setData(genKData(250, STOCKS[s]?STOCKS[s].price:100)); }catch(e){ console.warn('setData',e); } rInited=true; window.addEventListener('resize', ()=>{ if(rChart) rChart.resize(el.clientWidth, el.clientHeight||360); }); }
  function klRender(s){ if(rChart){ try{ rChart.remove(); }catch(e){} rInited=false; rChart=null; rSeries=null; rMacd=false; rKD=false; } klInit(s); if(rSeries) rSeries.setData(genKData(250, STOCKS[s]?STOCKS[s].price:100)); }
  function klAddIndicator(name){ if(!rChart||!rSeries) return; const d=rSeries.getData?rSeries.getData():[]; if(!d.length) return;
    if(name==='MACD'){ if(rMacd) return; const m=calcMACD(d); const s1=rChart.addLineSeries({color:'#3b82f6',lineWidth:1}); s1.setData(m.map(x=>({time:x.time,value:x.dif}))); const s2=rChart.addLineSeries({color:'#f59e0b',lineWidth:1}); s2.setData(m.map(x=>({time:x.time,value:x.dea}))); const s3=rChart.addHistogramSeries({color:'#64748b',priceScaleId:''}); s3.setData(m.map(x=>({time:x.time,value:x.hist,color:x.hist>=0?'#ef4444':'#22c55e'}))); rMacd=true; }
    else if(name==='KDJ'||name==='KD'){ if(rKD) return; const k=calcKD(d); const s4=rChart.addLineSeries({color:'#a855f7',lineWidth:1}); s4.setData(k.map(x=>({time:x.time,value:x.k}))); const s5=rChart.addLineSeries({color:'#14b8a',lineWidth:1}); s5.setData(k.map(x=>({time:x.time,value:x.d}))); rKD=true; }
  }
  function klDraw(type){ /* lightweight-charts v4 standalone 免費版無 overlay 繪圖工具，暫保留介面 */ }
  function klRemoveAll(){ if(rChart) rChart.remove(); rChart=null; rSeries=null; rMacd=false; rKD=false; rInited=false; }
  function _initRWhenReady(){ if(document.readyState!=='loading'){ klRender('2330'); } else { document.addEventListener('DOMContentLoaded', ()=>klRender('2330')); } }
  _initRWhenReady();
  // 注意：sel('2330') 已由上方 loadAll().then 處理；此處只處理 ?sym= 搜尋跳轉參數
  // 接收來自搜尋跳轉的 ?sym= 參數，自動選股
  (function(){
    const p=new URLSearchParams(location.search).get('sym');
    if(p && STOCKS[p]){ document.getElementById('q2').value=p; sel(p); }
    else if(p){ document.getElementById('q2').value=p; }
  })();
</script>
</body></html>
