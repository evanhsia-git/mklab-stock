<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mklab-stock Research（WC 版）</title>
<base href="/mklab-stock/">
<style>
  :root { --bg:#0f1115; --surface:#171a21; --ink:#e8eaed; --muted:#9aa0a6; --border:#2a2f3a; --accent:#3b82f6; --up:#f87171; --down:#4ade80; --radius:10px; --shadow:0 1px 3px rgba(0,0,0,.4); }
  [data-theme="light"] { --bg:#f7f8fa; --surface:#fff; --ink:#1a1d21; --muted:#6b7280; --border:#e5e7eb; --accent:#2563eb; --up:#dc2626; --down:#16a34a; --shadow:0 1px 3px rgba(0,0,0,.08); }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif; background:var(--bg); color:var(--ink); line-height:1.5; }
  .nav { position:sticky; top:0; z-index:26; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:4px; padding:10px 12px; }
  .nav a { color:var(--ink); text-decoration:none; font-size:14px; padding:6px 10px; border-radius:8px; white-space:nowrap; }
  .nav a.active { background:var(--accent); color:#fff; }
  .utilbar { position:sticky; top:49px; z-index:25; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; padding:8px 12px; }
  .utilbar .spacer { flex:1; }
  .brand { font-weight:700; font-size:15px; margin-right:4px; white-space:nowrap; }
  .search { display:flex; align-items:center; gap:4px; background:var(--bg); border:1px solid var(--border); border-radius:20px; padding:4px 10px; }
  .search.collapsed input { display:none; }
  .search.expanded input { display:block; width:160px; background:var(--surface); color:var(--ink); border:1px solid var(--border); border-radius:16px; padding:4px 10px; outline:none; }
  .fab-btn { width:40px; height:40px; border-radius:50%; border:1px solid var(--border); background:var(--surface); color:var(--ink); cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow); }
  .fab-btn svg { width:20px; height:20px; display:block; }
  .freshness { background:#fff7ed; color:#9a3412; font-size:12px; padding:6px 12px; border-bottom:1px solid var(--border); text-align:center; }
  [data-theme="light"] .freshness { background:#fff7ed; color:#9a3412; }
  [data-theme="dark"] .freshness { background:#2a1d12; color:#fdba74; }
  .wrap { max-width:1200px; margin:0 auto; padding:12px; }
  @media (min-width:1024px){ .wrap{ padding:16px 24px; } }
  .up { color:var(--up); } .down { color:var(--down); }
  .layout { display:block; }
  @media (min-width:1024px){ .layout{ display:grid; grid-template-columns:260px 1fr; gap:16px; } }
  .panel { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px; box-shadow:var(--shadow); margin-bottom:12px; }
  .panel h3 { font-size:14px; margin-bottom:10px; }
  .row-input { display:flex; gap:6px; margin-bottom:10px; }
  .row-input input { flex:1; padding:8px; border:1px solid var(--border); border-radius:8px; background:var(--bg); color:var(--ink); }
  .row-input button { padding:8px 12px; background:var(--accent); color:#fff; border:none; border-radius:8px; cursor:pointer; }
  .symlist div { padding:8px; border-radius:8px; cursor:pointer; font-size:13px; }
  .symlist div:hover { background:var(--row-hover); }
  .symlist .on { background:var(--accent); color:#fff; }
  .pager { display:flex; gap:6px; justify-content:center; margin:12px 0; flex-wrap:wrap; }
  .pager button { padding:6px 11px; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--ink); cursor:pointer; font-size:13px; }
  .pager button:hover { background:var(--row-hover); }
  .pager button.on { background:var(--accent); color:#fff; border-color:var(--accent); }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px; box-shadow:var(--shadow); margin-bottom:12px; }
  .card h3 { font-size:15px; margin-bottom:8px; }
  .kline-toolbar { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; }
  .kline-toolbar button { padding:5px 10px; font-size:12px; border:1px solid var(--border); border-radius:8px; background:var(--bg); color:var(--ink); cursor:pointer; }
  .kline-toolbar button.on { background:var(--accent); color:#fff; border-color:var(--accent); }
  .drawer-mask { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:40; display:none; }
  .drawer-mask.open { display:block; }
  .drawer { position:fixed; top:0; right:0; height:100%; width:300px; max-width:85vw; background:var(--surface); border-left:1px solid var(--border); z-index:50; transform:translateX(100%); transition:transform .25s ease; padding:16px; overflow-y:auto; box-shadow:var(--shadow); }
  .drawer.open { transform:translateX(0); }
  .disclaimer { font-size:11px; color:var(--muted); text-align:center; padding:16px 12px; }
  mklab-kline { display:block; border:1px solid var(--border); border-radius:var(--radius); padding:8px; margin-bottom:8px; }
  mklab-datatable { display:block; border:1px solid var(--border); border-radius:var(--radius); padding:8px; }
  table { width:100%; border-collapse:collapse; }
  th,td { padding:8px 6px; text-align:right; font-size:13px; border-bottom:1px solid var(--border); white-space:nowrap; }
  th:first-child,td:first-child { text-align:left; }
  th { font-size:12px; color:var(--muted); font-weight:600; }
</style>
<script src="vendor/lightweight-charts.min.js"></script>
<script src="data/twii_kdata.js"></script>
<script src="assets/mklab-core.js"></script>
<script src="assets/data-client.js"></script>
<script src="assets/mklab-wc.js"></script>
</head>
<body>
  <nav id="mainNav" class="nav"></nav>
  <div id="utilbar" class="utilbar"><span class="brand" id="brand"></span><span class="spacer"></span></div>
  <div class="freshness">資料以 2026-07-15 收盤為準（WC 版）</div>

  <!-- WC 抽屜元件 -->
  <mklab-drawer trigger=".mklab-drawer-trigger" position="right" title="設定" theme-key="mklab-theme" lang-key="mklab-lang">
    <h4>主題</h4>
    <label class="row">
      <span>深色模式</span>
      <button class="switch" id="themeSwitch" onclick="toggleTheme()"></button>
    </label>
    <h4>語言</h4>
    <div class="seg">
      <button onclick="setLang('zh')">繁中</button>
      <button onclick="setLang('en')">English</button>
    </div>
  </mklab-drawer>

  <div class="wrap">
    <div class="layout">
      <div class="panel">
        <h3>個股選擇</h3>
        <div class="row-input">
          <input id="q2" placeholder="搜尋代號，如 2330">
          <button onclick="search()">搜</button>
        </div>
        <div class="symlist" id="symlist"></div>
        <div class="pager" id="symPager"></div>
      </div>
      <div>
        <!-- 區塊 1：個股摘要 -->
        <div class="card" id="infoCard"></div>
        <!-- 區塊 2：歷史價格圖（WC mklab-kline） -->
        <div class="card">
          <h3>歷史價格圖（WC <mklab-kline> + MACD/KD）</h3>
          <div class="kline-toolbar">
            <button onclick="klAddIndicatorWC('MACD')">MACD</button>
            <button onclick="klAddIndicatorWC('KDJ')">KD</button>
            <button onclick="klDrawWC('segment')">畫線</button>
            <button onclick="klDrawWC('horizontalStraightLine')">水平線</button>
            <button onclick="klDrawWC('fibonacciLine')">費波那契</button>
            <button onclick="klRemoveAllWC()">清除</button>
          </div>
          <mklab-kline id="wcKline" height="400"></mklab-kline>
        </div>
        <!-- 區塊 3：財報摘要（WC mklab-datatable） -->
        <div class="card">
          <h3>財報摘要（最新年度，WC <mklab-datatable>）</h3>
          <mklab-datatable id="wcFinTable" cols="sym,name,price,chg,pe,pb,roe,roa,eps,div" src="stocks.json" page-size="10"></mklab-datatable>
        </div>
      </div>
    </div>
  </div>

<script>
/* ============ WC 研究頁專用邏輯 ============ */
let STOCKS = {};
const STATIC = {
  "2330":{name:"台積電",price:1050,chg:+1.2,pe:24.1,pb:5.2,roe:28.1,roa:15.3,eps:43.6,div:2.1,mc:"27.2兆",sector:"半導體",fin:[["2023",43.6,28.1,2.1],["2024",48.2,30.5,2.3],["2025E",52.0,31.0,2.5]]},
  "2317":{name:"鴻海",price:215,chg:+0.9,pe:18.3,pb:2.1,roe:14.2,roa:6.8,eps:11.7,div:3.8,mc:"2.9兆",sector:"電子代工",fin:[["2023",11.7,14.2,3.8],["2024",12.5,15.0,4.0],["2025E",13.0,15.5,4.2]]},
  "2454":{name:"聯發科",price:1280,chg:-0.5,pe:30.2,pb:4.8,roe:22.5,roa:14.0,eps:42.4,div:2.5,mc:"2.0兆",sector:"IC設計",fin:[["2023",42.4,22.5,2.5],["2024",46.0,23.1,2.7],["2025E",50.0,24.0,2.9]]},
};

let wcKline = null;
let wcFinTable = null;

function loadAll(){
  return fetch('data/stocks.json').then(r=>r.json()).then(d=>{
    if(d && Array.isArray(d.stocks)){
      const o={};
      d.stocks.forEach(s=>{ if(s.sym) o[s.sym]={name:s.name,price:s.price,chg:s.chg,pe:s.pe,pb:s.pb,roe:s.roe,roa:s.roa,eps:s.eps,div:s.div,mc:(s.market_cap!=null?(s.market_cap/1e8).toFixed(1)+'兆':null),sector:s.ind,fin:[]}; });
      STOCKS = Object.assign({}, STATIC, o);
    } else { STOCKS = Object.assign({}, STATIC); }
    renderList();
  }).catch(()=>{ STOCKS = Object.assign({}, STATIC); renderList(); });
}

function search(){
  const v=document.getElementById('q2').value.trim().toLowerCase();
  if(!v){ renderList(); return; }
  const hits=Object.keys(STOCKS).filter(k=>k.toLowerCase().includes(v)||(STOCKS[k].name||'').toLowerCase().includes(v)).slice(0,12);
  document.getElementById('symlist').innerHTML=hits.map(k=>`<div data-s="${k}" onclick="sel('${k}')">${k} ${STOCKS[k].name}</div>`).join('')||`<div style="color:var(--muted);padding:8px">無符合代號</div>`;
  if(hits.length===1 && STOCKS[hits[0]]) sel(hits[0]);
}

let symPage = 1;
const SYM_PER = 10;
function renderList(){
  const keys = Object.keys(STOCKS);
  const totalPages = Math.max(1, Math.ceil(keys.length / SYM_PER));
  if(symPage > totalPages) symPage = totalPages;
  const start = (symPage-1)*SYM_PER;
  const pageKeys = keys.slice(start, start+SYM_PER);
  document.getElementById('symlist').innerHTML = pageKeys.map(s=>{
    const m = STOCKS[s];
    return `<div data-s="${s}" onclick="sel('${s}')">${s} ${m.name}</div>`;
  }).join("");
  const pager = document.getElementById('symPager');
  if(pager){
    let b='';
    for(let i=1;i<=totalPages;i++) b += `<button class="${i===symPage?'on':''}" onclick="gotoSymPage(${i})">${i}</button>`;
    pager.innerHTML = b;
  }
}
function gotoSymPage(p){ symPage = p; renderList(); }

function sel(sym){
  if(!STOCKS[sym]) return;
  document.querySelectorAll('#symlist div').forEach(d=>d.classList.toggle('on',d.dataset.s===sym));
  const m = STOCKS[sym];
  const chgCls = m.chg>=0 ? 'up' : 'down';
  const chgTxt = (m.chg>0?'+':'') + m.chg + '%';
  const kv = (k,v)=>'<div><div class="k">'+k+'</div><div class="v">'+v+'</div></div>';
  document.getElementById('infoCard').innerHTML =
    '<h3>'+sym+' '+m.name+' <span class="'+chgCls+'">'+chgTxt+'</span></h3>' +
    '<div class="kv">'+
      kv('價格', m.price!=null?m.price:'-')+kv('PE', m.pe!=null?m.pe:'-')+kv('PB', m.pb!=null?m.pb:'-')+
      kv('ROE', (m.roe!=null?m.roe.toFixed(1):'-')+'%')+kv('EPS', m.eps!=null?m.eps:'-')+kv('殖利率', (m.div!=null?m.div:'-')+'%')+
      kv('市值', m.mc)+kv('產業', '<span style="font-size:13px">'+m.sector+'</span>')+
    '</div>';
  // WC K線：data-symbol 觸發屬性驅動
  const k = document.getElementById('wcKline');
  k.setAttribute('data-symbol', sym);
  // 財報表格：data-client 已處理，WC 會自動渲染
}

function toggleTheme(){
  const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('mklab-theme', theme);
}
function setLang(lang){
  localStorage.setItem('mklab-lang', lang);
  console.log('[WC] lang:', lang);
}

loadAll().then(()=>sel('2330')).catch(()=>{});

// WC K線指標按鈕
function klAddIndicatorWC(name){
  const k = document.getElementById('wcKline');
  if(!k._chart) return;
  if(name==='MACD'){
    // MACD 簡易計算並疊加
    const data = k._series ? k._series._data : [];
    if(!data.length) return;
    // 簡易 MACD 計算
    const closes = data.map(d=>d.close);
    const ema = (period, arr)=>{ const k=2/(period+1); let prev=arr[0]; const out=[prev]; for(let i=1;i<arr.length;i++){ prev=arr[i]*k+prev*(1-k); out.push(prev);} return out; };
    const e12=ema(12,closes), e26=ema(26,closes);
    const dif=e12.map((v,i)=>v-e26[i]);
    const dea=ema(9,dif);
    const hist=dif.map((v,i)=>+ (v-dea[i]).toFixed(2));
    const mData = data.map((d,i)=>({time:d.time, value:+dif[i].toFixed(2)}));
    const m2Data = data.map((d,i)=>({time:d.time, value:+dea[i].toFixed(2)}));
    k.addLine({color:'#3b82f6',lineWidth:1}).setData(mData);
    k.addLine({color:'#f59e0b',lineWidth:1}).setData(m2Data);
    k.addLine({color:'#64748b',lineWidth:1}).setData(data.map((d,i)=>({time:d.time,value:hist[i],color:hist[i]>=0?'#ef4444':'#22c55e'})));
  } else if(name==='KDJ' || name==='KD'){
    // KD 簡易計算
    const data = k._series ? k._series._data : [];
    if(!data.length) return;
    const closes = data.map(d=>d.close), highs = data.map(d=>d.high), lows = data.map(d=>d.low);
    const K=[], D=[]; let pk=50, pd=50;
    for(let i=0;i<closes.length;i++){
      const lo=Math.min(...lows.slice(Math.max(0,i-8),i+1));
      const hi=Math.max(...highs.slice(Math.max(0,i-8),i+1));
      const rsv = hi===lo ? 50 : ((closes[i]-lo)/(hi-lo)*100);
      pk = pk + 2/3*(rsv-pk);
      pd = pd + 2/3*(pk-pd);
      K.push(+pk.toFixed(2));
      D.push(+pd.toFixed(2));
    }
    k.addLine({color:'#a855f7',lineWidth:1}).setData(data.map((d,i)=>({time:d.time,value:K[i]})));
    k.addLine({color:'#14b8a6',lineWidth:1}).setData(data.map((d,i)=>({time:d.time,value:D[i]})));
  }
}
function klDrawWC(type){ console.info('畫線功能需 LightweightCharts 付費版，當前 v4.1.3 免費版不支援'); }
function klRemoveAllWC(){
  const k = document.getElementById('wcKline');
  if(k._chart){ try{ k._chart.remove(); }catch(e){} }
  k._chart = null; k._series = null;
  k.setAttribute('data-symbol', '');
}

// 主題/語言初始化
customElements.whenDefined('mklab-drawer').then(()=>{
  const theme = localStorage.getItem('mklab-theme') || 'dark';
  const lang = localStorage.getItem('mklab-lang') || 'zh-TW';
  document.documentElement.setAttribute('data-theme', theme);
});
</script>
</body>
</html>
