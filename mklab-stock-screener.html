<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mklab-stock Screener</title>
<base href="/mklab-stock/">
<style>
  :root { --bg:#f7f8fa; --surface:#fff; --ink:#1a1d21; --muted:#6b7280; --border:#e5e7eb; --accent:#2563eb; --up:#dc2626; --down:#16a34a; --row-hover:#eff6ff; --radius:12px; --shadow:0 1px 3px rgba(0,0,0,.08); }
  [data-theme="dark"] { --bg:#0f1115; --surface:#171a21; --ink:#e8eaed; --muted:#9aa0a6; --border:#2a2f3a; --accent:#3b82f6; --up:#f87171; --down:#4ade80; --row-hover:#1e2a3a; --shadow:0 1px 3px rgba(0,0,0,.4); }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif; background:var(--bg); color:var(--ink); line-height:1.5; padding-bottom:20px; }
  .nav { position:sticky; top:0; z-index:26; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:4px; padding:10px 12px; }
  .nav a { color:var(--ink); text-decoration:none; font-size:14px; padding:6px 10px; border-radius:8px; white-space:nowrap; }
  .nav a.active { background:var(--accent); color:#fff; }
  .utilbar { position:sticky; top:49px; z-index:25; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; padding:8px 12px; }
  .utilbar .spacer { flex:1; }
  .brand { font-weight:700; font-size:15px; margin-right:4px; white-space:nowrap; }
  .search { display:flex; align-items:center; gap:4px; background:var(--bg); border:1px solid var(--border); border-radius:20px; padding:4px 10px; }
  .search.collapsed input { display:none; }
  .search.expanded input { display:block; width:160px; background:var(--surface); color:var(--ink); border:1px solid var(--border); border-radius:16px; padding:4px 10px; outline:none; }
  .fab-btn { width:40px; height:40px; border-radius:50%; border:1px solid var(--border); background:var(--surface); color:var(--ink); cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow); }
  .fab-btn svg { width:20px; height:20px; display:block; }
  .freshness { background:#fff7ed; color:#9a3412; font-size:12px; padding:6px 12px; border-bottom:1px solid var(--border); text-align:center; }
  [data-theme="dark"] .freshness { background:#2a1d12; color:#fdba74; }
  .wrap { max-width:1400px; margin:0 auto; padding:12px; }
  .section-title { font-size:14px; font-weight:600; margin:18px 4px 10px; color:var(--muted); }
  .up { color:var(--up); } .down { color:var(--down); }
  .tip { position:absolute; left:0; right:0; bottom:-22px; background:var(--surface); color:var(--ink); border:1px solid var(--border); border-radius:6px; padding:2px 6px; font-size:11px; text-align:center; box-shadow:var(--shadow); display:none; z-index:5; }
  .toolbar { display:flex; align-items:center; gap:8px; margin:4px 4px 10px; flex-wrap:wrap; }
  .toolbar label { font-size:13px; color:var(--muted); }
  .toolbar select { background:var(--surface); color:var(--ink); border:1px solid var(--border); border-radius:8px; padding:6px 8px; font-size:13px; }
  .toolbar .seg { display:flex; gap:4px; }
  .toolbar .seg button { flex:1; padding:6px; background:var(--surface); color:var(--ink); border:1px solid var(--border); border-radius:6px; font-size:12px; }
  .toolbar .seg button.on { background:var(--accent); color:#fff; }
  .pager { display:flex; gap:6px; justify-content:center; margin:12px 0; flex-wrap:wrap; }
  .pager button { background:var(--surface); border:1px solid var(--border); color:var(--ink); border-radius:8px; padding:6px 11px; }
  .pager button.on { background:var(--accent); color:#fff; }
  /* drawer */
  #drawer { position:fixed; top:0; right:-320px; width:320px; max-width:100%; height:100vh; background:var(--surface); border-left:1px solid var(--border); box-shadow:var(--shadow); z-index:100; transition:right .3s ease; overflow-y:auto; padding:16px; }
  #drawer.open { right:0; }
  .drawer-mask { position:fixed; inset:0; background:rgba(0,0,0,.5); opacity:0; visibility:hidden; transition:.3s; z-index:99; }
  .drawer-mask.open { opacity:1; visibility:visible; }
  #drawer .close-x { position:absolute; top:8px; right:8px; width:32px; height:32px; border-radius:50%; border:1px solid var(--border); background:var(--bg); cursor:pointer; font-size:18px; }
  #drawer h3 { margin:0 0 12px; font-size:16px; }
  #drawer h4 { margin:16px 0 8px; font-size:13px; color:var(--muted); }
  #drawer .row { display:flex; align-items:center; justify-content:space-between; margin:8px 0; }
  #drawer .seg { display:flex; flex-direction:column; gap:4px; }
  #drawer .seg a { color:var(--ink); text-decoration:none; font-size:13px; padding:6px 10px; border-radius:6px; background:var(--bg); }
  #drawer .seg a:hover { background:var(--accent); color:#fff; }
  #drawer .switch { width:44px; height:24px; border-radius:12px; background:var(--border); border:none; cursor:pointer; position:relative; }
  #drawer .switch.on { background:var(--accent); }
  #drawer .switch::after { content:''; position:absolute; top:2px; left:2px; width:20px; height:20px; border-radius:50%; background:#fff; transition:.2s; box-shadow:0 1px 3px rgba(0,0,0,.2); }
  #drawer .switch.on::after { left:22px; }
  #drawer .sys-note { font-size:12px; color:var(--muted); line-height:1.6; }
  #drawer .sys-note .up { color:var(--down); }
  #drawer .seg { display:flex; flex-direction:column; gap:4px; }
  /* WC 元件樣式 */
  mklab-kline { display:block; border:1px solid var(--border); border-radius:var(--radius); padding:8px; margin-bottom:8px; background:var(--surface); }
  mklab-datatable { display:block; border:1px solid var(--border); border-radius:var(--radius); padding:8px; background:var(--surface); }
  mklab-drawer { display:block; }
  /* pager */
  .pager { display:flex; gap:6px; justify-content:center; margin:12px 0; flex-wrap:wrap; }
  .pager button { background:var(--surface); border:1px solid var(--border); color:var(--ink); border-radius:8px; padding:6px 11px; }
  .pager button.on { background:var(--accent); color:#fff; }
</style>
</head>
<body>
<nav id="mainNav" class="nav"></nav>
<div id="utilbar" class="utilbar"><span class="brand" id="brand"></span><span class="spacer"></span></div>
<div class="freshness">資料以 2026-07-13 收盤為準（Build-Time 自動更新）</div>
<div class="wrap">
  <div class="section-title">多條件篩選（Screener）</div>
  
  <div class="toolbar">
    <label>策略：</label>
    <select id="strategySel" onchange="applyStrategy()">
      <option value="custom">自訂條件</option>
      <option value="value">價值型（低 PE/PB、高股息）</option>
      <option value="quality">品質型（高 ROE/ROA、低負債）</option>
      <option value="growth">成長型（高 EPS 成長、高 ROE）</option>
      <option value="momentum">動能型（強勢趨勢、大漲）</option>
      <option value="dividend">高股息（殖利率>4%、PE<15）</option>
    </select>
    <div class="seg">
      <button onclick="setFilter('pe', '', 'max')" id="btnPE">PE</button>
      <button onclick="setFilter('pb', '', 'max')" id="btnPB">PB</button>
      <button onclick="setFilter('roe', 'min', '')" id="btnROE">ROE</button>
      <button onclick="setFilter('eps', 'min', '')" id="btnEPS">EPS</button>
      <button onclick="setFilter('chg', 'min', '')" id="btnCHG">漲跌%</button>
      <button onclick="setFilter('div', 'min', '')" id="btnDIV">殖利率</button>
    </div>
    <input type="number" id="fMin" placeholder="最小" step="0.01" style="width:80px">
    <input type="number" id="fMax" placeholder="最大" step="0.01" style="width:80px">
    <button class="fab-btn" onclick="applyCustomFilter()" title="套用"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 16 12 14 15 10 9 18 21"/></svg></button>
    <button class="fab-btn" onclick="resetFilters()" title="重置"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/></svg></button>
  </div>

  <div class="section-title">篩選結果</div>
  <mklab-datatable id="scrTable" page-size="10" pager-id="scrPager" default-sort="score"></mklab-datatable>
  <div class="pager" id="scrPager"></div>
  <table id="scrTableStatic" style="display:none"></table>

  <div class="section-title">個股大圖表（點選代號查看）</div>
  <mklab-kline id="scrKline" height="400"></mklab-kline>
  <div class="kline-toolbar" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;">
    <button onclick="addMacd()" class="up">MACD</button>
    <button onclick="addKd()" class="up">KD</button>
    <button onclick="clearInd()">清除指標</button>
  </div>
</div>

<div class="drawer-mask" onclick="MKLAB.Drawer.close()"></div>
<div id="drawer"><button class="close-x" onclick="MKLAB.Drawer.close()">×</button></div>

<script src="vendor/lightweight-charts.min.js"></script>
<script src="data/twii_kdata.js"></script>
<script src="assets/mklab-core.js"></script>
<script src="assets/data-client.js"></script>
<script src="assets/mklab-wc.js"></script>
<script>
let scrTable = null;
let allStocks = [];
let currentFilter = { pe: null, pb: null, roe: null, eps: null, chg: null, div: null };

// 策略預設值
const STRATEGIES = {
  value: { pe: {max:15}, pb: {max:2}, div: {min:3}, roe: {min:10} },
  quality: { roe: {min:15}, roa: {min:7}, pe: {max:20} },
  growth: { eps: {min:5}, roe: {min:15}, chg: {min:5} },
  momentum: { chg: {min:3}, pe: {max:30} },
  dividend: { div: {min:4}, pe: {max:15}, pb: {max:2} },
};

// 初始化表格
if(typeof MKLAB !== 'undefined'){
  scrTable = MKLAB.DataTable('scrTable', {
    cols: ['sym','price','chg','pe','pb','eps','roe','roa','score','trend','ind'],
    rows: [],
    pageSize: 10,
    pagerId: 'scrPager',
    defaultSort: 'score',
  });
  MKLAB.Shell.mount({ active:'screener' });
}

// 載入資料
async function loadData(){
  try{
    const r = await fetch('data/stocks.json');
    const d = await r.json();
    if(d && d.stocks){
      allStocks = d.stocks.map(s=>({
        sym: s.sym, name: s.name, price: s.price, chg: s.chg,
        pe: s.pe, pb: s.pb, eps: s.eps, roe: s.roe, roa: s.roa,
        div: s.div, ind: s.ind, spct: s.spct,
        score: calcScore(s), trend: s.spct!=null?(s.spct>0?'+':'')+s.spct+'%':null
      }));
      renderTable();
      document.querySelector('.freshness').textContent = `資料以 ${d.meta?.as_of || '2026-07-13'} 收盤為準（Build-Time 自動更新）`;
    }
  }catch(e){console.error(e)}
}

function calcScore(s){
  let score=0, any=false;
  if(s.roe!=null){ score += Math.max(0, Math.min(40, s.roe*1.2)); any=true; }
  if(s.pe!=null){ score += Math.max(0, Math.min(20, (30-s.pe)*1.0)); any=true; }
  if(s.pb!=null){ score += Math.max(0, Math.min(15, (8-s.pb)*2.0)); any=true; }
  if(s.eps!=null){ score += Math.max(0, Math.min(10, s.eps*0.3)); any=true; }
  if(!any) return -1;
  return Math.round(Math.max(0, Math.min(100, score)));
}

function renderTable(){
  let rows = allStocks.filter(s=>s.score>=0);
  // 套用過濾
  rows = rows.filter(s=>{
    if(currentFilter.pe && currentFilter.pe.max!=null && (s.pe==null || s.pe > currentFilter.pe.max)) return false;
    if(currentFilter.pb && currentFilter.pb.max!=null && (s.pb==null || s.pb > currentFilter.pb.max)) return false;
    if(currentFilter.roe && currentFilter.roe.min!=null && (s.roe==null || s.roe < currentFilter.roe.min)) return false;
    if(currentFilter.eps && currentFilter.eps.min!=null && (s.eps==null || s.eps < currentFilter.eps.min)) return false;
    if(currentFilter.chg && currentFilter.chg.min!=null && (s.chg==null || s.chg < currentFilter.chg.min)) return false;
    if(currentFilter.div && currentFilter.div.min!=null && (s.div==null || s.div < currentFilter.div.min)) return false;
    return true;
  });
  scrTable.setRows(rows);
}

function applyStrategy(){
  const sel = document.getElementById('strategySel').value;
  if(sel==='custom') return;
  const s = STRATEGIES[sel];
  currentFilter = {...s};
  syncFilterUI();
  renderTable();
}

function applyCustomFilter(){
  const min = parseFloat(document.getElementById('fMin').value);
  const max = parseFloat(document.getElementById('fMax').value);
  const active = document.querySelector('.toolbar .seg button.on');
  if(!active) return alert('請先選擇要設定的指標（PE/PB/ROE/EPS/漲跌%/殖利率）');
  const field = active.id.replace('btn','').toLowerCase();
  currentFilter[field] = currentFilter[field] || {};
  if(!isNaN(min)) currentFilter[field].min = min;
  if(!isNaN(max)) currentFilter[field].max = max;
  renderTable();
}

function setFilter(field, min, max){
  // 清除其他按鈕
  document.querySelectorAll('.toolbar .seg button').forEach(b=>b.classList.remove('on'));
  document.getElementById('btn'+field.toUpperCase()).classList.add('on');
  document.getElementById('fMin').value = min || '';
  document.getElementById('fMax').value = max || '';
}

function syncFilterUI(){
  // TODO: 同步 UI 到 currentFilter
}

function resetFilters(){
  currentFilter = { pe: null, pb: null, roe: null, eps: null, chg: null, div: null };
  document.querySelectorAll('.toolbar .seg button').forEach(b=>b.classList.remove('on'));
  document.getElementById('fMin').value = '';
  document.getElementById('fMax').value = '';
  document.getElementById('strategySel').value = 'custom';
  renderTable();
}

// 個股大圖表
let scrKline = null;
function addMacd(){
  const k = document.getElementById('scrKline');
  if(k && k.addLine) k.addLine({type:'macd', fast:12, slow:26, signal:9, color:'#2563eb', histColor:'#93c5fd'});
}
function addKd(){
  const k = document.getElementById('scrKline');
  if(k && k.addLine) k.addLine({type:'kd', kPeriod:9, dPeriod:3, color:'#16a34a', dColor:'#86efac'});
}
function clearInd(){
  const k = document.getElementById('scrKline');
  if(k && k.removeAll) k.removeAll();
}

// 初始化
loadData().then(()=>{
  if(typeof MKLAB !== 'undefined'){
    scrTable = MKLAB.DataTable('scrTable', {
      cols: ['sym','price','chg','pe','pb','eps','roe','roa','score','trend','ind'],
      rows: [],
      pageSize: 10,
      pagerId: 'scrPager',
      defaultSort: 'score',
    });
    MKLAB.Shell.mount({ active:'screener' });
    // 初始化 K 線
    const k = document.getElementById('scrKline');
    if(k) k.setAttribute('data-symbol', '2330');
  }
});

async function loadData(){
  try{
    const r = await fetch('data/stocks.json');
    const d = await r.json();
    if(d && d.stocks){
      allStocks = d.stocks.map(s=>({
        sym: s.sym, name: s.name, price: s.price, chg: s.chg,
        pe: s.pe, pb: s.pb, eps: s.eps, roe: s.roe, roa: s.roa,
        div: s.div, ind: s.ind, spct: s.spct,
        score: calcScore(s), trend: s.spct!=null?(s.spct>0?'+':'')+s.spct+'%':null
      }));
      renderTable();
      document.querySelector('.freshness').textContent = `資料以 ${d.meta?.as_of || '2026-07-13'} 收盤為準（Build-Time 自動更新）`;
    }
  }catch(e){console.error(e)}
}

function calcScore(s){
  let score=0, any=false;
  if(s.roe!=null){ score += Math.max(0, Math.min(40, s.roe*1.2)); any=true; }
  if(s.pe!=null){ score += Math.max(0, Math.min(20, (30-s.pe)*1.0)); any=true; }
  if(s.pb!=null){ score += Math.max(0, Math.min(15, (8-s.pb)*2.0)); any=true; }
  if(s.eps!=null){ score += Math.max(0, Math.min(10, s.eps*0.3)); any=true; }
  if(!any) return -1;
  return Math.round(Math.max(0, Math.min(100, score)));
}
</script>
</body>
</html>
