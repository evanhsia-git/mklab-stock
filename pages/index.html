{{TITLE}}mklab-stock Market 首頁{{/TITLE}}
{{DESCRIPTION}}mklab-stock — 台股/美股/中股免費分析儀表板，提供產業動態、個股研究、技術指標與綜合評分。{{/DESCRIPTION}}

<div class="section-title">全球主要股市</div>
<div class="cards" id="indices5"></div>

<div class="section-title">Market Health & Exposure（^TWII · 近 1 年）</div>
<div class="mh-layout">
  <div class="tv-box">
    <mklab-kline id="marketKline" data-symbol="TWII" height="460"></mklab-kline>
  </div>
  <div class="perf">
    <h3>績效表現</h3>
    <mklab-datatable id="perfTable" cols="name,close,chg_pct" data-src="indices" page-size="10" default-sort="chg_pct"></mklab-datatable>
  </div>
</div>

<div class="section-title">市場情緒與原物料</div>
<div class="cards" id="macro5"></div>

<div class="section-title">台股市值前 10 大</div>
<mklab-datatable id="cap10" cols="sym,name,price,chg,pe,pb,roe,cap" data-src="stocks" page-size="10" default-sort="cap"></mklab-datatable>

<mklab-router>
  <mklab-route path="/" component="#page-market" show="block"></mklab-route>
  <mklab-route path="/screener.html" component="#page-screener" show="none"></mklab-route>
  <mklab-route path="/research.html" component="#page-research" show="none"></mklab-route>
  <mklab-route path="/industry.html" component="#page-industry" show="none"></mklab-route>
  <mklab-route path="/watchlist.html" component="#page-watchlist" show="none"></mklab-route>
  <mklab-route path="/help.html" component="#page-help" show="none"></mklab-route>
  <mklab-route path="/log.html" component="#page-log" show="none"></mklab-route>
</mklab-router>

<div id="page-market">
  <!-- Market page content rendered by default -->
</div>

<script>
  document.addEventListener('DOMContentLoaded', async () => {
  // Market page specific logic
  // Use yf symbols from indices-config.json to match data
  const INDICES = ['^TWII', '^GSPC', '^IXIC', '^HSI', '^N225'];
  const IDX_NAME = { '^TWII': '台股加權', '^GSPC': 'S&P 500', '^IXIC': '納指 100', '^HSI': '恆生', '^N225': '日經 225' };

  // Render index cards
  function renderIndices() {
    const wrap = document.getElementById('indices5');
    if (!wrap) return;
    wrap.innerHTML = INDICES.map(sym => `
      <div class="card">
        <div class="card-title">${IDX_NAME[sym]}</div>
        <div class="card-val" id="idx-${sym}">—</div>
        <div class="card-sub" id="idx-chg-${sym}"></div>
      </div>
    `).join('');
  }

  // Render macro cards
  function renderMacro() {
    const wrap = document.getElementById('macro5');
    if (!wrap) return;
    const items = [
      { id: 'vix', label: 'VIX 恐慌指數', unit: '' },
      { id: 'usd_twd', label: 'USD/TWD', unit: '' },
      { id: 'gold', label: '黃金', unit: 'USD/oz' },
      { id: 'oil', label: '原油 WTI', unit: 'USD/bbl' },
      { id: 'btc', label: '比特幣', unit: 'USD' }
    ];
    wrap.innerHTML = items.map(d => `
      <div class="card">
        <div class="card-title">${d.label}</div>
        <div class="card-val" id="m-${d.id}">—</div>
      </div>
    `).join('');
  }

  // Fetch indices via data-client
  async function loadIndices() {
    try {
      const data = await MKLAB.data.indices();
      if (data && data.indices) {
        data.indices.forEach(v => {
          // Use yf field (e.g., ^TWII) or name for ID matching
          const key = v.yf || v.name;
          const el = document.getElementById(`idx-${key}`);
          const chgEl = document.getElementById(`idx-chg-${key}`);
          if (el && v.close != null) {
            el.textContent = Number(v.close).toLocaleString();
            const pct = v.chg_pct ?? 0;
            el.className = 'card-val ' + (pct >= 0 ? 'up' : 'down');
            if (chgEl) chgEl.textContent = (pct > 0 ? '+' : '') + pct.toFixed(2) + '%';
          }
        });
      }
    } catch (e) {
      console.warn('[Market] indices fetch failed:', e);
    }
  }

  // Macro data (placeholder - would need separate API)
  async function loadMacro() {
    const wrap = document.getElementById('macro5');
    if (!wrap) return;
    const items = [
      { id: 'vix', label: 'VIX 恐慌指數', unit: '' },
      { id: 'usd_twd', label: 'USD/TWD', unit: '' },
      { id: 'gold', label: '黃金', unit: 'USD/oz' },
      { id: 'oil', label: '原油 WTI', unit: 'USD/bbl' },
      { id: 'btc', label: '比特幣', unit: 'USD' }
    ];
    // 嘗試從 indices.json 的 macro 欄位讀取（若有）
    try {
      const data = await MKLAB.data.json('indices');
      if (data && data.macro) {
        items.forEach(d => {
          const el = document.getElementById(`m-${d.id}`);
          if (el && data.macro[d.id] != null) {
            const v = data.macro[d.id];
            el.textContent = typeof v === 'number' ? v.toLocaleString() : v;
            el.className = 'card-val';
          } else if (el) {
            el.textContent = '暫不提供';
            el.className = 'card-val muted';
          }
        });
        return;
      }
    } catch (e) {
      console.warn('[Market] macro fetch failed:', e);
    }
    // Fallback: 顯示暫不提供
    items.forEach(d => {
      const el = document.getElementById(`m-${d.id}`);
      if (el) {
        el.textContent = '暫不提供';
        el.className = 'card-val muted';
      }
    });
  }

  // Initialize
  renderIndices();
  renderMacro();
  loadIndices();
  loadMacro();

  // 更新 freshness（資料新鮮度指示器）
  try {
    const meta = await MKLAB.data.json('stocks');
    const asof = meta && meta.meta && meta.meta.as_of;
    if (asof) {
      const f = document.querySelector('.freshness');
      if (f) f.textContent = '資料以 ' + asof + ' 收盤為準（Build-Time 自動更新）';
    }
  } catch (e) {
    const f = document.querySelector('.freshness');
    if (f) f.textContent = '無法載入即時資料，暫以示意資料顯示';
  }

  // Register shell & drawer
  if (window.MKLAB) {
    MKLAB.Shell?.mount({ active: 'market' });
    MKLAB.initDrawer?.();
  }
  });
</script>
