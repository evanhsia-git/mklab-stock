<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<base href="/mklab-stock/">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="mklab-stock — 台股/美股即時儀表板，大盤、產業、篩選、個股研究一站掌握">
<title>mklab-stock</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
<link rel="stylesheet" href="assets/css/mklab-theme.css">
<link rel="stylesheet" href="assets/css/layout.css">
<link rel="stylesheet" href="assets/css/component.css">
<link rel="stylesheet" href="assets/css/mobile.css">
</head>
<body>
<header class="sticky-header" role="banner">
  <nav id="mainNav" class="nav" aria-label="主導覽"></nav>
  <div id="utilbar" class="utilbar">
    <span class="brand" id="brand"></span>
    <span class="spacer"></span>
    <button class="mobile-menu-btn" onclick="MKLAB.Drawer.toggle()" aria-label="開啟選單">
      <span class="hamburger">☰</span>
    </button>
  </div>
  <div class="freshness" aria-live="polite">資料載入中…</div>
</header>
<aside class="drawer" id="drawer" role="dialog" aria-modal="true" aria-labelledby="drawerTitle">
  <button class="close-x" onclick="MKLAB.Drawer.close()" aria-label="關閉抽屜">×</button>
  <div class="drawer-content" id="drawerContent"></div>
</aside>
<div class="drawer-mask" onclick="MKLAB.Drawer.close()" aria-hidden="true"></div>
<main class="wrap">

<div class="section-title">歷史回測模擬器</div>
<div class="card">
  <div class="kv">
    <span>股票代號</span>
    <input id="btSym" placeholder="如 2330" style="padding:6px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--ink);">
  </div>
  <div class="kv" style="margin-top:10px;">
    <span>買進日期</span>
    <input id="btDate" type="date" style="padding:6px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--ink);">
  </div>
  <div class="kv" style="margin-top:10px;">
    <span>投入金額（元）</span>
    <input id="btAmount" type="number" value="100000" style="padding:6px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--ink);">
  </div>
  <button style="margin-top:14px;padding:8px 16px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;" onclick="runBacktest()">開始試算</button>
  <p class="muted-small-top" id="btMsg"></p>
</div>

<div class="card" id="btResult" style="display:none;">
  <h3>試算結果</h3>
  <div class="kv" id="btResultBody"></div>
</div>

<p class="muted-small-top">⚠️ 此為兩點式試算（買進日 vs 最新一日收盤價），非完整走勢回測；資料以收盤為準，僅供教育參考，非投資建議。</p>

<script src="assets/js/data-client.js"></script>
<script src="assets/js/mklab-core.js"></script>
<script src="assets/js/mklab-wc.js"></script>
<script>
  async function runBacktest() {
    const sym = document.getElementById('btSym').value.trim();
    const dateStr = document.getElementById('btDate').value; // YYYY-MM-DD
    const amount = Number(document.getElementById('btAmount').value);
    const msgEl = document.getElementById('btMsg');
    const resultEl = document.getElementById('btResult');
    resultEl.style.display = 'none';
    msgEl.textContent = '';

    if (!sym) { msgEl.textContent = '請輸入股票代號'; return; }
    if (!dateStr) { msgEl.textContent = '請選擇買進日期'; return; }
    if (!amount || amount <= 0) { msgEl.textContent = '請輸入有效的投入金額'; return; }

    const dateKey = dateStr.replace(/-/g, ''); // YYYYMMDD
    msgEl.textContent = '試算中…';

    try {
      const [histRows, latestRows] = await Promise.all([
        MKLAB.data.historyOn(dateKey),
        MKLAB.data.stocks(),
      ]);
      const buyRow = histRows.find(r => String(r.sym) === sym);
      const nowRow = latestRows.find(r => String(r.sym) === sym);
      if (!buyRow) { msgEl.textContent = '找不到該日期的資料，可能非交易日或超出資料範圍，請換個日期試試'; return; }
      if (!nowRow) { msgEl.textContent = '找不到該股票的最新資料，請確認代號正確'; return; }

      const buyPrice = buyRow.close != null ? buyRow.close : buyRow.price;
      const nowPrice = nowRow.price;
      if (!buyPrice || !nowPrice) { msgEl.textContent = '該股票缺少收盤價資料，無法試算'; return; }

      const shares = amount / buyPrice;
      const mktVal = shares * nowPrice;
      const pnl = mktVal - amount;
      const pnlPct = (pnl / amount) * 100;
      const days = Math.round((new Date() - new Date(dateStr)) / 86400000);
      const annualized = days > 0 ? (Math.pow(mktVal / amount, 365 / days) - 1) * 100 : null;

      document.getElementById('btResultBody').innerHTML = `
        <span>買進價</span><b>${buyPrice.toLocaleString()}</b>
        <span>目前價</span><b>${nowPrice.toLocaleString()}</b>
        <span>持有天數</span><b>${days} 天</b>
        <span>損益金額</span><b class="${pnl >= 0 ? 'up' : 'down'}">${pnl >= 0 ? '+' : ''}${Math.round(pnl).toLocaleString()} 元</b>
        <span>報酬率</span><b class="${pnlPct >= 0 ? 'up' : 'down'}">${pnlPct >= 0 ? '+' : ''}${pnlPct.toFixed(2)}%</b>
        <span>年化報酬率</span><b class="${annualized != null && annualized >= 0 ? 'up' : 'down'}">${annualized != null ? (annualized >= 0 ? '+' : '') + annualized.toFixed(2) + '%' : '-'}</b>
      `;
      resultEl.style.display = 'block';
      msgEl.textContent = '';
    } catch (e) {
      console.warn('[backtest] failed:', e);
      msgEl.textContent = '試算失敗，該日期可能沒有資料快照，請換個日期試試';
    }
  }

  window.addEventListener('DOMContentLoaded', async function () {
    MKLAB.initDrawer();
    MKLAB.Shell.mount({ active: 'backtest' });
    document.getElementById('btDate').max = new Date().toISOString().slice(0, 10);
    try {
      const meta = await MKLAB.data.json('stocks');
      MKLAB.setFreshness(meta && meta.meta && meta.meta.as_of);
    } catch (e) { MKLAB.setFreshness(null); }
  });
</script>
</main>
<footer class="footer" role="contentinfo">
  <div class="footer-inner">
    <span>mklab-stock · Web Components v2.0</span>
    <a class="link" href="https://github.com/evanhsia-git/mklab-stock" target="_blank" rel="noopener">GitHub 倉庫 ↗</a>
  </div>
</footer>
</body>
</html>
