<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mklab-stock Research WC 版（測試）</title>
<base href="/mklab-stock/">
<style>
  :root { --bg:#0f1115; --surface:#171a21; --ink:#e8eaed; --muted:#9aa0a6; --border:#2a2f3a; --accent:#3b82f6; --up:#f87171; --down:#4ade80; --radius:10px; --shadow:0 1px 3px rgba(0,0,0,.4); }
  [data-theme="light"] { --bg:#f7f8fa; --surface:#fff; --ink:#1a1d21; --muted:#6b7280; --border:#e5e7eb; --accent:#2563eb; --up:#dc2626; --down:#16a34a; --shadow:0 1px 3px rgba(0,0,0,.08); }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif; background:var(--bg); color:var(--ink); line-height:1.5; }
  .nav { position:sticky; top:0; z-index:26; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:4px; padding:10px 12px; }
  .nav a { color:var(--ink); text-decoration:none; font-size:14px; padding:6px 10px; border-radius:8px; white-space:nowrap; }
  .nav a.active { background:var(--accent); color:#fff; }
  .utilbar { position:sticky; top:49px; z-index:25; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; padding:8px 12px; }
  .utilbar .spacer { flex:1; }
  .brand { font-weight:700; font-size:15px; margin-right:4px; white-space:nowrap; }
  .freshness { background:#fff7ed; color:#9a3412; font-size:12px; padding:6px 12px; border-bottom:1px solid var(--border); text-align:center; }
  [data-theme="dark"] .freshness { background:#2a1d12; color:#fdba74; }
  .wrap { max-width:1200px; margin:0 auto; padding:12px; }
  @media (min-width:1024px){ .wrap{ padding:16px 24px; } }
  .up { color:var(--up); } .down { color:var(--down); }
  .layout { display:block; }
  @media (min-width:1024px){ .layout{ display:grid; grid-template-columns:260px 1fr; gap:16px; } }
  .panel { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px; box-shadow:var(--shadow); margin-bottom:12px; }
  .panel h3 { font-size:14px; margin-bottom:10px; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px; box-shadow:var(--shadow); margin-bottom:12px; }
  .card h3 { font-size:15px; margin-bottom:8px; }
  .kline-toolbar { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; }
  .kline-toolbar button { padding:5px 10px; font-size:12px; border:1px solid var(--border); border-radius:8px; background:var(--bg); color:var(--ink); cursor:pointer; }
  .kline-toolbar button.on { background:var(--accent); color:#fff; border-color:var(--accent); }
  .drawer-mask { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:40; display:none; }
  .drawer-mask.open { display:block; }
  .drawer { position:fixed; top:0; right:0; height:100%; width:300px; max-width:85vw; background:var(--surface); border-left:1px solid var(--border); z-index:50; transform:translateX(100%); transition:transform .25s ease; padding:16px; overflow-y:auto; box-shadow:var(--shadow); }
  .drawer.open { transform:translateX(0); }
  .disclaimer { font-size:11px; color:var(--muted); text-align:center; padding:16px 12px; }
</style>
<script src="vendor/lightweight-charts.min.js"></script>
<script src="data/twii_kdata.js?v=20260715b"></script>
<script src="assets/mklab-core.js"></script>
<script src="assets/data-client.js?v=20260715c"></script>
<script src="assets/mklab-wc.js?v=20260715c"></script>
</head>
<body>
  <nav id="mainNav" class="nav"></nav>
  <div id="utilbar" class="utilbar"><span class="brand" id="brand"></span><span class="spacer"></span></div>
  <div class="freshness">資料以 2026-07-15 收盤為準（WC 測試版）</div>
  <div class="drawer-mask" onclick="MKLAB.Drawer.close()"></div>
  
  <!-- WC 抽屜元件 -->
  <mklab-drawer trigger=".mklab-drawer-trigger" position="right" title="設定" theme-key="mklab-theme" lang-key="mklab-lang">
    <h4>主題</h4>
    <label class="row">
      <span>深色模式</span>
      <button class="switch" id="themeSwitch" onclick="toggleTheme()"></button>
    </label>
    <h4>語言</h4>
    <div class="seg">
      <button onclick="setLang('zh')">繁中</button>
      <button onclick="setLang('en')">English</button>
    </div>
  </mklab-drawer>

  <div class="wrap">
    <div class="layout">
      <div class="panel">
        <h3>個股選擇</h3>
        <div class="row-input">
          <input id="q2" placeholder="搜尋代號，如 2330">
          <button onclick="search()">搜</button>
        </div>
        <div class="symlist" id="symlist"></div>
        <div class="pager" id="symPager"></div>
      </div>
      <div>
        <!-- 區塊 1：個股摘要 -->
        <div class="card" id="infoCard"></div>
        <!-- 區塊 2：歷史價格圖（WC mklab-kline） -->
        <div class="card">
          <h3>歷史價格圖（WC <mklab-kline> + MACD/KD）</h3>
          <div class="kline-toolbar">
            <button onclick="klAddIndicatorWC('MACD')">MACD</button>
            <button onclick="klAddIndicatorWC('KDJ')">KD</button>
            <button onclick="klDrawWC('segment')">畫線</button>
            <button onclick="klDrawWC('horizontalStraightLine')">水平線</button>
            <button onclick="klDrawWC('fibonacciLine')">費波那契</button>
            <button onclick="klRemoveAllWC()">清除</button>
          </div>
          <!-- WC K線元件 -->
          <mklab-kline id="wcKline" data-symbol="" height="400"></mklab-kline>
        </div>
        <!-- 區塊 3：財報摘要（WC mklab-datatable） -->
        <div class="card">
          <h3>財報摘要（WC <mklab-datatable>）</h3>
          <mklab-datatable id="wcFinTable" cols="sym,name,price,chg,pe,pb,roe,roa,eps,div" src="stocks.json" page-size="10"></mklab-datatable>
        </div>
      </div>
    </div>
  </div>

<script src="/assets/mklab-core.js"></script>
<script>
/* ============ WC 研究頁專用邏輯（保留原有 search/loadAll 等，只改用 WC 元件） ============ */
let STOCKS = {};
const STATIC = {
  "2330":{name:"台積電",price:1050,chg:+1.2,pe:24.1,pb:5.2,roe:28.1,roa:15.3,eps:43.6,div:2.1,mc:"27.2兆",sector:"半導體",fin:[["2023",43.6,28.1,2.1],["2024",48.2,30.5,2.3],["2025E",52.0,31.0,2.5]]},
  "2317":{name:"鴻海",price:215,chg:+0.9,pe:18.3,pb:2.1,roe:14.2,roa:6.8,eps:11.7,div:3.8,mc:"2.9兆",sector:"電子代工",fin:[["2023",11.7,14.2,3.8],["2024",12.5,15.0,4.0],["2025E",13.0,15.5,4.2]]},
  "2454":{name:"聯發科",price:1280,chg:-0.5,pe:30.2,pb:4.8,roe:22.5,roa:14.0,eps:42.4,div:2.5,mc:"2.0兆",sector:"IC設計",fin:[["2023",42.4,22.5,2.5],["2024",46.0,23.1,2.7],["2025E",50.0,24.0,2.9]]},
};

let wcKline = null;
let wcFinTable = null;

function loadAll(){
  return fetch('/data/stocks.json').then(r=>r.json()).then(d=>{
    if(d && Array.isArray(d.stocks)){
      const o={};
      d.stocks.forEach(s=>{ if(s.sym) o[s.sym]={name:s.name,price:s.price,chg:s.chg,pe:s.pe,pb:s.pb,roe:s.roe,roa:s.roa,eps:s.eps,div:s.div,mc:(s.market_cap!=null?(s.market_cap/1e8).toFixed(1)+'兆':null),sector:s.ind,fin:[]}; });
      STOCKS = Object.assign({}, STATIC, o);
    } else { STOCKS = Object.assign({}, STATIC); }
    renderList();
  }).catch(()=>{ STOCKS = Object.assign({}, STATIC); renderList(); });
}

function search(){ /* 搜尋邏輯同原版，略 */ }

function renderList(){ /* 渲染 symlist/pager，同原版，略 */ }

function sel(sym){
  if(!STOCKS[sym]) return;
  const m = STOCKS[sym];
  // 個股摘要卡片
  document.getElementById('infoCard').innerHTML = `
    <h3>${sym} ${m.name}</h3>
    <p>價格: ${m.price} (${m.chg>=0?'+':''}${m.chg}%) | PE: ${m.pe} | PB: ${m.pb} | ROE: ${m.roe}% | ROA: ${m.roa}%</p>
  `;
  // WC K線：data-symbol 觸發屬性驅動
  const k = document.getElementById('wcKline');
  k.setAttribute('data-symbol', sym);
  // 財報表格：data-client 已處理，WC 會自動渲染
}
loadAll();
/* 暫時手動選 2330 測試 */
setTimeout(() => sel('2330'), 500);
</script>
</body>
</html>
