<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mklab-stock WC Demo — &lt;mklab-kline&gt;</title>
<style>
  body { font-family: system-ui, sans-serif; background: #0f1115; color: #e8eaed; padding: 20px; }
  h3 { font-size: 15px; margin: 18px 0 8px; color: #94a3b8; }
  mklab-kline { display: block; border: 1px solid #2a2f3a; border-radius: 12px; padding: 8px; }
</style>
<!-- 圖表庫（必須在 mklab-wc.js 前）-->
<script src="/vendor/lightweight-charts.min.js"></script>
<!-- TWII 真實資料（260 天）-->
<script src="/data/twii_kdata.js?v=20260715b"></script>
<!-- Web Components 元件庫 -->
<script src="/assets/mklab-wc.js"></script>
</head>
<body>
  <h3>測試 1：屬性驅動（data-symbol="TWII" → 讀 window.TWII_KDATA）</h3>
  <mklab-kline data-symbol="TWII" height="360"></mklab-kline>

  <h3>測試 2：程式化 setData（15 筆隨機）</h3>
  <mklab-kline id="manual" height="240"></mklab-kline>

  <script>
    // 測試 2：程式化餵資料（等元件升級後再 setData，避免時序競爭）
    customElements.whenDefined('mklab-kline').then(() => {
      const el = document.getElementById('manual');
      const o = []; let p = 22000;
      const base = new Date(2026, 4, 1);
      for (let i = 0; i < 15; i++) {
        base.setDate(base.getDate() + 1);
        const open = p;
        const close = +(p + (Math.random() - 0.48) * 200).toFixed(1);
        const high = +(Math.max(open, close) + Math.random() * 100).toFixed(1);
        const low = +(Math.min(open, close) - Math.random() * 100).toFixed(1);
        const y = base.getFullYear(), m = String(base.getMonth() + 1).padStart(2, '0'), d = String(base.getDate()).padStart(2, '0');
        o.push({ time: `${y}-${m}-${d}`, open, high, low, close }); p = close;
      }
      el.setData(o);
      if (el._chart && el._container) el._chart.resize(el._container.clientWidth || 800, 240);
      console.log('[demo] manual setData 筆數:', o.length);
    });
  </script>
</body>
</html>
