name: html-health

on:
  push:
    paths:
      - '**/*.html'
      - 'scripts/check_html_health.py'
  pull_request:
    paths:
      - '**/*.html'
      - 'skills/html-health/check_html_health.py'

permissions:
  contents: read

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: HTML 結構健康檢查
        run: python skills/html-health/check_html_health.py
