name: daily-update
on:
  schedule:
    # 台灣收盤後 17:00 = UTC 09:00（週一至週五）
    - cron: "0 9 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install yfinance
      - name: Fetch data
        run: python scripts/fetch_data.py
      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "data: 每日更新 $(date +%Y-%m-%d) [skip ci]"
            git push
          fi
