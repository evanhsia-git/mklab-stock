name: daily-update
on:
  schedule:
    # 台灣收盤後 17:00 = UTC 09:00（週一至週五）：抓收盤+PE/PB/殖利率
    - cron: "0 9 * * 1-5"
    # 每週六 10:00 UTC = 18:00 台灣：yfinance 補 ROE/ROA（sleep 3s 防 ban）
    - cron: "0 10 * * 6"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  daily:
    if: github.event.schedule != '0 10 * * 6'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Fetch daily (TWSE OpenAPI, 雲端免 key)
        run: python scripts/fetch_data.py daily
      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "data: 每日更新 $(date +%Y-%m-%d) [skip ci]"
            git push
          fi

  weekly-roe:
    if: github.event.schedule == '0 10 * * 6'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install yfinance
        run: pip install yfinance
      - name: Fetch ROE/ROA (yfinance, 免 key, sleep 3s 防 ban)
        run: python scripts/fetch_data.py weekly
      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "data: 每週 ROE/ROA 更新 $(date +%Y-%m-%d) [skip ci]"
            git push
          fi
