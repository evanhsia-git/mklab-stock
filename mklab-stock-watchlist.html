<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mklab-stock Watchlist（WC 版）</title>
<base href="/mklab-stock/">
<style>
  :root { --bg:#0f1115; --surface:#171a21; --ink:#e8eaed; --muted:#9aa0a6; --border:#2a2f3a; --accent:#3b82f6; --up:#f87171; --down:#4ade80; --warn:#fbbf24; --radius:10px; --shadow:0 1px 3px rgba(0,0,0,.4); }
  [data-theme="light"] { --bg:#f7f8fa; --surface:#fff; --ink:#1a1d21; --muted:#6b7280; --border:#e5e7eb; --accent:#2563eb; --up:#dc2626; --down:#16a34a; --warn:#d97706; --shadow:0 1px 3px rgba(0,0,0,.08); }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif; background:var(--bg); color:var(--ink); line-height:1.5; }
  .nav { position:sticky; top:0; z-index:26; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:4px; padding:10px 12px; }
  .nav .brand { font-weight:700; font-size:15px; margin-right:12px; white-space:nowrap; }
  .nav a { color:var(--ink); text-decoration:none; font-size:14px; padding:6px 10px; border-radius:8px; white-space:nowrap; }
  .nav a.active { background:var(--accent); color:#fff; }
  .utilbar { position:sticky; top:49px; z-index:25; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; padding:8px 12px; }
  .utilbar .spacer { flex:1; }
  .fab-btn { width:40px; height:40px; border-radius:50%; border:1px solid var(--border); background:var(--surface); color:var(--ink); cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow); }
  .fab-btn svg { width:20px; height:20px; display:block; }
  .wrap { max-width:1200px; margin:0 auto; padding:12px; }
  @media (min-width:1024px){ .wrap{ padding:16px 24px; } }
  .up { color:var(--up); } .down { color:var(--down); } .warn { color:var(--warn); }
  .search { display:flex; align-items:center; gap:4px; background:var(--bg); border:1px solid var(--border); border-radius:20px; padding:4px 10px; }
  .search.collapsed input { display:none; }
  .search.expanded input { display:block; width:160px; background:var(--surface); color:var(--ink); border:1px solid var(--border); border-radius:16px; padding:4px 10px; outline:none; }
  .search input { border:none; background:transparent; color:var(--ink); outline:none; width:120px; font-size:13px; }
  .row-input { display:flex; gap:6px; margin-bottom:12px; }
  .row-input input { flex:1; padding:8px; border:1px solid var(--border); border-radius:8px; background:var(--bg); color:var(--ink); }
  .row-input button { padding:8px 12px; background:var(--accent); color:#fff; border:none; border-radius:8px; cursor:pointer; }
  .table-wrap { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); overflow-x:auto; }
  .pager { display:flex; gap:6px; justify-content:center; margin:12px 0; flex-wrap:wrap; }
  .pager button { padding:6px 11px; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--ink); cursor:pointer; font-size:13px; }
  .pager button:hover { background:var(--row-hover); }
  .pager button.on { background:var(--accent); color:#fff; border-color:var(--accent); }
  table { width:100%; border-collapse:collapse; }
  th,td { padding:10px 8px; text-align:right; font-size:13px; border-bottom:1px solid var(--border); white-space:nowrap; }
  th:first-child,td:first-child { text-align:left; }
  th { font-size:12px; color:var(--muted); font-weight:600; background:var(--surface); }
  tbody tr:nth-child(even){ background:rgba(255,255,255,.02); }
  tbody tr:hover { background:var(--row-hover); }
  .sym { font-weight:600; } .sym small { color:var(--muted); font-weight:400; display:block; }
  .alert { font-size:11px; padding:2px 6px; border-radius:6px; background:var(--warn); color:#000; }
  .del { color:var(--muted); cursor:pointer; font-size:12px; }
  .disclaimer { font-size:11px; color:var(--muted); text-align:center; padding:16px 12px; }
  .drawer-mask { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:40; display:none; }
  .drawer-mask.open { display:block; }
  .drawer { position:fixed; top:0; right:0; height:100%; width:300px; max-width:85vw; background:var(--surface); border-left:1px solid var(--border); z-index:50; transform:translateX(100%); transition:transform .25s ease; padding:16px; overflow-y:auto; box-shadow:var(--shadow); }
  .drawer.open { transform:translateX(0); }
  .drawer h3 { font-size:15px; margin-bottom:12px; }
  .drawer h4 { font-size:13px; color:var(--muted); margin:16px 0 8px; }
  .row { display:flex; align-items:center; justify-content:space-between; padding:8px 0; font-size:14px; }
  .row input { width:90px; padding:4px 6px; border:1px solid var(--border); border-radius:6px; background:var(--bg); color:var(--ink); }
  .switch { width:44px; height:24px; border-radius:12px; background:var(--border); position:relative; cursor:pointer; border:none; }
  .switch.on { background:var(--accent); }
  .switch::after { content:""; position:absolute; top:2px; left:2px; width:20px; height:20px; border-radius:50%; background:#fff; transition:left .2s; }
  .switch.on::after { left:22px; }
  .seg { display:flex; border:1px solid var(--border); border-radius:8px; overflow:hidden; }
  .seg button { flex:1; padding:6px; background:var(--surface); color:var(--ink); border:none; font-size:13px; }
  .seg button.on { background:var(--accent); color:#fff; }
  .close-x { float:right; background:none; border:none; font-size:20px; color:var(--muted); cursor:pointer; }
  .drawer a { color:var(--accent); text-decoration:none; }
  .sys-note { font-size:12px; color:var(--muted); line-height:1.6; }
  .section-title { font-weight:700; font-size:15px; margin:4px 0 10px; display:flex; align-items:baseline; gap:8px; }
  .section-title .hint { font-weight:400; font-size:11px; color:var(--muted); }
  .freshness { background:#fff7ed; color:#9a3412; font-size:12px; padding:6px 12px; border-bottom:1px solid var(--border); text-align:center; }
  [data-theme="dark"] .freshness { background:#2a1d12; color:#fdba74; }
  /* WC 元件樣式 */
  mklab-datatable { display:block; border:1px solid var(--border); border-radius:var(--radius); padding:8px; }
  mklab-drawer { display:block; }
</style>
<script src="vendor/lightweight-charts.min.js"></script>
<script src="data/twii_kdata.js"></script>
<script src="assets/mklab-core.js"></script>
<script src="assets/data-client.js"></script>
<script src="assets/mklab-wc.js"></script>
</head>
<body>
  <nav id="mainNav" class="nav"></nav>
  <div id="utilbar" class="utilbar"><span class="brand" id="brand"></span><span class="spacer"></span></div>
  <div class="freshness">資料以 2026-07-15 收盤為準（WC 版）</div>
  <div class="drawer-mask" onclick="MKLAB.Drawer.close()"></div>
  <aside class="drawer" id="drawer">
    <button class="close-x" onclick="MKLAB.Drawer.close()">×</button>
  </aside>

  <!-- WC 抽屜元件 -->
  <mklab-drawer trigger=".mklab-drawer-trigger" position="right" title="設定" theme-key="mklab-theme" lang-key="mklab-lang">
    <h4>主題</h4>
    <label class="row">
      <span>深色模式</span>
      <button class="switch" id="themeSwitch" onclick="toggleTheme()"></button>
    </label>
    <h4>語言</h4>
    <div class="seg">
      <button onclick="setLang('zh')">繁中</button>
      <button onclick="setLang('en')">English</button>
    </div>
  </mklab-drawer>

  <div class="wrap">
    <div class="section-title">我的自選股<span class="hint">點表頭可排序</span></div>
    <div class="row-input">
      <input id="addSym" placeholder="新增自選股代號，如 2330">
      <button onclick="addSym()">加入</button>
    </div>
    <div class="table-wrap">
      <table id="wlTable"></table>
      <div class="pager" id="wlPager"></div>
    </div>
    <div class="disclaimer">自選股中心（示意）。Alert 支援價格/技術/法人提醒，生產環境可由 Actions 產出。</div>
  </div>

<script>
/* ============ Watchlist 專用邏輯 ============ */
let priceMap = {};
let wlTable = null;

const SYM_NAME={"2330":"台積電","2317":"鴻海","2454":"聯發科","2308":"台達電","2303":"聯電","2412":"中華電","2882":"國泰金","6505":"台塑化","1303":"南亞","2891":"中信金","2881":"富邦金","2885":"元大金","2886":"兆豐金","2892":"第一金","2884":"玉山金","3008":"大立光","2301":"光寶科","2408":"南亞科","3711":"日月光投控","4938":"和碩","AAPL":"Apple","MSFT":"Microsoft","GOOGL":"Alphabet","NVDA":"Nvidia","600519":"貴州茅台","000001":"平安銀行","00700.HK":"騰訊","09988.HK":"阿里巴巴"};

async function loadPrices(){
  try{
    const r=await fetch('data/stocks.json');
    if(!r.ok) throw new Error('no');
    const d=await r.json();
    if(d && Array.isArray(d.stocks)){
      d.stocks.forEach(s=>{ priceMap[s.sym]={price:s.price,chg:s.chg,pe:s.pe,roe:s.roe,alert:null}; });
      render();
      const asof=d.meta&&d.meta.as_of;
      if(asof){ const f=document.querySelector('.freshness'); if(f) f.textContent='資料以 '+asof+' 收盤為準（Build-Time 自動更新）'; }
    }
  }catch(e){ render(); }
}

function render(){
  const rows = MKLAB.Watch.decorate(priceMap);
  if(!wlTable){
    wlTable = MKLAB.DataTable('wlTable', {
      cols: ['sym','price','chg','pe','roe','alert','del'],
      rows: rows,
      pageSize: 10, pagerId: 'wlPager',
      onDel: function(sym){ MKLAB.Watch.remove(sym); render(); },
      ctx: {},
    });
  }else{
    wlTable.setRows(rows);
  }
}

function addSym(){
  const v=document.getElementById('addSym').value.trim().toUpperCase();
  if(!v) return;
  MKLAB.Watch.add(v, SYM_NAME[v]||"");
  document.getElementById('addSym').value="";
  render();
}

function openDrawer(){ MKLAB.Drawer.open(); }
function closeDrawer(){ MKLAB.Drawer.close(); }

loadPrices();
MKLAB.initDrawer();
MKLAB.Shell.mount({ active:'watchlist' });

/* 主題/語言初始化 */
customElements.whenDefined('mklab-drawer').then(()=>{
  const theme = localStorage.getItem('mklab-theme') || 'dark';
  const lang = localStorage.getItem('mklab-lang') || 'zh-TW';
  document.documentElement.setAttribute('data-theme', theme);
});
function toggleTheme(){
  const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('mklab-theme', theme);
}
function setLang(lang){
  localStorage.setItem('mklab-lang', lang);
  console.log('[WC] lang:', lang);
}
</script>
</body>
</html>
