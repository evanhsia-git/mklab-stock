<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mklab-stock Watchlist 原型 v11</title>
<style>
  :root { --bg:#0f1115; --surface:#171a21; --ink:#e8eaed; --muted:#9aa0a6; --border:#2a2f3a; --accent:#3b82f6; --up:#f87171; --down:#4ade80; --warn:#fbbf24; --radius:10px; --shadow:0 1px 3px rgba(0,0,0,.4); }
  [data-theme="light"] { --bg:#f7f8fa; --surface:#fff; --ink:#1a1d21; --muted:#6b7280; --border:#e5e7eb; --accent:#2563eb; --up:#dc2626; --down:#16a34a; --warn:#d97706; --shadow:0 1px 3px rgba(0,0,0,.08); }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif; background:var(--bg); color:var(--ink); line-height:1.5; }
  .nav { position:sticky; top:0; z-index:25; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:4px; padding:10px 12px; }
  .nav .brand { font-weight:700; font-size:15px; margin-right:12px; white-space:nowrap; }
  .nav a { color:var(--ink); text-decoration:none; font-size:14px; padding:6px 10px; border-radius:8px; white-space:nowrap; }
  .nav a.active { background:var(--accent); color:#fff; }
  .utilbar { position:sticky; top:49px; z-index:24; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; padding:8px 12px; }
  .utilbar .spacer { flex:1; }
  .fab-btn { width:40px; height:40px; border-radius:50%; border:1px solid var(--border); background:var(--surface); color:var(--ink); cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow); }
  .fab-btn svg { width:20px; height:20px; display:block; }
  .wrap { max-width:1200px; margin:0 auto; padding:12px; }
  @media (min-width:1024px){ .wrap{ padding:16px 24px; } }
  .up { color:var(--up); } .down { color:var(--down); } .warn { color:var(--warn); }
  .search { display:flex; align-items:center; gap:4px; background:var(--bg); border:1px solid var(--border); border-radius:20px; padding:4px 10px; }
  .search.collapsed input { display:none; }
  .search.expanded input { display:block; width:160px; background:var(--surface); color:var(--ink); border:1px solid var(--border); border-radius:16px; padding:4px 10px; outline:none; }
  .search input { border:none; background:transparent; color:var(--ink); outline:none; width:120px; font-size:13px; }
  .row-input { display:flex; gap:6px; margin-bottom:12px; }
  .row-input input { flex:1; padding:8px; border:1px solid var(--border); border-radius:8px; background:var(--bg); color:var(--ink); }
  .row-input button { padding:8px 12px; background:var(--accent); color:#fff; border:none; border-radius:8px; cursor:pointer; }
  .table-wrap { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); overflow-x:auto; }
  table { width:100%; border-collapse:collapse; }
  th,td { padding:10px 8px; text-align:right; font-size:13px; border-bottom:1px solid var(--border); white-space:nowrap; }
  th:first-child,td:first-child { text-align:left; }
  th { font-size:12px; color:var(--muted); font-weight:600; background:var(--surface); }
  tbody tr:nth-child(even){ background:rgba(255,255,255,.02); }
  tbody tr:hover { background:var(--row-hover); }
  .sym { font-weight:600; } .sym small { color:var(--muted); font-weight:400; display:block; }
  .alert { font-size:11px; padding:2px 6px; border-radius:6px; background:var(--warn); color:#000; }
  .del { color:var(--muted); cursor:pointer; font-size:12px; }
  .disclaimer { font-size:11px; color:var(--muted); text-align:center; padding:16px 12px; }
  .drawer-mask { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:40; display:none; }
  .drawer-mask.open { display:block; }
  .drawer { position:fixed; top:0; right:0; height:100%; width:300px; max-width:85vw; background:var(--surface); border-left:1px solid var(--border); z-index:50; transform:translateX(100%); transition:transform .25s ease; padding:16px; overflow-y:auto; box-shadow:var(--shadow); }
  .drawer.open { transform:translateX(0); }
  .drawer h3 { font-size:15px; margin-bottom:12px; }
  .drawer h4 { font-size:13px; color:var(--muted); margin:16px 0 8px; }
  .row { display:flex; align-items:center; justify-content:space-between; padding:8px 0; font-size:14px; }
  .row input { width:90px; padding:4px 6px; border:1px solid var(--border); border-radius:6px; background:var(--bg); color:var(--ink); }
  .switch { width:44px; height:24px; border-radius:12px; background:var(--border); position:relative; cursor:pointer; border:none; }
  .switch.on { background:var(--accent); }
  .switch::after { content:""; position:absolute; top:2px; left:2px; width:20px; height:20px; border-radius:50%; background:#fff; transition:left .2s; }
  .switch.on::after { left:22px; }
  .seg { display:flex; border:1px solid var(--border); border-radius:8px; overflow:hidden; }
  .seg button { flex:1; padding:6px; background:var(--surface); color:var(--ink); border:none; font-size:13px; }
  .seg button.on { background:var(--accent); color:#fff; }
  .close-x { float:right; background:none; border:none; font-size:20px; color:var(--muted); cursor:pointer; }
  .drawer a { color:var(--accent); text-decoration:none; }
  .sys-note { font-size:12px; color:var(--muted); line-height:1.6; }

</head>
<body>
  <nav class="nav">
    <a href="index.html">Market</a><a href="mklab-stock-screener.html">Screener</a><a href="mklab-stock-research.html">Research</a><a href="mklab-stock-industry.html">Industry</a><a href="mklab-stock-watchlist.html" class="active">Watchlist</a>
  </nav>
  <div class="utilbar">
    <span class="brand">mklab-stock</span>
    <span class="spacer"></span>
    <div class="search collapsed" id="searchBox"><input id="q" placeholder="搜尋代號，如 2330" onkeydown="if(event.key==='Enter')doSearch()" style="display:none"><button class="fab-btn" style="width:32px;height:32px" onclick="toggleSearch()" title="搜尋">🔍</button></div>
    <button class="fab-btn" onclick="toggleDark()" title="主題"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg></button>
    <a class="fab-btn" href="https://github.com/evanhsia-git/mklab-stock" target="_blank" title="GitHub"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.9a3.4 3.4 0 0 0-1-2.6c3-.3 6-1.5 6-6.5a5 5 0 0 0-1.4-3.5a4.7 4.7 0 0 0-.1-3.5s-1.1-.3-3.5 1.3a12 12 0 0 0-6.3 0C6.5 1.3 5.4 1.6 5.4 1.6a4.7 4.7 0 0 0-.1 3.5A5 5 0 0 0 4 8.6c0 5 3 6.2 6 6.5a3.4 3.4 0 0 0-1 2.6V22"/></svg></a>
    <button class="fab-btn" onclick="openDrawer()" title="設定"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
  </div>
  <div class="freshness">資料以 2026-07-13 收盤為準（前一日，非即時）</div>
  <div class="drawer-mask" onclick="closeDrawer()"></div>
  <aside class="drawer" id="drawer">
    <button class="close-x" onclick="closeDrawer()">×</button>
    <h3>設定</h3>
    <h4>外觀</h4>
    <div class="row"><span>深色主題</span><button class="switch on" id="swDark" onclick="toggleDark()"></button></div>
    <div class="row"><span>語言</span><div class="seg"><button id="langZh" class="on" onclick="setLang('zh')">中文</button><button id="langEn" onclick="setLang('en')">EN</button></div></div>
    <h4>說明</h4>
    <div class="row"><a href="mklab-stock-help.html">功能說明（使用/資料源/評分標準）↗</a></div>
    <div class="row"><a href="https://github.com/evanhsia-git/mklab-stock#readme" target="_blank" rel="noopener">使用說明 ↗</a></div>
    <h4>System</h4>
    <div class="sys-note">版本：dashboard v3.0<br>資料源：TWSE/TPEX/Yahoo/Stooq<br>最後更新：2026-07-14 08:30<br>狀態：<span class="up">●</span> 正常運作</div>
  </aside>
  <div class="wrap">
    <div class="row-input">
      <input id="addSym" placeholder="新增自選股代號，如 2330">
      <button onclick="addSym()">加入</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>代號</th><th>名稱</th><th>價格</th><th>漲跌%</th><th>PE</th><th>ROE%</th><th>提醒</th><th></th></tr></thead>
        <tbody id="wlBody"></tbody>
      </table>
    </div>
    <div class="disclaimer">自選股中心（示意）。Alert 支援價格/技術/法人提醒，生產環境可由 Actions 產出。</div>
  </div>
<script>
  const wl=[
    {sym:"2330",name:"台積電",price:1050,chg:+1.2,pe:24.1,roe:28.1,alert:"價格>1100"},
    {sym:"2317",name:"鴻海",price:215,chg:+0.9,pe:18.3,roe:14.2,alert:""},
    {sym:"2454",name:"聯發科",price:1280,chg:-0.5,pe:30.2,roe:22.5,alert:"RSI>80"},
    {sym:"AAPL",name:"Apple",price:228,chg:+0.5,pe:34.5,roe:149,alert:""},
  ];
  function render(){ document.getElementById('wlBody').innerHTML=wl.map((s,i)=>`<tr><td class="sym">${s.sym}<small>${s.name}</small></td><td>${s.price}</td><td class="${s.chg>=0?'up':'down'}">${s.chg>0?'+':''}${s.chg}%</td><td>${s.pe}</td><td>${s.roe}</td><td>${s.alert?`<span class="alert">${s.alert}</span>`:"—"}</td><td class="del" onclick="del(${i})">✕</td></tr>`).join(""); }
  const SYM_NAME={"2330":"台積電","2317":"鴻海","2454":"聯發科","2308":"台達電","2303":"聯電","2412":"中華電","2882":"國泰金","6505":"台塑化","1303":"南亞","2891":"中信金","2881":"富邦金","2885":"元大金","2886":"兆豐金","2892":"第一金","2884":"玉山金","3008":"大立光","2301":"光寶科","2408":"南亞科","3711":"日月光投控","4938":"和碩","AAPL":"Apple","MSFT":"Microsoft","GOOGL":"Alphabet","NVDA":"Nvidia","600519":"貴州茅台","000001":"平安銀行","00700.HK":"騰訊","09988.HK":"阿里巴巴"};
  function addSym(){ const v=document.getElementById('addSym').value.trim().toUpperCase(); if(!v) return; const name=SYM_NAME[v]||""; wl.push({sym:v,name,price:+(50+Math.random()*500).toFixed(1),chg:+(Math.random()*6-2).toFixed(2),pe:+(10+Math.random()*30).toFixed(1),roe:+(5+Math.random()*30).toFixed(1),alert:""}); document.getElementById('addSym').value=""; render(); }
  function del(i){ wl.splice(i,1); render(); }
  function toggleDark(){ const c=document.documentElement.getAttribute('data-theme'); document.documentElement.setAttribute('data-theme', c==='dark'?'light':'dark'); }
  function openDrawer(){ document.getElementById("drawer").classList.add("open"); document.querySelector(".drawer-mask").classList.add("open"); }
  function closeDrawer(){ document.getElementById("drawer").classList.remove("open"); document.querySelector(".drawer-mask").classList.remove("open"); }
  function setLang(l){ document.getElementById("langZh").classList.toggle("on",l==="zh"); document.getElementById("langEn").classList.toggle("on",l==="en"); }
  function toggleSearch(){ const b=document.getElementById("searchBox"); const inp=b.querySelector("input"); const exp=b.classList.toggle("expanded"); b.classList.toggle("collapsed",!exp); if(exp){ inp.style.display="block"; inp.focus(); } else { inp.style.display="none"; } }
  function doSearch(){ const v=document.getElementById('q').value.trim(); if(v){ window.location.href='mklab-stock-research.html?sym='+encodeURIComponent(v); } }
  render();
</script>
</body></html>
