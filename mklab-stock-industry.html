<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mklab-stock Industry 原型 v11（產業動態）</title>
<style>
  :root { --bg:#0f1115; --surface:#171a21; --ink:#e8eaed; --muted:#9aa0a6; --border:#2a2f3a; --accent:#3b82f6; --up:#f87171; --down:#4ade80; --row-hover:#1e2a3a; --radius:10px; --shadow:0 1px 3px rgba(0,0,0,.4); }
  [data-theme="light"] { --bg:#f7f8fa; --surface:#fff; --ink:#1a1d21; --muted:#6b7280; --border:#e5e7eb; --accent:#2563eb; --up:#dc2626; --down:#16a34a; --row-hover:#eff6ff; --shadow:0 1px 3px rgba(0,0,0,.08); }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif; background:var(--bg); color:var(--ink); line-height:1.5; }
  .nav { position:sticky; top:0; z-index:26; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:4px; padding:10px 12px; }
  .nav a { color:var(--ink); text-decoration:none; font-size:14px; padding:6px 10px; border-radius:8px; white-space:nowrap; }
  .nav a.active { background:var(--accent); color:#fff; }
  .utilbar { position:sticky; top:49px; z-index:25; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; padding:8px 12px; }
  .utilbar .spacer { flex:1; }
  .brand { font-weight:700; font-size:15px; margin-right:4px; white-space:nowrap; }
  .search { display:flex; align-items:center; gap:4px; background:var(--bg); border:1px solid var(--border); border-radius:20px; padding:4px 10px; }
  .search.collapsed input { display:none; }
  .search.expanded input { display:block; width:160px; background:var(--surface); color:var(--ink); border:1px solid var(--border); border-radius:16px; padding:4px 10px; outline:none; }
  .fab-btn { width:40px; height:40px; border-radius:50%; border:1px solid var(--border); background:var(--surface); color:var(--ink); cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow); }
  .fab-btn svg { width:20px; height:20px; display:block; }
  .freshness { background:#fff7ed; color:#9a3412; font-size:12px; padding:6px 12px; border-bottom:1px solid var(--border); text-align:center; }
  [data-theme="dark"] .freshness { background:#2a1d12; color:#fdba74; }
  .wrap { max-width:1200px; margin:0 auto; padding:12px; }
  @media (min-width:1024px){ .wrap{ padding:16px 24px; } }
  .up { color:var(--up); } .down { color:var(--down); }
  .section-title { font-size:14px; font-weight:600; margin:18px 4px 10px; color:var(--muted); }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:10px; }
  .icard { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px; box-shadow:var(--shadow); cursor:pointer; transition:border-color .15s; }
  .icard:hover { border-color:var(--accent); }
  .icard.on { border-color:var(--accent); }
  .icard .top { display:flex; justify-content:space-between; align-items:baseline; }
  .icard .nm { font-size:13px; font-weight:600; }
  .icard .chg { font-size:14px; font-weight:700; }
  .icard .meta { font-size:11px; color:var(--muted); margin-top:2px; }
  .icard .spark { margin-top:6px; }
  .icard .spark svg { width:100%; height:28px; display:block; }
  .table-wrap { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); overflow-x:auto; margin-top:14px; }
  .pager { display:flex; gap:6px; justify-content:center; margin:12px 0; flex-wrap:wrap; }
  .pager button { padding:6px 11px; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--ink); cursor:pointer; font-size:13px; }
  .pager button:hover { background:var(--row-hover); }
  .pager button.on { background:var(--accent); color:#fff; border-color:var(--accent); }
  table { width:100%; border-collapse:collapse; }
  th,td { padding:9px 8px; text-align:right; font-size:13px; border-bottom:1px solid var(--border); white-space:nowrap; }
  th:first-child,td:first-child { text-align:left; }
  th { font-size:12px; color:var(--muted); font-weight:600; background:var(--surface); cursor:pointer; position:sticky; top:0; }
  tbody tr:nth-child(even){ background:rgba(255,255,255,.02); }
  tbody tr:hover { background:var(--row-hover); }
  .sym { font-weight:600; } .sym small { color:var(--muted); font-weight:400; display:block; }
  .spark-cell { position:relative; width:90px; } .spark-cell svg { width:100%; height:34px; display:block; }
  .disclaimer { font-size:11px; color:var(--muted); text-align:center; padding:20px 12px; }
  /* drawer */
  .drawer-mask { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:40; display:none; }
  .drawer-mask.open { display:block; }
  .drawer { position:fixed; top:0; right:0; height:100%; width:300px; max-width:85vw; background:var(--surface); border-left:1px solid var(--border); z-index:50; transform:translateX(100%); transition:transform .25s ease; padding:16px; overflow-y:auto; box-shadow:var(--shadow); }
  .drawer.open { transform:translateX(0); }
  .drawer h3 { font-size:15px; margin-bottom:12px; }
  .drawer h4 { font-size:13px; color:var(--muted); margin:16px 0 8px; }
  .row { display:flex; align-items:center; justify-content:space-between; padding:8px 0; font-size:14px; }
  .row input { width:90px; padding:4px 6px; border:1px solid var(--border); border-radius:6px; background:var(--bg); color:var(--ink); }
  .seg { display:flex; border:1px solid var(--border); border-radius:8px; overflow:hidden; }
  .seg button { flex:1; padding:6px; background:var(--surface); color:var(--ink); border:none; font-size:13px; }
  .seg button.on { background:var(--accent); color:#fff; }
  .close-x { float:right; background:none; border:none; font-size:20px; color:var(--muted); cursor:pointer; }
  .drawer a { color:var(--accent); text-decoration:none; }
  .sys-note { font-size:12px; color:var(--muted); line-height:1.6; }
</style>
</head>
<body>
  <nav id="mainNav" class="nav"></nav>
  <div id="utilbar" class="utilbar"><span class="brand" id="brand"></span><span class="spacer"></span></div>
  <div class="freshness">資料以 2026-07-13 收盤為準（前一日，非即時）</div>
  <div class="drawer-mask" onclick="MKLAB.Drawer.close()"></div>
  <aside class="drawer" id="drawer">
    <button class="close-x" onclick="MKLAB.Drawer.close()">×</button>
  </aside>
  <div class="wrap">
    <div class="section-title">台灣 33 產業動態（漲跌績效 · 點擊產業看成分股）</div>
    <div class="grid" id="igrid"></div>
    <div class="section-title">全產業列表（區間績效 %）</div>
    <div class="table-wrap">
      <table id="indPerfTable">
        <thead></thead>
        <tbody id="indPerfBody"></tbody>
      </table>
      <div class="pager" id="indPerfPager"></div>
    </div>
    <div class="section-title" id="detailTitle" style="display:none"></div>
    <div class="table-wrap" id="detailWrap" style="display:none">
      <table>
        <thead><tr><th>代號</th><th>名稱</th><th>價格</th><th>漲跌%</th><th>PE</th><th>PB</th><th>ROE%</th><th>趨勢</th></tr></thead>
        <tbody id="detailBody"></tbody>
      </table>
    </div>
    <div class="disclaimer">產業分類參考台灣證交所 33 個法定產業（示意資料）。生產環境由 Build-Time 計算各產業漲跌與成分股績效。</div>
  </div>
<script src="assets/mklab-core.js"></script>
<script>
  // 台灣 33 個法定產業（依用戶提供清單）
  const INDUSTRIES=["水泥工業","食品工業","塑膠工業","紡織纖維","電機機械","電器電纜","化學工業","生技醫療業","玻璃陶瓷","造紙工業","鋼鐵工業","橡膠工業","汽車工業","半導體業","電腦及週邊設備業","光電業","通訊網路業","電子零組件業","電子通路業","資訊服務業","其他電子業","建材營造","航運業","觀光餐旅","金融保險","貿易百貨","油電燃氣業","綜合","綠能環保","數位雲端","運動休閒","居家生活","其他等"];
  const SAMPLE=["台積電","鴻海","聯發科","台達電","中華電","國泰金","台塑化","聯電","富邦金","中信金","兆豐金","玉山金","廣達","緯創","日月光","南亞科","大立光","統一","台泥","中鋼","長榮","華航","彰銀","第一金","元大金"];
  function rnd(seed){ let s=seed; return ()=>{ s=(s*1103515245+12345)&0x7fffffff; return s/0x7fffffff; }; }
  function spark(data,color,w,h){ const min=Math.min(...data),max=Math.max(...data),r=(max-min)||1; const p=data.map((d,i)=>`${(i/(data.length-1)*w).toFixed(1)},${(h-((d-min)/r*h)).toFixed(1)}`).join(" "); return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><polyline points="${p}" fill="none" stroke="${color}" stroke-width="1.5"/></svg>`; }
  function gen(seed,n){ const o=[]; let p=seed; for(let i=0;i<n;i++){ p+=(Math.random()-0.45)*seed*0.02; o.push(+p.toFixed(2)); } return o; }
  // 生成產業資料（預設示意 fallback；載入 data/industry.json 後以真實資料覆寫）
  let data=INDUSTRIES.map((nm,i)=>{ const chg=+((Math.random()-0.45)*6).toFixed(2); const cnt=+(8+Math.random()*40).toFixed(0); const top=+((Math.random()-0.45)*5).toFixed(2); const genp=()=>+((Math.random()-0.45)*10).toFixed(2); return {nm,chg,cnt,top,seed:+(20+i*37),w1:genp(),m1:genp(),m3:genp(),m6:genp(),ytd:genp(),y1:genp(),y5:genp()}; });
  let ALL_STOCKS=[];
  function loadIndustry(){
    fetch('data/industry.json').then(r=>{ if(!r.ok) throw new Error('no'); return r.json(); }).then(d=>{
      if(d && Array.isArray(d.industry) && d.industry.length){
        data=d.industry.map((x,i)=>({nm:x.nm,chg:x.chg,cnt:x.cnt,top:x.top,seed:+(20+i*37),w1:x.w1,m1:x.m1,m3:x.m3,m6:x.m6,ytd:x.ytd,y1:x.y1,y5:x.y5}));
        renderGrid(); renderPerf();
        const asof=d.meta&&d.meta.as_of;
        if(asof){ const f=document.querySelector('.freshness'); if(f) f.textContent='資料以 '+asof+' 收盤為準（Build-Time 自動更新）'; }
      }
    }).catch(()=>{});
    fetch('data/stocks.json').then(r=>r.json()).then(d=>{ if(d&&Array.isArray(d.stocks)) ALL_STOCKS=d.stocks; }).catch(()=>{});
  }
  let activeInd=null;
  function renderGrid(){
    document.getElementById('igrid').innerHTML=data.map((d,i)=>{
      const col=d.chg>=0?"var(--up)":"var(--down)";
      const svg=spark(gen(d.seed,20), d.chg>=0?"#dc2626":"#16a34a", 200, 28);
      return `<div class="icard ${activeInd===i?'on':''}" onclick="selInd(${i})">
        <div class="top"><span class="nm">${d.nm}</span><span class="chg ${d.chg>=0?'up':'down'}">${(d.chg>0?'+':'')}${d.chg}%</span></div>
        <div class="meta">${d.cnt} 檔 · 領漲 ${d.top>0?'+':''}${d.top}%</div>
        <div class="spark">${svg}</div>
      </div>`;
    }).join("");
  }
  let perfTable=null;
  function renderPerf(){
    if(!perfTable){
      perfTable = MKLAB.DataTable('indPerfTable', {
        cols:['ind','chg','w1','m1','m3','m6','ytd','y1','cnt'],
        rows:data,
        pageSize: 10, pagerId: 'indPerfPager',
        fieldMap:{ ind:'nm' },
        defaultSort:'chg',
      });
    } else {
      perfTable.setRows(data);
    }
  }
  function selInd(i){
    activeInd=i; renderGrid();
    const d=data[i];
    const real=ALL_STOCKS.filter(s=>s.ind===d.nm).slice(0,10);
    document.getElementById('detailTitle').style.display='block';
    document.getElementById('detailTitle').textContent=`${d.nm} · 成分股績效（${real.length} 檔，依 stocks.json 真實資料 Top 10）`;
    document.getElementById('detailWrap').style.display='block';
    const stocks=(real.length?real:[]).map(s=>{
      const ch=s.chg||0; const col=ch>=0?"#dc2626":"#16a34a";
      const pe=s.pe!=null?s.pe:'-'; const pb=s.pb!=null?s.pb:'-'; const roe=s.roe!=null?s.roe:'-';
      return `<tr><td class="sym">${s.sym}<small>${s.name||''}</small></td><td>${s.price!=null?s.price:'-'}</td><td class="${ch>=0?'up':'down'}">${ch>0?'+':''}${ch}%</td><td>${pe}</td><td>${pb}</td><td>${roe}</td><td class="spark-cell">${spark(gen(s.price||100),col,180,34)}</td></tr>`;
    }).join("")||`<tr><td colspan="7" style="text-align:center;color:var(--muted)">該產業暫無成分股資料</td></tr>`;
    document.getElementById('detailBody').innerHTML=stocks;
  }
  function openDrawer(){ MKLAB.Drawer.open(); }
  function closeDrawer(){ MKLAB.Drawer.close(); }
  renderGrid(); renderPerf(); loadIndustry();
  MKLAB.initDrawer();
  MKLAB.Shell.mount({ active:'industry' });
  </script>
</body></html>
