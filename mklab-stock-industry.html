<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<base href="/mklab-stock/">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="mklab-stock — 台股/美股/中股免費分析儀表板，提供 33 大產業動態、成分股漲跌、區間績效。">
<title>mklab-stock Industry 產業動態</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
<link rel="stylesheet" href="assets/css/mklab-theme.css">
<link rel="stylesheet" href="assets/css/layout.css">
<link rel="stylesheet" href="assets/css/component.css">
<link rel="stylesheet" href="assets/css/mobile.css">
</head>
<body>
<header class="sticky-header" role="banner">
  <nav id="mainNav" class="nav" aria-label="主導覽"></nav>
  <div id="utilbar" class="utilbar">
    <span class="brand" id="brand"></span>
    <span class="spacer"></span>
  </div>
  <div class="freshness" aria-live="polite">資料載入中…</div>
</header>
<aside class="drawer" id="drawer" role="dialog" aria-modal="true" aria-labelledby="drawerTitle">
  <button class="close-x" onclick="MKLAB.Drawer.close()" aria-label="關閉抽屜">×</button>
  <div class="drawer-content" id="drawerContent">
    <!-- 由 MKLAB.Drawer.init() 動態注入 drawerHTML() -->
  </div>
</aside>
<div class="drawer-mask" onclick="MKLAB.Drawer.close()" aria-hidden="true"></div>
<main class="wrap">



<div class="section-title">台灣 33 產業動態（漲跌績效 · 點擊產業看成分股）</div>
<div class="grid" id="igrid"></div>

<div class="section-title">全產業列表（區間績效 %）</div>
<div class="table-wrap">
  <mklab-datatable id="indPerfTable" cols="ind,chg,w1,m1,m3,m6,ytd,y1,cnt" page-size="10" pager-id="indPerfPager" default-sort="chg" field-map='{"ind":"nm"}'></mklab-datatable>
</div>

<div class="section-title" id="detailTitle" style="display:none"></div>
<div class="table-wrap" id="detailWrap" style="display:none">
  <mklab-datatable id="indDetailTable" cols="sym,name,price,chg,pe,pb,roe" page-size="10" pager-id="indDetailPager" default-sort="chg"></mklab-datatable>
</div>

<div class="disclaimer">產業分類參考台灣證交所 33 個法定產業（示意資料）。生產環境由 Build-Time 計算各產業漲跌與成分股績效。</div>

<script>
  const INDUSTRIES = ["水泥工業","食品工業","塑膠工業","紡織纖維","電機機械","電器電纜","化學工業","生技醫療業","玻璃陶瓷","造紙工業","鋼鐵工業","橡膠工業","汽車工業","半導體業","電腦及週邊設備業","光電業","通訊網路業","電子零組件業","電子通路業","資訊服務業","其他電子業","建材營造","航運業","觀光餐旅","金融保險","貿易百貨","油電燃氣業","綜合","綠能環保","數位雲端","運動休閒","居家生活","其他等"];
  const SAMPLE = ["台積電","鴻海","聯發科","台達電","中華電","國泰金","台塑化","聯電","富邦金","中信金","兆豐金","玉山金","廣達","緯創","日月光","南亞科","大立光","統一","台泥","中鋼","長榮","華航","彰銀","第一金","元大金"];

  function rnd(seed) { let s = seed; return () => { s = (s * 1103515245 + 12345) & 0x7fffffff; return s / 0x7fffffff; }; }
  function spark(data, color, w, h) {
    const min = Math.min(...data), max = Math.max(...data), r = (max - min) || 1;
    const p = data.map((d, i) => `${(i / (data.length - 1) * w).toFixed(1)},${(h - ((d - min) / r * h)).toFixed(1)}`).join(" ");
    return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><polyline points="${p}" fill="none" stroke="${color}" stroke-width="1.5"/></svg>`;
  }
  function gen(seed, n) { const o = []; let p = seed; for (let i = 0; i < n; i++) { p += (Math.random() - 0.45) * seed * 0.02; o.push(+p.toFixed(2)); } return o; }

  let data = INDUSTRIES.map((nm, i) => {
    const chg = +((Math.random() - 0.45) * 6).toFixed(2);
    const cnt = +(8 + Math.random() * 40).toFixed(0);
    const top = +((Math.random() - 0.45) * 5).toFixed(2);
    const genp = () => +((Math.random() - 0.45) * 10).toFixed(2);
    return { nm, chg, cnt, top, seed: +(20 + i * 37), w1: genp(), m1: genp(), m3: genp(), m6: genp(), ytd: genp(), y1: genp(), y5: genp() };
  });

  let ALL_STOCKS = [];
  let stocksLoaded = false;

  function loadIndustry() {
    MKLAB.data.json('industry').then(d => {
      if (d && Array.isArray(d.industry) && d.industry.length) {
        data = d.industry.map((x, i) => ({ nm: x.nm, chg: x.chg, cnt: x.cnt, top: x.top, seed: +(20 + i * 37), w1: x.w1, m1: x.m1, m3: x.m3, m6: x.m6, ytd: x.ytd, y1: x.y1, y5: x.y5 }));
        renderGrid(); renderPerf();
        const asof = d.meta && d.meta.as_of;
        if (asof) { const f = document.querySelector('.freshness'); if (f) f.textContent = '資料以 ' + asof + ' 收盤為準（Build-Time 自動更新）'; }
      }
    }).catch(e => { console.warn('[industry] loadIndustry failed:', e); });

    MKLAB.data.stocks().then(d => { if (d && Array.isArray(d)) { ALL_STOCKS = d; stocksLoaded = true; } }).catch(() => {});
  }

  let activeInd = null;

  function renderGrid() {
    document.getElementById('igrid').innerHTML = data.map((d, i) => {
      const col = d.chg >= 0 ? "var(--up)" : "var(--down)";
      const svg = spark(gen(d.seed, 20), d.chg >= 0 ? "#dc2626" : "#16a34a", 200, 28);
      return `<div class="icard ${activeInd === i ? 'on' : ''}" onclick="selInd(${i})">
        <div class="top"><span class="nm">${d.nm}</span><span class="chg ${d.chg >= 0 ? 'up' : 'down'}">${(d.chg > 0 ? '+' : '')}${d.chg}%</span></div>
        <div class="meta">${d.cnt} 檔 · 領漲 ${d.top > 0 ? '+' : ''}${d.top}%</div>
        <div class="spark">${svg}</div>
      </div>`;
    }).join("");
  }

  let perfTable = null;
  function renderPerf() {
    if (!perfTable) {
      perfTable = MKLAB.DataTable('indPerfTable', {
        cols: ['ind', 'chg', 'w1', 'm1', 'm3', 'm6', 'ytd', 'y1', 'cnt'],
        rows: data,
        pageSize: 10, pagerId: 'indPerfPager',
        fieldMap: { ind: 'nm' },
        defaultSort: 'chg',
      });
    } else {
      perfTable.setRows(data);
    }
  }

  let detailTable = null;
  function selInd(i) {
    activeInd = i; renderGrid();
    const d = data[i];
    const real = ALL_STOCKS.filter(s => s.ind === d.nm);
    document.getElementById('detailTitle').style.display = 'block';
    document.getElementById('detailTitle').textContent = `${d.nm} · 成分股績效（共 ${real.length} 檔，每頁 10 檔可翻頁）`;
    document.getElementById('detailWrap').style.display = 'block';
    if (!detailTable) {
      detailTable = MKLAB.DataTable('indDetailTable', {
        cols: ['sym', 'name', 'price', 'chg', 'pe', 'pb', 'roe'],
        rows: real, pageSize: 10, pagerId: 'indDetailPager',
        defaultSort: 'chg',
      });
    } else {
      detailTable.setRows(real);
    }
  }

  function openDrawer() { MKLAB.Drawer.open(); }
  function closeDrawer() { MKLAB.Drawer.close(); }

  renderGrid(); renderPerf(); loadIndustry();
  MKLAB.initDrawer();
  MKLAB.Shell.mount({ active: 'industry' });
</script>
</main>
<footer class="footer" role="contentinfo">
  <div class="footer-inner">
    <span>mklab-stock · Web Components v2.0</span>
    <a class="link" href="https://github.com/evanhsia-git/mklab-stock" target="_blank" rel="noopener">GitHub 倉庫 ↗</a>
  </div>
</footer>
<script src="assets/js/mklab-core.js"></script>
<script src="assets/js/data-client.js"></script>
<script src="assets/js/mklab-wc.js"></script>
</body>
</html>
