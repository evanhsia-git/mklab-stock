<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mklab-stock Industry</title>
<base href="/mklab-stock/">
<style>
  :root { --bg:#f7f8fa; --surface:#fff; --ink:#1a1d21; --muted:#6b7280; --border:#e5e7eb; --accent:#2563eb; --up:#dc2626; --down:#16a34a; --row-hover:#eff6ff; --radius:12px; --shadow:0 1px 3px rgba(0,0,0,.08); }
  [data-theme="dark"] { --bg:#0f1115; --surface:#171a21; --ink:#e8eaed; --muted:#9aa0a6; --border:#2a2f3a; --accent:#3b82f6; --up:#f87171; --down:#4ade80; --row-hover:#1e2a3a; --shadow:0 1px 3px rgba(0,0,0,.4); }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif; background:var(--bg); color:var(--ink); line-height:1.5; padding-bottom:20px; }
  .nav { position:sticky; top:0; z-index:26; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:4px; padding:10px 12px; }
  .nav a { color:var(--ink); text-decoration:none; font-size:14px; padding:6px 10px; border-radius:8px; white-space:nowrap; }
  .nav a.active { background:var(--accent); color:#fff; }
  .utilbar { position:sticky; top:49px; z-index:25; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; padding:8px 12px; }
  .utilbar .spacer { flex:1; }
  .brand { font-weight:700; font-size:15px; margin-right:4px; white-space:nowrap; }
  .search { display:flex; align-items:center; gap:4px; background:var(--bg); border:1px solid var(--border); border-radius:20px; padding:4px 10px; }
  .search.collapsed input { display:none; }
  .search.expanded input { display:block; width:160px; background:var(--surface); color:var(--ink); border:1px solid var(--border); border-radius:16px; padding:4px 10px; outline:none; }
  .fab-btn { width:40px; height:40px; border-radius:50%; border:1px solid var(--border); background:var(--surface); color:var(--ink); cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow); }
  .fab-btn svg { width:20px; height:20px; display:block; }
  .freshness { background:#fff7ed; color:#9a3412; font-size:12px; padding:6px 12px; border-bottom:1px solid var(--border); text-align:center; }
  [data-theme="dark"] .freshness { background:#2a1d12; color:#fdba74; }
  .wrap { max-width:1400px; margin:0 auto; padding:12px; }
  .section-title { font-size:14px; font-weight:600; margin:18px 4px 10px; color:var(--muted); }
  .up { color:var(--up); } .down { color:var(--down); }
  .ind-table-wrap { overflow-x:auto; }
  .ind-table { width:100%; border-collapse:collapse; font-size:13px; }
  .ind-table th, .ind-table td { padding:6px 10px; text-align:right; border-bottom:1px solid var(--border); }
  .ind-table th:first-child, .ind-table td:first-child { text-align:left; }
  .ind-table th { background:var(--surface); position:sticky; top:0; cursor:pointer; }
  .pager { display:flex; gap:6px; justify-content:center; margin:12px 0; flex-wrap:wrap; }
  .pager button { background:var(--surface); border:1px solid var(--border); color:var(--ink); border-radius:8px; padding:6px 11px; }
  .pager button.on { background:var(--accent); color:#fff; }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px; }
  .card-sm { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px; box-shadow:var(--shadow); }
  .card-sm .name { font-size:12px; color:var(--muted); }
  .card-sm .val { font-size:18px; font-weight:700; margin:2px 0; }
  .card-sm .chg { font-size:13px; font-weight:600; }
  .card-sm .box { position:relative; margin-top:6px; height:34px; }
  .card-sm svg { width:100%; height:34px; display:block; }
  .spark-tip { position:absolute; left:0; right:0; bottom:-20px; background:var(--surface); color:var(--ink); border:1px solid var(--border); border-radius:4px; padding:2px 4px; font-size:10px; text-align:center; box-shadow:var(--shadow); display:none; z-index:5; }
  .card-sm:hover .spark-tip { display:block; }
  .disclaimer { font-size:11px; color:var(--muted); text-align:center; padding:20px 12px; }
  /* drawer */
  #drawer { position:fixed; top:0; right:-320px; width:320px; max-width:100%; height:100vh; background:var(--surface); border-left:1px solid var(--border); box-shadow:var(--shadow); z-index:100; transition:right .3s ease; overflow-y:auto; padding:16px; }
  #drawer.open { right:0; }
  .drawer-mask { position:fixed; inset:0; background:rgba(0,0,0,.5); opacity:0; visibility:hidden; transition:.3s; z-index:99; }
  .drawer-mask.open { opacity:1; visibility:visible; }
  #drawer .close-x { position:absolute; top:8px; right:8px; width:32px; height:32px; border-radius:50%; border:1px solid var(--border); background:var(--bg); cursor:pointer; font-size:18px; }
  #drawer h3 { margin:0 0 12px; font-size:16px; }
  #drawer h4 { margin:16px 0 8px; font-size:13px; color:var(--muted); }
  #drawer .row { display:flex; align-items:center; justify-content:space-between; margin:8px 0; }
  #drawer .seg { display:flex; flex-direction:column; gap:4px; }
  #drawer .seg a { color:var(--ink); text-decoration:none; font-size:13px; padding:6px 10px; border-radius:6px; background:var(--bg); }
  #drawer .seg a:hover { background:var(--accent); color:#fff; }
  #drawer .switch { width:44px; height:24px; border-radius:12px; background:var(--border); border:none; cursor:pointer; position:relative; }
  #drawer .switch.on { background:var(--accent); }
  #drawer .switch::after { content:''; position:absolute; top:2px; left:2px; width:20px; height:20px; border-radius:50%; background:#fff; transition:.2s; box-shadow:0 1px 3px rgba(0,0,0,.2); }
  #drawer .switch.on::after { left:22px; }
  #drawer .sys-note { font-size:12px; color:var(--muted); line-height:1.6; }
  #drawer .sys-note .up { color:var(--down); }
</style>
</head>
<body>
<nav id="mainNav" class="nav"></nav>
<div id="utilbar" class="utilbar"><span class="brand" id="brand"></span><span class="spacer"></span></div>
<div class="freshness">資料以 2026-07-13 收盤為準（Build-Time 自動更新）</div>
<div class="wrap">
  <div class="section-title">全產業列表（區間績效 %）</div>
  <div class="ind-table-wrap">
    <table class="ind-table" id="indTable">
      <thead>
        <tr>
          <th>產業</th>
          <th>漲跌%</th>
          <th>檔數</th>
          <th>TOP</th>
          <th>1週</th>
          <th>1月</th>
          <th>3月</th>
          <th>6月</th>
          <th>今年以來</th>
          <th>1年</th>
          <th>5年</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
  <div class="pager" id="indPager"></div>
  <div class="disclaimer">免責聲明：僅供參考，非投資建議。資料以 2026-07-13 收盤為準（Build-Time 自動更新）。</div>
</div>

<div class="drawer-mask" onclick="MKLAB.Drawer.close()"></div>
<div id="drawer"><button class="close-x" onclick="MKLAB.Drawer.close()">×</button></div>

<script src="vendor/lightweight-charts.min.js"></script>
<script src="data/twii_kdata.js"></script>
<script src="assets/mklab-core.js"></script>
<script src="assets/data-client.js"></script>
<script src="assets/mklab-wc.js"></script>
<script>
  MKLAB.Shell.mount({ active:'industry' });
  
  let indTable = null;
  
  if(typeof MKLAB !== 'undefined'){
    indTable = MKLAB.DataTable('indTable', {
      cols: ['nm','chg','cnt','top','w1','m1','m3','m6','ytd','y1','y5'],
      rows: [],
      pageSize: 10,
      pagerId: 'indPager',
      defaultSort: 'ytd',
    });
  }
  
  // 載入 industry.json
  async function loadIndustry(){
    try{
      const r = await fetch('data/industry.json');
      if(!r.ok) throw new Error('industry.json failed');
      const d = await r.json();
      if(d && d.industry){
        indTable.setRows(d.industry);
        const asof = d.meta && d.meta.as_of;
        if(asof){
          const f = document.querySelector('.freshness');
          if(f) f.textContent = '資料以 ' + asof + ' 收盤為準（Build-Time 自動更新）';
        }
      }
    }catch(e){console.error('loadIndustry failed:', e)}
  }
  
  loadIndustry();
</script>
</body>
</html>
